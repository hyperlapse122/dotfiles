[tools]
aube = "latest"
bun = "1.3.14"
"npm:@colbymchenry/codegraph" = "latest"
rust = { version = "1.97.0", components = "rust-analyzer,rust-src" }

[hooks]
postinstall = [
  { run = "bash -c \"cd packages; vp install\"" },
  { run = "bash -c \"cd crates/mxm4-haptic; cargo fetch\"" },
  { run = "codegraph init" },
]
