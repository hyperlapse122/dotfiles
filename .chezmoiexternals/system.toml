{{- /*
  Host/system-level externals: docker credential helpers, wakatime-cli, and the
  prezto zsh framework.
*/ -}}

{{- $executableExtension := (replace "linux" "" (replace "darwin" "" (replace "windows" ".exe" .chezmoi.os))) -}}

{{- /* ---------- docker-credential-helpers (one helper per OS credential store) ---------- */ -}}

{{- $dockerCredentialHelpersTag := (gitHubLatestRelease "docker/docker-credential-helpers").TagName | toString -}}

{{- if eq .chezmoi.os "linux" }}

[docker-credential-secretservice]
type = "file"
targetPath = '.local/bin/docker-credential-secretservice'
url = {{ gitHubReleaseAssetURL "docker/docker-credential-helpers" $dockerCredentialHelpersTag (printf "docker-credential-secretservice-%s.%s-%s" $dockerCredentialHelpersTag .chezmoi.os .chezmoi.arch) | quote }}
executable = true

{{- else if eq .chezmoi.os "darwin" }}

[docker-credential-osxkeychain]
type = "file"
targetPath = '.local/bin/docker-credential-osxkeychain'
url = {{ gitHubReleaseAssetURL "docker/docker-credential-helpers" $dockerCredentialHelpersTag (printf "docker-credential-osxkeychain-%s.%s-%s" $dockerCredentialHelpersTag .chezmoi.os .chezmoi.arch) | quote }}
executable = true

{{- else if eq .chezmoi.os "windows" }}

[docker-credential-wincred]
type = "file"
targetPath = '.local/bin/docker-credential-wincred.exe'
url = {{ gitHubReleaseAssetURL "docker/docker-credential-helpers" $dockerCredentialHelpersTag (printf "docker-credential-wincred-%s.%s-%s.exe" $dockerCredentialHelpersTag .chezmoi.os .chezmoi.arch) | quote }}
executable = true

{{- end }}

{{- /* ---------- wakatime-cli ---------- */}}

[wakatime-cli]
type = "archive-file"
targetPath = '{{ printf ".local/bin/wakatime-cli%s" $executableExtension }}'
url = '{{ gitHubLatestReleaseAssetURL "wakatime/wakatime-cli" (printf "wakatime-cli-%s-%s.zip" .chezmoi.os .chezmoi.arch) }}'
executable = true
path = '{{ printf "wakatime-cli-%s-%s%s" .chezmoi.os .chezmoi.arch $executableExtension }}'

{{- /* ---------- prezto (zsh framework; no windows) ---------- */ -}}

{{- if ne .chezmoi.os "windows" }}

[prezto]
type = "git-repo"
targetPath = ".config/zsh/.zprezto"
url = "https://github.com/sorin-ionescu/prezto.git"
clone.args = ["--recursive"]
refreshPeriod = "8760h"

{{- end }}
