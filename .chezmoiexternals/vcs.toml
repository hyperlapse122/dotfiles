{{- /* Version-control & repo-orchestration CLIs: gh, glab, garden. glab's
       bundled skills are agent-skill externals in ai-agents.toml, pinned to
       the same release via glab-release-ref.tmpl. */ -}}

{{- $executableExtension := (replace "linux" "" (replace "darwin" "" (replace "windows" ".exe" .chezmoi.os))) -}}
{{- /* tar.gz on unix, zip on windows — glab and garden agree; gh does NOT (see $ghArchiveExtension). */ -}}
{{- $archiveExtension := (replace "linux" ".tar.gz" (replace "darwin" ".tar.gz" (replace "windows" ".zip" .chezmoi.os))) -}}

{{- /* ---------- gh (darwin ships a .zip, hence its own extension var) ---------- */ -}}

{{- $ghTag := (gitHubLatestRelease "cli/cli").TagName | toString -}}
{{- $ghArchiveExtension := (replace "linux" ".tar.gz" (replace "darwin" ".zip" (replace "windows" ".zip" .chezmoi.os))) }}

[gh]
type = "archive-file"
targetPath = '{{ printf ".local/bin/gh%s" $executableExtension }}'
url = '{{ gitHubReleaseAssetURL "cli/cli" $ghTag (printf "gh_%s_%s_%s%s" (replace "v" "" $ghTag) (replace "darwin" "macOS" .chezmoi.os) .chezmoi.arch $ghArchiveExtension) }}'
path = '{{ printf "bin/gh%s" $executableExtension }}'
executable = true
stripComponents = {{ replace "linux" "1" (replace "darwin" "1" (replace "windows" "0" .chezmoi.os)) }}

{{- /* ---------- glab (GitLab-hosted release, not GitHub) ---------- */ -}}

{{- /* The tag is single-sourced with the bundled-skill externals in
       ai-agents.toml (their versionSource: glabRelease) via the shared
       partial, so the CLI and its skills never pin different releases. */ -}}
{{- $glabTag := includeTemplate "glab-release-ref.tmpl" . -}}

{{- $glabArchiveUrl := (printf "https://gitlab.com/gitlab-org/cli/-/releases/%s/downloads/glab_%s_%s_%s%s" $glabTag (replace "v" "" $glabTag) .chezmoi.os .chezmoi.arch $archiveExtension) }}

[glab]
targetPath = '{{ printf ".local/bin/glab%s" $executableExtension }}'
type = "archive-file"
url = '{{ $glabArchiveUrl }}'
path = '{{ printf "bin/glab%s" $executableExtension }}'
executable = true

{{- /* ---------- garden ---------- */ -}}

{{- $gardenTag := (gitHubLatestRelease "garden-rs/garden").TagName | toString -}}
{{- $gardenVersion := trimPrefix "v" $gardenTag -}}
{{- $gardenArch := (replace "arm64" "aarch64" (replace "amd64" "x86_64" .chezmoi.arch)) -}}
{{- $gardenOperatingSystem := (replace "linux" "unknown-linux-gnu" (replace "darwin" "apple-darwin" (replace "windows" "pc-windows-msvc" .chezmoi.os))) -}}
{{- $gardenStem := (printf "garden-%s-%s-%s" $gardenVersion $gardenArch $gardenOperatingSystem) }}

[garden]
type = "archive-file"
url = {{ gitHubReleaseAssetURL "garden-rs/garden" $gardenTag (printf "%s%s" $gardenStem $archiveExtension) | quote }}
executable = true
targetPath = '{{ printf ".local/bin/garden%s" $executableExtension }}'
path = '{{ printf "%s/garden%s" $gardenStem $executableExtension }}'
