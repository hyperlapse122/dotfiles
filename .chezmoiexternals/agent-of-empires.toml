{{- if ne "windows" .chezmoi.os -}}

{{- $tag := (gitHubLatestRelease "agent-of-empires/agent-of-empires").TagName | toString -}}

[aoe]
type = "archive-file"
url = {{ gitHubReleaseAssetURL "agent-of-empires/agent-of-empires" $tag (printf "aoe-%s-%s.tar.gz" .chezmoi.os .chezmoi.arch) | quote }}
executable = true
targetPath = ".local/bin/aoe"
path = '{{ printf "aoe-%s-%s" .chezmoi.os .chezmoi.arch }}'

[aoe.checksum]
# The sidecar is sha256sum output ("<hash>  <file>"), so take the first field.
sha256 = '{{ output "curl" "-fsSL" (gitHubReleaseAssetURL "agent-of-empires/agent-of-empires" $tag (printf "aoe-%s-%s.tar.gz.sha256" .chezmoi.os .chezmoi.arch)) | toString | trim | splitList " " | first }}'

{{- end -}}