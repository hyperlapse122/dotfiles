{{- if eq .chezmoi.os "linux" }}

[".local/bin/docker-credential-secretservice"]
type = "file"
url = {{ gitHubReleaseAssetURL "docker/docker-credential-helpers" .dockerCredentialHelpers.release (printf "docker-credential-secretservice-%s.%s-%s" .dockerCredentialHelpers.release .chezmoi.os .chezmoi.arch) | quote }}
executable = true
refreshPeriod = "672h"

{{- else if eq .chezmoi.os "darwin" }}

[".local/bin/docker-credential-osxkeychain"]
type = "file"
url = {{ gitHubReleaseAssetURL "docker/docker-credential-helpers" .dockerCredentialHelpers.release (printf "docker-credential-osxkeychain-%s.%s-%s" .dockerCredentialHelpers.release .chezmoi.os .chezmoi.arch) | quote }}
executable = true
refreshPeriod = "672h"

{{- else if eq .chezmoi.os "windows" }}

[".local/bin/docker-credential-wincred.exe"]
type = "file"
url = {{ gitHubReleaseAssetURL "docker/docker-credential-helpers" .dockerCredentialHelpers.release (printf "docker-credential-wincred-%s.%s-%s.exe" .dockerCredentialHelpers.release .chezmoi.os .chezmoi.arch) | quote }}
executable = true
refreshPeriod = "672h"

{{- end }}