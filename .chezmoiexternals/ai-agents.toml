{{- /* AI coding agents and adjacent localhost infrastructure: claude, codex, agy, opencode, pi, CLIProxyAPI, codegraph, aoe, and the agent skills listed in .chezmoidata/agents.yaml (agents.skills.external). */ -}}

{{- $executableExtension := (replace "linux" "" (replace "darwin" "" (replace "windows" ".exe" .chezmoi.os))) -}}

{{- /* ---------- claude-code (anthropic downloads manifest, not a GitHub release) ---------- */ -}}

{{- $claudeCodeBaseUrl := "https://downloads.claude.ai/claude-code-releases" -}}
{{- $latestReleaseId := output "curl" "-fsSL" (printf "%s/latest" $claudeCodeBaseUrl) | toString -}}
{{- $latestReleaseManifest := output "curl" "-fsSL" (printf "%s/%s/manifest.json" $claudeCodeBaseUrl $latestReleaseId) | toString | fromJson -}}

{{- $latestReleaseVersion := $latestReleaseManifest.version -}}

{{- $claudeCodePlatformId := (printf "%s-%s" .chezmoi.os (replace "amd64" "x64" .chezmoi.arch)) -}}
{{- if eq .chezmoi.os "linux" -}}
  {{- $libcOut := output "sh" "-c" "ldd /bin/ls 2>&1 | grep -q musl; echo $?" | trim -}}
  {{- if eq $libcOut "0" -}}
    {{- $claudeCodePlatformId = (printf "%s-musl" $claudeCodePlatformId) -}}
  {{- end -}}
{{- end -}}

{{- $claudeCodePlatform := index $latestReleaseManifest.platforms $claudeCodePlatformId -}}
{{- $claudeCodeBinary := $claudeCodePlatform.binary -}}

[claude]
type = "file"
targetPath = '{{ printf ".local/share/claude/versions/%s%s" $latestReleaseVersion $executableExtension }}'
url = '{{ printf "%s/%s/%s/%s" $claudeCodeBaseUrl $latestReleaseId $claudeCodePlatformId $claudeCodeBinary }}'
executable = true
# 0500: the binary is not rewritable in place, only replaceable by a chezmoi apply
# that fetches a new version dir.
private = true
readonly = true

[claude.checksum]
sha256 = '{{ $claudeCodePlatform.checksum }}'
size = {{ $claudeCodePlatform.size }}

{{- /* ---------- codex ---------- */ -}}

{{- $codexArch := (replace "amd64" "x86_64" (replace "arm64" "aarch64" .chezmoi.arch)) -}}

{{- $codexTag := ((gitHubLatestRelease "openai/codex").TagName | toString) -}}
{{- $codexRelease := (replace "rust-v" "" $codexTag) -}}
{{- $codexTarget := (replace "linux" "unknown-linux-musl" (replace "darwin" "apple-darwin" (replace "windows" "pc-windows-msvc" .chezmoi.os))) -}}

{{- $codexReleasePath := (printf "%s-%s-%s" $codexRelease $codexArch $codexTarget) -}}
{{- $codexAsset := (printf "codex-package-%s-%s.tar.zst" $codexArch $codexTarget) -}}

{{- $codexInstallationPath := (joinPath ".codex" "packages" "standalone" "releases" $codexReleasePath) }}

[codex]
type = "archive"
url = '{{ gitHubReleaseAssetURL "openai/codex" $codexTag $codexAsset }}'
stripComponents = 0
targetPath = '{{ $codexInstallationPath }}'

{{- /* ---------- antigravity (agy) — vendor auto-updater manifest, not a GitHub release ---------- */ -}}

{{- $antigravityManifestBase := "https://antigravity-cli-auto-updater-974169037036.us-central1.run.app/manifests" -}}
{{- $antigravityPlatform := (printf "%s_%s" .chezmoi.os .chezmoi.arch) -}}
{{- $antigravityManifest := output "curl" "-fsSL" (printf "%s/%s.json" $antigravityManifestBase $antigravityPlatform) | toString | fromJson -}}

{{- if eq .chezmoi.os "windows" }}
[agy]
type = "file"
targetPath = '{{ printf ".local/bin/agy%s" $executableExtension }}'
url = '{{ $antigravityManifest.url }}'
executable = true

[agy.checksum]
sha512 = '{{ $antigravityManifest.sha512 }}'
{{- else }}
[agy]
type = "archive-file"
targetPath = '.local/bin/agy'
url = '{{ $antigravityManifest.url }}'
path = 'antigravity'
executable = true

[agy.checksum]
sha512 = '{{ $antigravityManifest.sha512 }}'
{{- end }}

{{- /* ---------- opencode (darwin ships a .zip, unlike the tar.gz users below) ---------- */ -}}

{{- $opencodeArchiveExtension := (replace "linux" ".tar.gz" (replace "darwin" ".zip" (replace "windows" ".zip" .chezmoi.os))) }}

[opencode]
targetPath = '{{ printf ".local/bin/opencode%s" $executableExtension }}'
type = "archive-file"
url = '{{ gitHubLatestReleaseAssetURL "anomalyco/opencode" (printf "opencode-%s-%s%s" .chezmoi.os (replace "amd64" "x64" .chezmoi.arch) $opencodeArchiveExtension) }}'
executable = true
path = '{{ printf "opencode%s" $executableExtension }}'

{{- /* ---------- pi (earendil-works) — a whole-dir distribution, not a lone binary: the
       executable resolves its own sibling package.json / theme/ / export-html/ / .wasm, so the
       tree is extracted per version and ~/.local/bin/pi is symlinked at it by
       .chezmoiscripts/00-tools/run_onchange_after_pi.sh.tmpl. POSIX only (the release does ship
       windows .zip assets, but the linker script has no .ps1 counterpart). ---------- */ -}}

{{- if ne .chezmoi.os "windows" -}}

{{- /* $piTag is also resolved inline by dot_pi/agent/readonly_settings.json.tmpl
       (lastChangelogVersion) so the managed settings.json matches the
       installed pi. Kept in sync by reading the same release — no shared
       partial. */ -}}
{{- $piTag := (gitHubLatestRelease "earendil-works/pi").TagName | toString -}}
{{- $piAsset := (printf "pi-%s-%s.tar.gz" .chezmoi.os (replace "amd64" "x64" .chezmoi.arch)) -}}

{{- /* One combined sha256sum-format sidecar for every asset, so pick our line out of it. */ -}}
{{- $piSums := output "curl" "-fsSL" (gitHubReleaseAssetURL "earendil-works/pi" $piTag "SHA256SUMS") | toString -}}
{{- $piSha := "" -}}
{{- range (splitList "\n" $piSums) -}}
  {{- $fields := regexSplit "\\s+" (trim .) -1 -}}
  {{- if and (eq (len $fields) 2) (eq (index $fields 1) $piAsset) -}}
    {{- $piSha = (index $fields 0) -}}
  {{- end -}}
{{- end -}}
{{- if not $piSha }}{{ fail (printf "pi: no sha256 for %s in the release SHA256SUMS sidecar" $piAsset) }}{{ end }}

[pi]
type = "archive"
url = '{{ gitHubReleaseAssetURL "earendil-works/pi" $piTag $piAsset }}'
targetPath = '{{ printf ".local/share/pi/versions/%s" $piTag }}'
stripComponents = 1

[pi.checksum]
sha256 = '{{ $piSha }}'

{{- end }}

{{- /* ---------- CLIProxyAPI — versioned, checksum-verified localhost infrastructure ---------- */ -}}
{{- $facts := includeTemplate "facts.tmpl" . | fromYaml -}}
{{- if and (or (eq .chezmoi.os "linux") (eq .chezmoi.os "darwin")) (not $facts.container) -}}
{{- $cpaRef := includeTemplate "cli-proxy-api-ref.tmpl" (dict "ctx" .) | fromJson }}
[cli-proxy-api]
type = "archive-file"
targetPath = '{{ printf ".local/share/cli-proxy-api/versions/%s/cli-proxy-api" $cpaRef.identity }}'
url = '{{ gitHubReleaseAssetURL "router-for-me/CLIProxyAPI" $cpaRef.tag $cpaRef.asset }}'
path = 'cli-proxy-api'
executable = true
# 0500: an applied candidate is immutable in place. Reconciliation activates it
# only after the file phase has verified the release archive checksum.
private = true
readonly = true

[cli-proxy-api.checksum]
sha256 = '{{ $cpaRef.sha256 }}'

{{- /* ---------- CLIProxyAPI management control panel asset ---------- */ -}}
{{- /* A single self-contained management.html release asset (no archive, no
     checksums sidecar). The 90-services reconciler copies this source file
     into the runtime static directory so the server serves a pre-placed asset
     and never performs a GitHub fetch at runtime; the resolved tag+sha act as
     the reconciler onchange trigger. Mirrors the binary's checksum-verified,
     render-time-resolved pinning. */ -}}
{{- $cpaPanelRef := includeTemplate "cli-proxy-api-panel-ref.tmpl" (dict "ctx" .) | fromJson }}
[cli-proxy-api-panel]
type = "file"
targetPath = '{{ printf ".local/share/cli-proxy-api/panel/management.html" }}'
url = '{{ $cpaPanelRef.url }}'
# readonly+private -> 0400 owner-read-only. Reconciler reads+copies it into the
# locked runtime static dir; no other consumer touches this source copy.
private = true
readonly = true

[cli-proxy-api-panel.checksum]
sha256 = '{{ $cpaPanelRef.sha256 }}'
{{- end }}

{{- /* ---------- codegraph ---------- */ -}}

{{- $codegraphTag := (gitHubLatestRelease "colbymchenry/codegraph").TagName | toString }}

[codegraph]
{{ if ne .chezmoi.os "windows" }}
targetPath = '{{ printf ".codegraph/versions/%s" $codegraphTag }}'
{{ else }}
targetPath = '{{ joinPath (env "LOCALAPPDATA") "codegraph" "current" }}'
{{ end }}
type = "archive"
url = '{{ gitHubReleaseAssetURL "colbymchenry/codegraph" $codegraphTag (printf "codegraph-%s-%s.tar.gz" (replace "windows" "win32" .chezmoi.os) (replace "amd64" "x64" .chezmoi.arch)) }}'
stripComponents = 1

{{- /* ---------- agent-of-empires (aoe) — the worktree/session orchestrator; no windows build ---------- */ -}}

{{- if ne "windows" .chezmoi.os }}

{{- $aoeTag := (gitHubLatestRelease "agent-of-empires/agent-of-empires").TagName | toString }}

[aoe]
type = "archive-file"
url = {{ gitHubReleaseAssetURL "agent-of-empires/agent-of-empires" $aoeTag (printf "aoe-%s-%s.tar.gz" .chezmoi.os .chezmoi.arch) | quote }}
executable = true
targetPath = ".local/bin/aoe"
path = '{{ printf "aoe-%s-%s" .chezmoi.os .chezmoi.arch }}'

[aoe.checksum]
# The sidecar is sha256sum output ("<hash>  <file>"), so take the first field.
sha256 = '{{ output "curl" "-fsSL" (gitHubReleaseAssetURL "agent-of-empires/agent-of-empires" $aoeTag (printf "aoe-%s-%s.tar.gz.sha256" .chezmoi.os .chezmoi.arch)) | toString | trim | splitList " " | first }}'

{{- end }}

{{- /* ---------- agent skills (~/.agents/skills/<name>) — formerly dotagents remote skills.
       The LIST is data in .chezmoidata/agents.yaml (agents.skills.external); this section
       ranges over it. Now chezmoi externals so each skill's release/branch is pinned by
       chezmoi at render time rather than fetched by `dotagents install`. Every source repo
       keeps its skill in a skills/<name>/ subdir, so stripComponents=3 drops the
       <repo>-<ref>/skills/<name>/ prefix (leaving SKILL.md + references/ at the target root)
       and the include (anchored on the skills/<name>/ path segment) isolates exactly that
       one skill — it excludes repo-root files, a repo's own dot-claude skills tree or nested
       package skills trees, and any sibling skill in the same repo (a source repo can ship
       several skills under skills/). exact=true so a skill update removes deleted files. Ref
       rule per entry: no `ref` key -> newest GitHub release (gitHubLatestRelease); a `ref`
       key -> that branch head resolved to a commit via git ls-remote (repos with no
       releases/tags, e.g. shadcn/improve), so both the URL and chezmoi's refresh key stay
       immutable for one render. The GitHub
       archive URL form takes a tag OR a commit. dotagents still runs for the MCP servers and
       the twelve path: skills and still owns the ~/.claude/skills -> ~/.agents/skills
       symlink; its `install` never prunes an UNDECLARED dir (prune is sync-only, which the
       apply never runs), so these externals coexist with the path: skills. POSIX only,
       matching the install-dotagents-skills linux+darwin gate. GitHub API calls: render
       chezmoi through the zsh wrapper (or `zsh -ic 'chezmoi …'`) so GITHUB_TOKEN is
       injected. ---------- */ -}}

{{- if ne .chezmoi.os "windows" -}}
{{- range .agents.skills.external }}
{{- $ref := "" -}}
{{- if hasKey . "ref" -}}
  {{- $ref = output "sh" "-c" (printf "git ls-remote https://github.com/%s.git refs/heads/%s 2>/dev/null || true" .source .ref) | regexFind "^[0-9a-f]{40}" -}}
  {{- if not (regexMatch "^[0-9a-f]{40}$" $ref) -}}
    {{- fail (printf "%s skill: could not resolve %s refs/heads/%s to a 40-character commit sha" .name .source .ref) -}}
  {{- end -}}
{{- else -}}
  {{- $ref = (gitHubLatestRelease .source).TagName | toString -}}
{{- end }}

[".agents/skills/{{ .name }}"]
type = "archive"
url = '{{ printf "https://github.com/%s/archive/%s.tar.gz" .source $ref }}'
exact = true
stripComponents = 3
include = ["*/skills/{{ .name }}/**"]
{{- end }}
{{- end }}

{{- /* ---------- opencode.plugins with install=localArchive — release tarballs extracted per
       version so every agent references the same on-disk path. Data lives in
       .chezmoidata/agents.yaml (agents.opencode.plugins); the OpenCode `plugin` array reads
       the same entry through .chezmoitemplates/opencode-plugins-json.tmpl, and
       .chezmoiscripts/70-agents/run_onchange_after_install-compound-engineering registers the
       same path with Claude Code, Codex, and pi. Sibling versions are pruned by
       .chezmoiscripts/00-tools/run_onchange_after_compound-engineering.
       stripComponents=1 drops the GitHub archive's `<repo>-<tag>/` prefix so the
       repo root (package.json, .opencode/, .claude-plugin/, .codex-plugin/, skills/, ...)
       lands directly at the target. exact=true so a version's extracted tree cleans up
       upstream deletions. POSIX only — matches the install script's linux+darwin gate
       and the sibling agent-skills block. compoundEngineeringRelease yields tags of the
       form `compound-engineering-v<semver>`; the on-disk version segment strips the
       front-half prefix and keeps the `v` so it matches the tag's own version suffix. */ -}}

{{- $ctx := . -}}
{{- if ne .chezmoi.os "windows" -}}
{{- range .agents.opencode.plugins -}}
{{-   if eq .install "localArchive" -}}
{{-     $ref := "" -}}
{{-     if eq .versionSource "compoundEngineeringRelease" -}}
{{-       $ref = includeTemplate "compound-engineering-ref.tmpl" $ctx -}}
{{-     else -}}
{{-       fail (printf "%s plugin: unsupported versionSource %q for install=localArchive" .package .versionSource) -}}
{{-     end -}}
{{-     $verSegment := "" -}}
{{-     if eq .versionSource "compoundEngineeringRelease" -}}
{{-       $verSegment = printf "v%s" (trimPrefix "compound-engineering-v" $ref) -}}
{{-     else -}}
{{-       $verSegment = printf "v%s" (trimPrefix "v" $ref) -}}
{{-     end }}

[{{ printf "%s/%s" .externalPath $verSegment | quote }}]
type = "archive"
url = '{{ printf "https://github.com/%s/archive/%s.tar.gz" .source $ref }}'
stripComponents = 1
exact = true
{{-   end -}}
{{- end -}}
{{- end -}}
