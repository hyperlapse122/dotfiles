# Windows-only dotbot tasks - loaded by install.ps1.
#
# Symlinks on Windows require Developer Mode enabled OR running PowerShell
# as Administrator. Without one of those, dotbot's `link:` will fail.
#
# Avoid `if:` directives here - they run via $SHELL which is unreliable on
# Windows. Use this file directly for Windows-only links.
#
# Cross-platform links (git, ssh, docker, mise, opencode, .agents) live in
# install.conf.yaml and apply here too. This file ONLY adds Windows-specific
# paths that differ from the Linux/macOS layout.

- defaults:
    link:
      create: true
      relink: true
      # Repo-managed dotfiles are authoritative; replace real target files.
      force: true

- link:
    # VS Code on Windows - source is the same, target path differs.
    # Only the two tracked *.json files (VS Code writes lots of User/ state).
    ~/AppData/Roaming/Code/User/:
      glob: true
      path: home/.config/Code/User/*.json

    # Per-OS git overrides (referenced via [include] in home/.config/git/config)
    ~/.gitconfig.d/windows.gitconfig: home/.gitconfig.d/windows.gitconfig

    # opencode mise wrapper (Windows side; POSIX ships opencode, see
    # install.linux.yaml / install.macos.yaml). PowerShell resolves `opencode`
    # as a bare command once %USERPROFILE%\.local\bin is on PATH - that
    # PATH entry is the user's responsibility.
    ~/.local/bin/opencode.ps1: home/.local/bin/opencode.ps1

# Configure glab with PowerShell counterpart of setup-glab.sh.
# `-NoProfile` skips the user's PS profile (avoids unrelated errors blocking
# bootstrap); `-ExecutionPolicy Bypass` lets the unsigned script run without
# requiring a system policy change. Forward slashes in -File are fine -
# PowerShell parses the path itself.
- shell:
    - command: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/auth/setup-glab.ps1
      description: Set up glab cli
      stdin: true
      stdout: true
      stderr: true

# Render tracked *.1password templates into ~/.secrets. The helper no-ops when
# no templates exist; when templates are present it requires an authenticated
# `op` CLI session.
- shell:
    - command: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/bootstrap/inject-1password-secrets.ps1
      description: Inject 1Password templates into ~/.secrets
      stdin: true
      stdout: true
      stderr: true

# Install desktop fonts to %LOCALAPPDATA%\Microsoft\Windows\Fonts (no admin;
# Win10 1803+). Idempotent: skips fonts already present via marker check.
# Pass `-Force` to reinstall.
- shell:
    - command: pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/bootstrap/install-fonts.ps1
      description: Install desktop fonts user-wide (Pretendard, JetBrains Mono, D2Coding, Nerd Font variants)
      stdin: true
      stdout: true
      stderr: true
