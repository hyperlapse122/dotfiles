# Disable USB autosuspend for the Bluetooth controller.
#
# Intel combo Wi-Fi/BT cards (e.g. AX210, 8087:0032) autosuspend the
# btusb USB device after a short idle window. While headphones are
# connected over A2DP/HFP this suspends the controller mid-session and
# drops the link, so connected Bluetooth audio devices randomly disconnect.
#
# btusb's `enable_autosuspend` module parameter defaults to Y on Fedora.
# Setting it to 0 keeps the controller powered, trading a small amount of
# idle power for a stable Bluetooth audio link.
#
# Takes effect on the next boot, or immediately via:
#   sudo modprobe -r btusb && sudo modprobe btusb
# (close any Bluetooth audio first; -r fails while the controller is busy).
options btusb enable_autosuspend=0
