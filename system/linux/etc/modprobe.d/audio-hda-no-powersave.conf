# Disable Intel HD-Audio power saving.
#
# On Intel TigerLake (i915 + SOF / snd_hda_intel), HDMI/DisplayPort audio
# shares the display PHY with the GPU. With power saving enabled, the HDA
# codec/controller powers down ~1s after the audio stream goes idle and
# powers back up when sound resumes. On this platform that power cycle
# forces i915 to retrain the DisplayPort link, which blanks the external
# monitor and drops its audio for ~1s every time audio starts or stops
# (observed as "CPU pipe B FIFO underrun" in the kernel log). The flicker
# disappears entirely if the monitor's audio output is left unused.
#
# power_save=0 keeps the controller powered so the link is never retrained
# for audio power transitions. power_save_controller=N disables the
# controller-level runtime PM that triggers the same retrain.
#
# Note: snd_hda_intel must be (re)loaded for these to take effect, so they
# apply automatically on the next boot. The installer deliberately does not
# reload audio modules at bootstrap time (that would kill in-use audio); to
# apply before rebooting, set the runtime parameters by hand:
#   echo 0 | sudo tee /sys/module/snd_hda_intel/parameters/power_save
#   echo N | sudo tee /sys/module/snd_hda_intel/parameters/power_save_controller
options snd_hda_intel power_save=0 power_save_controller=N
