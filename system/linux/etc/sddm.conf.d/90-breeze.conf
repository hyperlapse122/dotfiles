# Force the SDDM login greeter onto the upstream Breeze theme, overriding any
# distro-branded default (Ubuntu Studio's greeter drop-in, Fedora's shipped
# default). The 90- prefix sorts after vendor drop-ins in /etc/sddm.conf.d/ and
# /usr/lib/sddm/sddm.conf.d/, so it wins.
#
# install-system-config skips deploying this file when the breeze SDDM theme is
# absent (forcing a missing theme yields a broken login screen).
[Theme]
Current=breeze
