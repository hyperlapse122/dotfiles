# Realtime audio privileges for the @audio group (Ubuntu Studio pro-audio).
# Deployed ONLY on Ubuntu (gated in run_onchange_after_install-system-config.sh.tmpl);
# Fedora is intentionally untouched. Ships the realtime limits deterministically on
# every apply, independent of Ubuntu Studio's interactive first-run installer.
@audio   -   rtprio      95
@audio   -   memlock     unlimited
@audio   -   nice        -19
