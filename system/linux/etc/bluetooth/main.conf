# BlueZ daemon config — minimal, only the keys needed to enable Bluetooth
# LE Audio. Every other option is intentionally omitted so bluetoothd uses
# its compiled-in defaults (the stock Fedora /etc/bluetooth/main.conf ships
# every key commented out, i.e. all-defaults, so this file changes only the
# two settings below).
#
# Why both keys are required for LE Audio (BAP / unicast):
#
#   Experimental        Enables bluetoothd's experimental D-Bus interfaces
#                       (battery level, the newer LE Audio media APIs).
#                       Equivalent to `bluetoothd --experimental`.
#
#   KernelExperimental  Enables experimental KERNEL features — specifically
#                       ISO sockets, which BAP requires. Without it,
#                       bluetoothd logs on every LE-Audio device connect:
#                         profiles/audio/bap.c: BAP requires ISO Socket
#                         which is not enabled
#                       and the BAP profile probe fails, so no LE Audio
#                       profile ever appears in PipeWire. There is NO
#                       bluetoothd command-line flag for this — it is
#                       main.conf only, which is why a systemd ExecStart
#                       drop-in cannot substitute for this file.
#
# Installed to /etc/bluetooth/main.conf (mode 0644) by
# scripts/linux/install-linux-system-config.sh. bluetoothd reads it at
# startup, so changes apply on the next `systemctl restart bluetooth` or
# reboot. The host kernel already ships the ISO code
# (CONFIG_BT_LE_L2CAP_ECRED=y, ISO endpoint /sys/class/bluetooth/hci0:256),
# plus liblc3 and the pipewire libspa-codec-bluez5-lc3 plugin.
[General]
Experimental = true
KernelExperimental = true
