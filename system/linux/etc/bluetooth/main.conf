[General]
# Galaxy Buds4 Pro (Samsung TWS generally) only do MONO over LE Audio on
# Linux: BlueZ's CSIP DeviceSet1.Connect() is unimplemented as of 5.86, so the
# second earbud never joins the coordinated set. Use Classic A2DP (dual mode)
# for stereo until upstream lands set-member connect.
# Tracking: https://github.com/bluez/bluez/issues/1985
# Experimental/KernelExperimental kept for battery reporting + LE Audio readiness;
# revisit ControllerMode/LE once the second earbud connects upstream.
Experimental = true
KernelExperimental = true
ControllerMode = dual
