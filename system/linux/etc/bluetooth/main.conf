[General]
# Galaxy Buds4 Pro (Samsung TWS generally) only do MONO over LE Audio on
# Linux: BlueZ's CSIP DeviceSet1.Connect() is unimplemented as of 5.86, so the
# second earbud never joins the coordinated set. Classic A2DP (dual mode) is
# what keeps them in stereo until upstream lands set-member connect.
# Tracking: https://github.com/bluez/bluez/issues/1985
ControllerMode = dual

# Experimental D-Bus interfaces + experimental kernel features, both ON.
#
# LibrePods needs org.bluez.AdvertisementMonitorManager1 (RegisterMonitor) to
# run its LE monitor — the Apple manufacturer-data advertisements that carry
# proximity/battery state. That interface is registered ONLY when Experimental
# is enabled; with it off, LibrePods logs
#   "LE monitor error: ... AdvertisementMonitorManager1 doesn't exist"
# and the LE side is dead (the AACP L2CAP channel still delivers battery, ear
# detection, ANC mode and conversational awareness, so the app is usable either
# way — this buys back the LE-advertisement features only).
#
# TRADE-OFF, deliberately accepted (user asked for it, 2026-07-14): these two
# were previously false ON PURPOSE, to stop BlueZ from offering the LE Audio
# (BAP/CSIP) transports the Galaxy Buds4 Pro fall into — where they play MONO
# per the bug above. Turning them on can therefore regress the Buds to mono.
# ControllerMode = dual above still advertises BR/EDR, so Classic A2DP remains
# available, but it does not by itself PREVENT an LE Audio transport from being
# selected. If the Buds come back mono, this pair is the first thing to revert.
Experimental = true
KernelExperimental = true

# VendorID (DID) spoofing for LibrePods — makes AirPods believe this host is an
# Apple device, unlocking the features upstream marks "needs VendorID spoofing"
# (https://github.com/librepods-org/librepods, "VendorID Spoofing"):
#   - Hearing Aid
#   - Transparency Mode customization
#   - Multi-device connectivity (Bluetooth multipoint, 2 devices)
#   - Loud Sound Reduction
# Format is <source>:<vendor>:<product>:<version>; 0x004C is Apple's Bluetooth
# SIG vendor id. BlueZ has no conf.d drop-in for main.conf (only input.conf and
# network.conf take one), so this has to live here.
#
# GLOBAL adapter property: DID is advertised over the SDP Device ID profile by
# the ADAPTER, not per-peer, so EVERY Bluetooth peer sees this host as Apple —
# including the Galaxy Buds4 Pro configured above. Harmless there (Samsung's
# proprietary extensions key off their own vendor-specific SDP records, not the
# host DID), but it is not an AirPods-only switch.
#
# RE-PAIR AIRPODS AFTER CHANGING THIS: AirPods cache the peer's DID at pairing
# time, so an already-paired set keeps the old (non-Apple) id and none of the
# above unlocks until they are removed and paired again.
#
# Use at your own risk (upstream's words): LibrePods does not fully emulate an
# Apple device, so spoofed AirPods may periodically disconnect — playing the
# disconnect sound — and reconnect. To revert: delete this DeviceID line and
# `systemctl restart bluetooth` (bluetoothd only re-reads main.conf on restart).
DeviceID = bluetooth:004C:0000:0000
