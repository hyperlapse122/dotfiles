[connection]
ethernet.cloned-mac-address=preserve
wifi.cloned-mac-address=preserve

[device]
wifi.backend=wpa_supplicant
wifi.scan-rand-mac-address=true

[keyfile]
unmanaged-devices=interface-name:lo;interface-name:vmnet*;interface-name:tailscale*;interface-name:docker*;interface-name:veth*

[logging]
audit=false
level=WARN

[main]
dhcp=internal
dns=default
plugins=keyfile
rc-manager=resolvconf
