# Toolchain for the @h82/dotfiles packages/ Bun workspace.
#
# Pins the Bun runtime/package manager so the workspace builds/tests
# identically:
#   - locally: mise auto-activates this config when you `cd` into packages/.
#   - CI: .github/workflows/ci.yml runs the same Bun package manager version.
#
# Bun is pinned to the exact version in package.json's `packageManager` field.
[tools]
bun = "1.3.14"
