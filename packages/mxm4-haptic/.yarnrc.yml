# Leaf override: use the node-modules linker so plain `tsc` and `node --test`
# resolve dependencies normally (the user-global ~/.yarnrc.yml has no nodeLinker
# set, which defaults Yarn Berry to PnP and would emit .pnp.* files that break
# vanilla tooling). This overrides ONLY nodeLinker — the hardening switches from
# ~/.yarnrc.yml (enableScripts:false, enableImmutableInstalls:true,
# defaultSemverRangePrefix:"" exact pins, npmMinimalAgeGate 1-week cooldown)
# still cascade and are NOT relaxed here.
nodeLinker: node-modules
