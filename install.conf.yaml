# Shared dotbot tasks - loaded by ALL OSes via:
#   mise exec uv@latest -- uvx dotbot -d "$REPO_ROOT" -c install.conf.yaml install.<os>.yaml
#
# Only put links here when the same `~` path works correctly on Linux, macOS,
# AND Windows. OS-specific paths (e.g. ~/Library/... on macOS, ~/AppData/...
# on Windows) belong in install.<os>.yaml.
#
# See AGENTS.md.

- defaults:
    link:
      create: true
      relink: true
      # Repo-managed dotfiles are authoritative; replace real target files.
      force: true

# Cross-platform links. Path layout under home/ mirrors $HOME.
- link:
    # Agent / skills config (used by opencode, claude, etc.)
    ~/.agents/skills: agents/skills
    ~/.agents/.skill-lock.json: agents/.skill-lock.json
    # Claude Code skills dir — same runtime skill tree as ~/.agents/skills.
    ~/.claude/skills: agents/skills

    # opencode top-level JSON config (opencode.json, oh-my-openagent.jsonc,
    # tui.json, etc.). Narrow glob — *.{json,jsonc} only — so subdirs like
    # commands/ and prompts/ stay un-linked here. Commands are explicitly
    # symlinked below from agents/commands/.
    ~/.config/opencode/:
      glob: true
      path: home/.config/opencode/*.{json,jsonc}

    # Shared slash commands / prompts (tool-agnostic) — one source, two
    # consumers. See agents/README.md for the full linkage table.
    ~/.config/opencode/commands: agents/commands
    ~/.codex/prompts: agents/commands

    # zsh config (cross-platform, as long as we avoid macOS-specific syntax in .zshrc)
    ~/.config/zsh/:
      glob: true
      path: home/.config/zsh/.*

    # Link shared agents.md file
    ~/.config/opencode/AGENTS.md: agents/SHARED_AGENTS.md
    ~/.codex/AGENTS.md: agents/SHARED_AGENTS.md
    ~/.claude/CLAUDE.md: agents/SHARED_AGENTS.md

    # git (XDG path, picked up by git on all 3 OSes)
    ~/.config/git/config: home/.config/git/config

    # mise (dev tool version manager, cross-platform)
    ~/.config/mise/config.toml: home/.config/mise/config.toml

    # OpenSSH (Windows OpenSSH uses %USERPROFILE%/.ssh, same path)
    ~/.ssh/config: home/.ssh/config

    # 1Password SSH agent config
    ~/.config/1Password/ssh/agent.toml: home/.config/1Password/ssh/agent.toml

    # mise default-gems list (read by mise/asdf when installing ruby)
    ~/.default-gems: home/.default-gems

    # Yarn 2+ global config (cross-platform)
    ~/.yarnrc.yml: home/.yarnrc.yml

    # npm global config (cross-platform)
    ~/.npmrc: home/.npmrc

- shell:
    - command: mise install
      description: Install tools from mise
      stdout: true
      stderr: true
    - command: mise up
      description: Update tools from mise
      stdout: true
      stderr: true
    - command: mise exec glab -- glab skills install -f --path ./agents/skills
      description: Install or update gitlab cli skills
    # NOT a dotbot symlink on purpose: Codex writes per-project [projects] trust
    # state back into ~/.codex/config.toml and has no include directive, so this
    # merges only the keys from the top-level codex/codex-config.managed.toml and
    # preserves the machine-local rest. No-op when that file has no active keys.
    - command: mise exec node -- node scripts/bootstrap/configure-codex-config.mjs
      description: Merge shared Codex settings into ~/.codex/config.toml
      stdout: true
      stderr: true

# Build the packages/ Yarn workspace (turbo build). The toolchain (Node +
# Yarn 4) comes from packages/mise.toml via `mise -C packages exec`: dotbot's
# shell steps run under non-interactive bash where mise activation from
# ~/.bashrc is NOT loaded, so bare `yarn` is not on PATH (same reason the
# mxm4-haptic crate step uses `mise exec`). `mise trust` whitelists the project
# config (fresh checkouts are untrusted); `mise -C packages install` is a fast
# no-op when Node/Yarn are already present. `yarn install --immutable` is the
# Yarn Berry flag (NOT classic `--frozen-lockfile`) and honors the tracked
# packages/yarn.lock; `yarn build` runs `turbo run build` (root script). This
# only BUILDS in place (dist/, git-ignored) - nothing is installed to
# ~/.local/bin or linked by dotbot. Soft-skips (exit 0) when mise is absent or
# the build fails, mirroring the other bootstrap steps. See packages/README.md.
- shell:
    - command: 'command -v mise >/dev/null 2>&1 && mise trust packages/mise.toml >/dev/null 2>&1 && mise -C packages install >/dev/null 2>&1 && mise -C packages exec -- yarn install --immutable && mise -C packages exec -- yarn build || echo "packages: skipping yarn build (mise unavailable or build failed); build manually with cd packages then yarn install --immutable and yarn build" >&2'
      description: Build the packages/ TypeScript workspace (turbo build via mise; skipped when mise absent)
      stdin: true
      stdout: true
      stderr: true

- link:
    # @h82/opencode-playwright-cli-session-injection plugin (cross-platform).
    # Auto-loaded by OpenCode from ~/.config/opencode/plugins/ (top-level *.js).
    # Linked from the built dist/index.mjs; the .js name (not .mjs) matches
    # OpenCode's auto-scan glob, and the sibling .js.map carries the sourcemap.
    # Only the Linux bootstrap `yarn build`s the workspace, so on macOS/Windows
    # this symlink dangles until `yarn workspace @h82/opencode-playwright-cli-session-injection build` runs.
    ~/.config/opencode/plugins/playwright-cli-session-injection.js: packages/opencode-playwright-cli-session-injection/dist/index.mjs
    ~/.config/opencode/plugins/playwright-cli-session-injection.js.map: packages/opencode-playwright-cli-session-injection/dist/index.mjs.map
