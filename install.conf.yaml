# Shared dotbot tasks - loaded by ALL OSes via:
#   mise exec uv@latest -- uvx dotbot -d "$REPO_ROOT" -c install.conf.yaml install.<os>.yaml
#
# Only put links here when the same `~` path works correctly on Linux, macOS,
# AND Windows. OS-specific paths (e.g. ~/Library/... on macOS, ~/AppData/...
# on Windows) belong in install.<os>.yaml.
#
# See AGENTS.md.

- defaults:
    link:
      create: true
      relink: true
      # Repo-managed dotfiles are authoritative; replace real target files.
      force: true

# Cross-platform links. Path layout under home/ mirrors $HOME.
- link:
    # Agent / skills config (used by opencode, claude, etc.)
    ~/.agents: home/.agents

    # opencode (running this session). Recursive glob picks up everything
    # tracked under home/.config/opencode/, including commands/*.md.
    ~/.config/opencode/:
      glob: true
      path: home/.config/opencode/**

    # Link shared agents.md file
    ~/.config/opencode/AGENTS.md: agents/SHARED_AGENTS.md
    ~/.codex/AGENTS.md: agents/SHARED_AGENTS.md

    # git (XDG path, picked up by git on all 3 OSes)
    ~/.config/git/config: home/.config/git/config

    # mise (dev tool version manager, cross-platform)
    ~/.config/mise/config.toml: home/.config/mise/config.toml

    # Docker CLI (uses %USERPROFILE%/.docker on Windows, same path resolves via ~)
    ~/.docker/config.json: home/.docker/config.json

    # OpenSSH (Windows OpenSSH uses %USERPROFILE%/.ssh, same path)
    ~/.ssh/config: home/.ssh/config

    # 1Password SSH agent config
    ~/.config/1Password/ssh/agent.toml: home/.config/1Password/ssh/agent.toml

    # mise default-gems list (read by mise/asdf when installing ruby)
    ~/.default-gems: home/.default-gems

    # Yarn 2+ global config (cross-platform)
    ~/.yarnrc.yml: home/.yarnrc.yml

    # npm global config (cross-platform)
    ~/.npmrc: home/.npmrc

- shell:
    - command: mise install
      description: Install tools from mise
      stdin: true
      stdout: true
      stderr: true
    - command: mise exec node@latest -- node scripts/bootstrap/render-opencode-prompt-append.mjs
      description: Render OpenCode prompt_append config
      stdout: true
      stderr: true
