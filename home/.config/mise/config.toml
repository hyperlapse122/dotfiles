[tools]
# Core runtimes and package managers
aube = "latest"
bun = "latest"
go = "latest"
node = "latest"
python = "latest"
ruby = [
  { version = "latest", os = [
    "linux",
    "macos",
  ] },
  { version = "3.4", os = [
    "linux",
    "macos",
  ] },
  { version = "3.2", os = [
    "linux",
    "macos",
  ] },
]
rust = { version = "latest", components = "rust-analyzer,rust-src" }
uv = "latest"
yarn = "latest"

# Standalone CLIs and language tooling
ast-grep = "latest"
"cargo:git-trim" = "latest"
glab = { version = "latest", exe = "glab", "postinstall" = "glab skills install --global --force" }
gh = "latest"
"github:rust-lang/rust-analyzer" = "latest"
marksman = "latest"
pipx = { version = "latest", os = ["linux", "macos"], depends = ["python"] }
shellcheck = "latest"
usage = "latest"
"aqua:wasm-bindgen/wasm-pack" = "latest"
"npm:vscode-langservers-extracted" = { version = "latest", depends = ["aube"] }

# npm tools run through aube
"npm:@biomejs/biome" = { version = "latest", depends = ["aube"] }
"npm:@bufbuild/buf" = { version = "latest", depends = ["aube"] }
"npm:@electron/asar" = { version = "latest", depends = ["aube"] }
"npm:@playwright/cli" = { version = "latest", depends = ["aube"] }
"npm:@typescript/native-preview" = { version = "latest", depends = ["aube"] }
"npm:bash-language-server" = { version = "latest", depends = ["aube"] }
"npm:node-gyp" = { version = "latest", depends = ["aube"] }
"npm:npm" = { version = "latest", depends = ["aube"] }
"npm:portless" = { version = "latest", depends = ["aube"] }
"npm:shadcn" = { version = "latest", depends = ["aube"] }
"npm:sharp-cli" = { version = "latest", depends = ["aube"] }
"npm:tokscale" = { version = "latest", depends = ["aube"] }
"npm:typescript-language-server" = { version = "latest", depends = ["aube"] }
"npm:wrangler" = { version = "latest", depends = ["aube"] }

# Agentic AI
claude-code = "latest"
"npm:@google/gemini-cli" = { version = "latest", depends = ["aube"] }
"npm:@openai/codex" = { version = "latest", depends = ["aube"] }
"github:njbrake/agent-of-empires" = { version = "latest", rename_exe = "aoe", os = [
  "linux",
  "macos",
] }

# Docker credential helpers from docker/docker-credential-helpers. The
# release ships pass + secretservice + osxkeychain + wincred as four
# separate raw binaries under one tag. mise's "Multiple Assets from the
# Same Release" pattern handles this: define one tool_alias per binary
# pointing at the same github: repo, then configure each alias with its
# own asset_pattern. Each platform installs only its native helper:
#   Linux → docker-credential-secretservice (D-Bus Secret Service backend)
#   macOS → docker-credential-osxkeychain   (Keychain.app backend)
# The shims expose these on PATH so the cross-platform wrapper
# home/.local/bin/docker-credential-dockerhub can `exec` whichever one
# matches `uname -s`. See ~/.docker/config.json (`credsStore: dockerhub`).
[tool_alias]
docker-credential-secretservice = "github:docker/docker-credential-helpers"
docker-credential-osxkeychain = "github:docker/docker-credential-helpers"

[tools.docker-credential-secretservice]
version = "latest"
os = ["linux"]
bin = "docker-credential-secretservice"

[tools.docker-credential-secretservice.platforms]
linux-x64 = { asset_pattern = "docker-credential-secretservice-v*.linux-amd64" }
linux-arm64 = { asset_pattern = "docker-credential-secretservice-v*.linux-arm64" }

[tools.docker-credential-osxkeychain]
version = "latest"
os = ["macos"]
bin = "docker-credential-osxkeychain"

[tools.docker-credential-osxkeychain.platforms]
macos-x64 = { asset_pattern = "docker-credential-osxkeychain-v*.darwin-amd64" }
macos-arm64 = { asset_pattern = "docker-credential-osxkeychain-v*.darwin-arm64" }

[tools."github:anomalyco/opencode"]
version = "latest"
rename_exe = "opencode"
os = ["linux", "macos"]

[tools."github:anomalyco/opencode".platforms]
linux-arm64 = { asset_pattern = "opencode-linux-arm64.tar.gz" }
linux-x64 = { asset_pattern = "opencode-linux-x64-baseline.tar.gz" }
macos-arm64 = { asset_pattern = "opencode-darwin-arm64.zip" }
macos-x64 = { asset_pattern = "opencode-darwin-x64-baseline.zip" }

[tools."github:wakatime/wakatime-cli"]
version = "latest"
rename_exe = "wakatime-cli"
os = ["linux", "macos"]

[tools."github:wakatime/wakatime-cli".platforms]
linux-arm64 = { asset_pattern = "wakatime-cli-linux-arm64.zip" }
linux-x64 = { asset_pattern = "wakatime-cli-linux-amd64.zip" }
macos-arm64 = { asset_pattern = "wakatime-cli-darwin-arm64.zip" }
macos-x64 = { asset_pattern = "wakatime-cli-darwin-amd64.zip" }

[settings]
all_compile = false
experimental = true
idiomatic_version_file_enable_tools = []

[settings.ruby]
compile = false

[env]
OPENCODE_DISABLE_CLAUDE_CODE = 1
OPENCODE_DISABLE_CLAUDE_CODE_PROMPT = 1
OPENCODE_DISABLE_CLAUDE_CODE_SKILLS = 1
OPENCODE_EXPERIMENTAL_WEBSOCKETS = 1
OMO_SEND_ANONYMOUS_TELEMETRY = 0
