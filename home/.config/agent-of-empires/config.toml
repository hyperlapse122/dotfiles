default_profile = ""

[acp]
default_agent = "aoe-agent"
force_end_turn_threshold_secs = 30
max_concurrent_resumes = 4
max_concurrent_workers = 5
node_path = ""
queue_drain_mode = "combined"
replay_bytes = 5242880
replay_events = 0
show_tool_durations = true
silent_orphan_fast_grace_secs = 20
silent_orphan_grace_secs = 120

[app_state]
has_acknowledged_agent_hooks = false
has_seen_custom_instruction_warning = false
has_seen_welcome = true
last_seen_version = "1.9.2"

[diff]
context_lines = 3

[hooks]
on_create = [
    "git submodule update --init",
    "mise trust",
    "mise install",
]
on_destroy = ["git submodule deinit -f --all"]

[logging]
default_level = "info"
file_path = "debug.log"
keep_count = 5
max_size_mib = 50
output = "file"
rotation = "size"
show_spans = false

[logging.targets]

[sandbox]
auto_cleanup = true
container_runtime = "podman"
default_image = "ghcr.io/agent-of-empires/aoe-sandbox:latest"
default_terminal_mode = "host"
enabled_by_default = false
environment = [
    "TERM",
    "COLORTERM",
    "FORCE_COLOR",
    "NO_COLOR",
]
extra_volumes = []
mount_ssh = false
volume_ignores = []

[session]
agent_status_hooks = true
click_action = "live_send"
default_attach_mode = "tmux"
default_tool = "opencode"
live_send_exit_chord = "C-q"
new_session_attach_mode = "tmux"
restart_wake_message = "wake up: pick up what you were doing"
row_tag = "none"
session_id_poller_max_threads = 50
snooze_duration_minutes = 30
strict_hotkeys = false
yolo_mode_default = false

[sound]
enabled = true
mode = "random"

[status_hooks]
enabled = false

[theme]
color_mode = "truecolor"
idle_decay_minutes = 0
name = ""

[tmux]
clipboard = "auto"
mouse = "auto"
status_bar = "auto"

[updates]
check_interval_hours = 24
notify_in_cli = true
update_check_mode = "notify"
web_poll_interval_minutes = 60

[web]
notifications_enabled = true
notify_on_error = true
notify_on_idle = false
notify_on_waiting = true
notify_on_wake_fire = true

[worktree]
auto_cleanup = true
bare_repo_path_template = "./{branch}"
delete_branch_on_cleanup = true
enabled = true
init_submodules = true
path_template = "../{repo-name}-worktrees/{branch}"
show_branch_in_tui = true
workspace_path_template = "../{branch}-workspace-{session-id}"
