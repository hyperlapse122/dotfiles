# Point Docker-API clients at the rootless user podman.socket.
DOCKER_HOST=unix://${XDG_RUNTIME_DIR}/podman/podman.sock

# Testcontainers + rootless Podman + SELinux enforcing: the Ryuk resource-reaper
# container (container_t) is bind-mounted podman.sock, which lives under
# $XDG_RUNTIME_DIR (user_tmp_t), and enforcing policy blocks container_t writing
# a user_tmp_t sock_file. Running Ryuk privileged makes it run unconfined (spc_t),
# bypassing the denial. In rootless mode "privileged" only drops confinement
# inside the user's own namespace, not host root. The two libraries name the var
# differently, so set both: .NET uses TESTCONTAINERS_RYUK_CONTAINER_PRIVILEGED,
# Node uses TESTCONTAINERS_RYUK_PRIVILEGED.
TESTCONTAINERS_RYUK_CONTAINER_PRIVILEGED=true
TESTCONTAINERS_RYUK_PRIVILEGED=true
