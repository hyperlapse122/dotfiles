# Stop WirePlumber auto-switching Bluetooth headsets to the HFP/HSP
# "headset" profile whenever an app opens an input stream.
#
# AirPods / Galaxy Buds 4 collapse the fragile Hands-Free transport when
# something grabs the mic (browser tab, screen recorder, voice probe),
# which logs as:
#   bluetoothd: ext_io_disconnected() Unable to get io data for
#   Hands-Free Voice gateway: getpeername: Transport endpoint is not
#   connected (107)
# and drops the whole device. Disabling the auto-switch keeps the buds in
# stable high-quality A2DP and stops the switch storm.
#
# The microphone is NOT removed — the headset profile is still available;
# it just won't be selected automatically. Pick "Headset" manually in the
# audio settings (or `wpctl set-profile`) for the rare times you need the
# bud mic.
#
# Setting schema: wireplumber.conf -> wireplumber.settings.schema
#   bluetooth.autoswitch-to-headset-profile (bool, default true)
# WirePlumber 0.5 user drop-in (SPA-JSON). Loaded after the shipped
# defaults from ~/.config/wireplumber/wireplumber.conf.d/.
wireplumber.settings = {
  bluetooth.autoswitch-to-headset-profile = false
}
