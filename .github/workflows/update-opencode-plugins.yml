name: Update opencode plugins

# Periodically check the npm registry for newer versions of the opencode plugins
# pinned in the opencode config, bump them in place, and open a pull request.
# The plugins live in readonly_opencode.json's `plugin` array; both config files
# reference the same npm packages, so the same "<name>@<version>" substitution is
# applied to each file (a no-op on whichever file does not contain the string).

on:
  schedule:
    # Weekly, Mondays 06:00 UTC — batches updates and lets fresh releases settle a
    # few days before a PR is proposed. Adjust the cron to taste.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-opencode-plugins
  cancel-in-progress: false

jobs:
  update-plugins:
    name: Check npm for opencode plugin updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Bump pinned plugin versions to npm latest
        id: update
        run: |
          set -euo pipefail

          config="dot_config/opencode/readonly_opencode.json"
          files=(
            "dot_config/opencode/readonly_opencode.json"
            "dot_config/opencode/readonly_oh-my-openagent.jsonc"
          )

          updates=""
          has_updates=false

          # Each plugin entry is "<name>@<version>"; ${entry%@*}/${entry##*@} split
          # on the LAST '@', so scoped names like @scope/pkg@1.2.3 parse correctly.
          while IFS= read -r entry; do
            [ -n "$entry" ] || continue
            name="${entry%@*}"
            current="${entry##*@}"

            latest="$(npm view "$name" version 2>/dev/null || true)"
            if [ -z "$latest" ]; then
              echo "::warning::could not resolve latest version for ${name}; leaving at ${current}"
              continue
            fi
            if [ "$current" = "$latest" ]; then
              echo "${name} is up to date (${current})"
              continue
            fi

            echo "${name}: ${current} -> ${latest}"
            old="${name}@${current}"
            new="${name}@${latest}"
            # Escape BRE metacharacters in the search string; '|' is the sed
            # delimiter so the scoped-name '/' needs no special handling.
            old_esc="$(printf '%s' "$old" | sed -e 's/[][\.*^$/]/\\&/g')"
            for f in "${files[@]}"; do
              sed -i "s|${old_esc}|${new}|g" "$f"
            done

            updates="${updates}- ${name}: ${current} -> ${latest}"$'\n'
            has_updates=true
          done < <(jq -r '.plugin[]' "$config")

          echo "has_updates=${has_updates}" >> "$GITHUB_OUTPUT"

          if [ "$has_updates" = true ]; then
            body="Automated update of opencode plugin versions pinned in the opencode config."$'\n\n'
            body="${body}Files:"$'\n'
            body="${body}- dot_config/opencode/readonly_opencode.json"$'\n'
            body="${body}- dot_config/opencode/readonly_oh-my-openagent.jsonc"$'\n\n'
            body="${body}Updates (npm registry latest tag):"$'\n'
            body="${body}${updates}"
            {
              echo "body<<PR_BODY_EOF"
              printf '%s\n' "$body"
              echo "PR_BODY_EOF"
            } >> "$GITHUB_OUTPUT"
            {
              echo "### opencode plugin updates"
              echo ""
              printf '%s\n' "$updates"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "All opencode plugins are up to date." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create or update pull request
        if: steps.update.outputs.has_updates == 'true'
        # Third-party action pinned to a full commit SHA (v8.1.1) per GitHub's
        # hardening guidance; bump the SHA + comment together to move versions.
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: chore/update-opencode-plugins
          delete-branch: true
          # Create verified commits through the API — no local git identity/config
          # is touched, and commits are attributed to github-actions[bot].
          sign-commits: true
          add-paths: |
            dot_config/opencode/readonly_opencode.json
            dot_config/opencode/readonly_oh-my-openagent.jsonc
          commit-message: "chore(opencode): update pinned plugin versions"
          title: "chore(opencode): update pinned plugin versions"
          body: ${{ steps.update.outputs.body }}
