name: opencode-plugin-updates

# Hourly check for new releases of the opencode plugins pinned in
# home/.config/opencode/opencode.json. Each plugin is handled by the reusable
# update-opencode-plugin.yml workflow, fanned out over a matrix: one entry per
# plugin. When an upstream release is newer than the pinned version, the
# reusable workflow opens a PR bumping it.
#
# To track a NEW plugin: add one entry to the matrix below — its package name
# (exactly as written in the opencode config "plugin" array) and the GitHub
# "owner/repo" that publishes its releases. Nothing else needs to change.

on:
  schedule:
    - cron: "0 * * * *" # hourly, on the hour (UTC)
  workflow_dispatch: # allow manual runs

# Grant the reusable workflow what it needs to push a branch and open PRs.
permissions:
  contents: write
  pull-requests: write

# Don't stack hourly runs; let an in-flight run finish before the next starts.
concurrency:
  group: opencode-plugin-updates
  cancel-in-progress: false

jobs:
  check:
    strategy:
      # Independent plugins; one failing check shouldn't abort the others.
      fail-fast: false
      matrix:
        include:
          - plugin: oh-my-openagent
            repository: code-yeongyu/oh-my-openagent
          - plugin: "@ex-machina/opencode-anthropic-auth"
            repository: ex-machina-co/opencode-anthropic-auth
    uses: ./.github/workflows/update-opencode-plugin.yml
    with:
      plugin: ${{ matrix.plugin }}
      repository: ${{ matrix.repository }}
    permissions:
      contents: write
      pull-requests: write
