name: CI

on:
  push:
  pull_request:

jobs:
  ts-workspace:
    name: TypeScript workspace (packages/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages
    steps:
      - uses: actions/checkout@v7
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run -r build
      - run: vp run -r typecheck
      - run: vp run -r test
      - run: vp check

  rust-crate:
    name: Rust crate (crates/mxm4-haptic/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mxm4-haptic
    steps:
      - uses: actions/checkout@v7
      - name: Install libudev (hidapi linux-static-hidraw backend)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --all-targets
      - run: cargo test
      - run: cargo fmt --check

  open-design-integration:
    name: Open Design integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install chezmoi
        run: |
          set -euo pipefail
          sh -c "$(curl -fsLS https://get.chezmoi.io)" -- -b "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Run isolated Open Design integration
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .ci/test-open-design-integration.sh

  # NOTE: shellcheck moved to the `render-dotfiles` workflow's `shellcheck` job,
  # which runs after the Fedora/Ubuntu render so it can lint the REAL rendered
  # scripts (including the `.chezmoiscripts/**` templates shellcheck cannot parse
  # in `.tmpl` form) plus the repo-meta scripts. It is therefore PR-only.
