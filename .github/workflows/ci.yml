name: CI

on:
  push:
  pull_request:

jobs:
  ts-workspace:
    name: TypeScript workspace (packages/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages
    steps:
      - uses: actions/checkout@v7
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true
      - run: vp install --frozen-lockfile
      - run: vp run -r build
      - run: vp run -r typecheck
      - run: vp run -r test
      - run: vp check

  rust-crate:
    name: Rust crate (crates/mxm4-haptic/)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crates/mxm4-haptic
    steps:
      - uses: actions/checkout@v7
      - name: Install libudev (hidapi linux-static-hidraw backend)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --all-targets
      - run: cargo test
      - run: cargo fmt --check

  shell-lint:
    name: Shellcheck (plain .sh scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: shellcheck
        run: |
          shellcheck \
            .install-prerequisites.sh \
            dot_local/bin/executable_setup-luks-tpm2-unlock.sh \
            .ci/smoke-ubuntu-studio-audio.sh

  ubuntu-studio-smoke:
    name: Ubuntu Studio pro-audio smoke (ubuntu:26.04)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Smoke-test pro-audio provisioning in ubuntu:26.04
        run: |
          # Fallback to ubuntu:rolling if the 26.04 tag is not yet published at run time.
          podman run --rm -v "$PWD":/repo:ro docker.io/library/ubuntu:26.04 \
            bash /repo/.ci/smoke-ubuntu-studio-audio.sh
