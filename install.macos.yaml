# macOS-only dotbot tasks - loaded by install.sh when uname -s = Darwin.

- defaults:
    link:
      create: true
      relink: true
      # Repo-managed dotfiles are authoritative; replace real target files.
      force: true

- link:
    # zsh (zprezto-based; same path on Linux - duplicated in install.linux.yaml).
    # Glob picks up every home/.z* dotfile (.zshrc, .zshenv, .zprofile, .zlogin,
    # .zlogout, .zpreztorc) without listing each.
    ~/:
      glob: true
      path: home/.z*

    # GnuPG (macOS gpg from brew respects ~/.gnupg; Windows uses %APPDATA%/gnupg).
    # Only *.conf is linked - we don't want random gpg state files mirrored.
    ~/.gnupg/:
      glob: true
      path: home/.gnupg/*.conf

    # Per-OS git overrides (referenced via [include] in home/.config/git/config)
    ~/.gitconfig.d/macos.gitconfig: home/.gitconfig.d/macos.gitconfig

    # VS Code on macOS - source is the same, target path differs from Linux.
    # Only the two tracked *.json files (VS Code writes lots of User/ state).
    ~/Library/Application Support/Code/User/:
      glob: true
      path: home/.config/Code/User/*.json

    # Docker credential helpers (Linux/macOS only - Windows uses PATHEXT and
    # expects .exe/.bat/.cmd, see header comments in each script). Source
    # files are tracked at mode 100755; the symlink preserves the exec bit.
    ~/.local/bin/docker-credential-gh: home/.local/bin/docker-credential-gh
    ~/.local/bin/docker-credential-glab: home/.local/bin/docker-credential-glab

    # opencode mise wrapper (POSIX side; Windows ships opencode.ps1, see
    # install.windows.yaml). Resolves the latest release version from GitHub
    # at invocation time and hands it to `mise exec`.
    ~/.local/bin/opencode: home/.local/bin/opencode

# Configure glab with script
- shell:
    - command: sh scripts/setup-glab.sh
      description: Set up glab cli
      stdin: true
      stdout: true
      stderr: true

# Render tracked *.1password templates into ~/.secrets. The helper no-ops when
# no templates exist; when templates are present it requires an authenticated
# `op` CLI session.
- shell:
    - command: bash scripts/inject-1password-secrets.sh
      description: Inject 1Password templates into ~/.secrets
      stdin: true
      stdout: true
      stderr: true

# Install desktop fonts to ~/Library/Fonts/ (no admin). Idempotent: skips
# fonts already present via marker check. Pass `--force` to reinstall.
- shell:
    - command: bash scripts/install-fonts.sh
      description: Install desktop fonts user-wide (Pretendard, JetBrains Mono, D2Coding, Nerd Font variants)
      stdin: true
      stdout: true
      stderr: true

# macOS rarely needs root-owned files in /etc/. If you ever do, mirror the
# Linux pattern: place files under system/macos/ and `shell:` out via
# `sudo install -D -m <mode>`. See AGENTS.md "Root-owned config".
- shell: []
