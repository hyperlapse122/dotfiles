# macOS-only dotbot tasks - loaded by install.sh when uname -s = Darwin.

- defaults:
    link:
      create: true
      relink: true
      # Repo-managed dotfiles are authoritative; replace real target files.
      force: true

- link:
    # zsh (zprezto-based; same path on Linux - duplicated in install.linux.yaml).
    # Glob picks up every home/.z* dotfile (.zshrc, .zshenv, .zprofile, .zlogin,
    # .zlogout, .zpreztorc) without listing each.
    ~/:
      glob: true
      path: home/.z*

    # GnuPG (macOS gpg from brew respects ~/.gnupg; Windows uses %APPDATA%/gnupg).
    # Only *.conf is linked - we don't want random gpg state files mirrored.
    ~/.gnupg/:
      glob: true
      path: home/.gnupg/*.conf

    # Per-OS git overrides (referenced via [include] in home/.config/git/config)
    ~/.gitconfig.d/macos.gitconfig: home/.gitconfig.d/macos.gitconfig

    # VS Code on macOS - source is the same, target path differs from Linux.
    # Only the two tracked *.json files (VS Code writes lots of User/ state).
    ~/Library/Application Support/Code/User/:
      glob: true
      path: home/.config/Code/User/*.json

    # VSCodium on macOS - source is the same, target path differs from Linux.
    # Only the two tracked *.json files (VSCodium writes lots of User/ state).
    ~/Library/Application Support/VSCodium/User/:
      glob: true
      path: home/.config/VSCodium/User/*.json

    # opencode mise wrapper (POSIX side; Windows ships opencode.ps1, see
    # install.windows.yaml). Resolves the latest release version from GitHub
    # at invocation time and hands it to `mise exec`.
    ~/.local/bin/opencode: home/.local/bin/opencode

    # code -> codium shim (POSIX side; Windows ships code.ps1, see
    # install.windows.yaml). Runs VS Codium when `code` is invoked.
    ~/.local/bin/code: home/.local/bin/code

    # Codex lifecycle hooks (https://developers.openai.com/codex/hooks): pulse the
    # MX Master 4 on Stop -> COMPLETED and PermissionRequest -> RINGING via the
    # mxm4-haptic client, mirroring the @h82/opencode-mxm4-haptic OpenCode plugin.
    # Codex never writes back to hooks.json (unlike config.toml), so it is a plain
    # symlink. Linked on Linux + macOS only — the mxm4-haptic client is built
    # there (not on Windows). Non-managed command hooks must be trusted once via
    # `/hooks` in the Codex CLI before they run.
    ~/.codex/hooks.json: codex/hooks.json

    # launchd LaunchAgent for the MX Master 4 haptic daemon — the macOS
    # counterpart of the Linux systemd --user unit. Runs ~/.local/bin/mxm4-hapticd
    # (built by the cargo install step below) at login and keeps it alive. The
    # notification bridge has no agent: it is Linux-only and exits on macOS.
    ~/Library/LaunchAgents/dev.h82.mxm4-hapticd.plist: home/Library/LaunchAgents/dev.h82.mxm4-hapticd.plist

- shell:
    - command: rm -f ~/.docker/config.json
      description: Remove stale ~/.docker/config.json on macOS
      stdin: true
      stdout: true
      stderr: true

# Configure glab with script
- shell:
    - command: sh scripts/auth/setup-glab.sh
      description: Set up glab cli
      stdin: true
      stdout: true
      stderr: true

# Render tracked *.1password templates into ~/.secrets. The helper no-ops when
# no templates exist; when templates are present it requires an authenticated
# `op` CLI session.
- shell:
    - command: bash scripts/bootstrap/inject-1password-secrets.sh
      description: Inject 1Password templates into ~/.secrets
      stdin: true
      stdout: true
      stderr: true

# Install desktop fonts to ~/Library/Fonts/ (no admin). Idempotent: skips
# fonts already present via marker check. Pass `--force` to reinstall.
- shell:
    - command: bash scripts/bootstrap/install-fonts.sh
      description: Install desktop fonts user-wide (Pretendard, JetBrains Mono, D2Coding, Nerd Font variants)
      stdin: true
      stdout: true
      stderr: true

# Build + install the mxm4-haptic crate on macOS. Only the daemon and the thin
# client are installed (`--bin`): the notify bridge is Linux-only and would be a
# no-op stub here. hidapi pulls in the system IOKit/CoreFoundation frameworks
# (Xcode Command Line Tools provide the C toolchain) — no extra packages, no
# libudev (that is the Linux hidraw backend only). `mise exec rust@latest`
# because dotbot's shell steps run under non-interactive bash with no mise
# activation; `--root ~/.local` matches dotbot's linked ~/.local/bin entries;
# `--locked` honors Cargo.lock; `--force` makes re-runs idempotent. Soft-skips
# (exit 0) when cargo is unavailable. See crates/README.md.
- shell:
    - command: 'command -v cargo >/dev/null 2>&1 && mise exec rust@latest -- cargo install --path crates/mxm4-haptic --root "$HOME/.local" --bin mxm4-hapticd --bin mxm4-haptic --locked --force --quiet || echo "mxm4-haptic: cargo unavailable; skipping build" >&2'
      description: Build + install mxm4-haptic daemon + client to ~/.local/bin (macOS; notify bridge is Linux-only)
      stdin: true
      stdout: true
      stderr: true

# Load the mxm4-hapticd launchd agent now that its binary is built and the
# plist is linked (the link entry above). `bootout` before `bootstrap` makes
# re-runs idempotent (reload with the current plist); the `|| true` swallows
# bootout's "not loaded" on a first run. RunAtLoad starts it immediately and at
# every login. Guarded soft-skip: requires the built binary AND a GUI session
# (`gui/$(id -u)` domain is absent in SSH/CI/headless runs) — in that case it
# prints a hint and exits 0 (load manually once logged in, see
# home/Library/LaunchAgents/README.md).
- shell:
    - command: 'if [ -x "$HOME/.local/bin/mxm4-hapticd" ] && command -v launchctl >/dev/null 2>&1; then launchctl bootout "gui/$(id -u)/dev.h82.mxm4-hapticd" 2>/dev/null || true; launchctl bootstrap "gui/$(id -u)" "$HOME/Library/LaunchAgents/dev.h82.mxm4-hapticd.plist" 2>/dev/null && echo "mxm4-haptic: launchd agent loaded" || echo "mxm4-haptic: skipping launchd load (no GUI session?); load manually, see home/Library/LaunchAgents/README.md" >&2; else echo "mxm4-haptic: skipping launchd load (binary or launchctl missing)" >&2; fi'
      description: Load mxm4-hapticd launchd agent (macOS; skipped when binary missing or no GUI session)
      stdin: true
      stdout: true
      stderr: true

# Generate the zsh completion for the mxm4-haptic client into
# ~/.config/zsh/completions/_mxm4-haptic (on fpath via the linked .zprofile).
# Same mechanism as Linux: the client emits its CLI spec with `--usage` and
# `usage` bakes a static completion. A generated artifact, NOT tracked.
# Soft-skips when the binary wasn't built or mise is unavailable.
- shell:
    - command: 'command -v mise >/dev/null 2>&1 && [ -x "$HOME/.local/bin/mxm4-haptic" ] && { mkdir -p "$HOME/.config/zsh/completions" && "$HOME/.local/bin/mxm4-haptic" --usage | mise exec usage@latest -- usage generate completion zsh mxm4-haptic -f - > "$HOME/.config/zsh/completions/_mxm4-haptic"; } || echo "mxm4-haptic: skipping zsh completion (binary or mise unavailable)" >&2'
      description: Generate _mxm4-haptic zsh completion via usage (macOS; skipped when binary/mise absent)
      stdin: true
      stdout: true
      stderr: true

# macOS rarely needs root-owned files in /etc/. If you ever do, mirror the
# Linux pattern: place files under system/macos/ and `shell:` out via
# `sudo install -D -m <mode>`. See AGENTS.md "Root-owned config".
- shell: []
