# codex/codex-config.managed.toml
#
# Tracked, repo-managed OpenAI Codex settings. `configure-codex-config.mjs`
# (run on Bun) merges every active assignment below INTO the machine-local
# `$CODEX_HOME/config.toml` (default `~/.codex/config.toml`), creating or
# overwriting only the settings declared here and leaving everything else in
# that file untouched.
#
# WHY a renderer instead of a dotbot symlink:
#   Codex writes machine-local state back into `~/.codex/config.toml` itself —
#   most notably per-project trust decisions under `[projects."<path>"]`
#   (trust_level = "trusted") and the plugin/AOE `[[hooks.*]]` entries it
#   manages. A symlink would let Codex mutate this repo on every "trust this
#   folder?" prompt, and Codex has no `include`/import directive to merge a
#   separate file in. So this file holds ONLY the shared keys; the script
#   applies them and PRESERVES the machine-local remainder (the `[projects]`
#   trust table, machine-written hooks, and anything else you or Codex added).
#
# FORMAT — this is full TOML, parsed by Bun's `Bun.TOML.parse`:
#   * Any valid TOML is accepted: scalars, nested `[table]` / `[table.sub]`
#     headers, inline arrays, and array-of-tables (`[[a.b]]`, as the hooks use
#     below). The old "one single-line key = value per line" restriction is gone.
#   * HOW IT MERGES: scalar keys (including scalar keys under plain `[table]`
#     headers) are merged in place into the live config, key by key. Any subtree
#     that contains an array-of-tables (the `hooks` block below) is re-serialized
#     and written as one sentinel-fenced managed block (the renderer emits a
#     `# >>> managed ... >>>` / `# <<< ... <<<` fence at EOF) that is replaced in
#     place on every re-run.
#   * Do NOT declare a `[projects]` table here — that namespace is machine-local
#     trust state and the renderer refuses to manage it.
#
# Editing a value here re-points that key on the next bootstrap (`./install.sh`
# / `.\install.ps1`) or by running `scripts/bootstrap/configure-codex-config.sh`
# / `.ps1` manually. The renderer is idempotent and only ADDS/UPDATES: deleting
# a scalar line here does NOT remove that key from `~/.codex/config.toml`, and
# removing the hooks block does NOT delete an already-written managed block —
# drop unwanted keys/blocks from the live file by hand.

# --- Top-level (root-table) keys ------------------------------------------
# (Examples you could add: model = "gpt-5-codex", approval_policy = "on-request",
#  or a sub-table such as `[tui]` then `theme = "dark"`.)
cli_auth_credentials_store = "keyring"
suppress_unstable_features_warning = true

# --- Codex lifecycle hooks (MX Master 4 haptics) --------------------------
# Pulse the MX Master 4's built-in haptics on Codex lifecycle events via the
# `mxm4-haptic` client (~/.local/bin/mxm4-haptic -> the mxm4-hapticd daemon) —
# the Codex counterpart of the @h82/opencode-mxm4-haptic OpenCode plugin. Each
# event is an ARRAY of matcher-groups (`[[hooks.Stop]]`), and each group holds a
# `hooks` array of handlers (`[[hooks.Stop.hooks]]`); `Stop` and
# `PermissionRequest` ignore the matcher, so each group is unfiltered. The
# `|| true` guard and 5 s `timeout` keep a missing client or down daemon from
# ever failing or stalling a Codex turn. Codex requires trusting non-managed
# command hooks once via `/hooks` in the CLI before they run.
[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = "\"$HOME/.local/bin/mxm4-haptic\" COMPLETED || true"
timeout = 5
statusMessage = "mxm4-haptic: COMPLETED"

[[hooks.PermissionRequest]]

[[hooks.PermissionRequest.hooks]]
type = "command"
command = "\"$HOME/.local/bin/mxm4-haptic\" RINGING || true"
timeout = 5
statusMessage = "mxm4-haptic: RINGING"
