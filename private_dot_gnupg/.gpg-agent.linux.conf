# Desktop-aware pinentry, resolved at RENDER time (file content cannot branch at
# runtime — same mechanism as the solaar rules template) from the `desktop` fact
# (.chezmoidata/facts.yaml, resolved in .chezmoitemplates/facts.tmpl): `gnome`
# means gnome-shell on PATH WITHOUT plasmashell (KDE wins when both are present);
# with neither desktop (headless, container, CI) the fact is `none` and the Qt
# variant renders — deterministic artifacts, inert without a desktop.
# pinentry-gnome3 prompts through the shell via gcr (system-modal), matching
# GNOME; pinentry-qt matches Plasma and honours PINENTRY_KDE_USE_WALLET
# (environment.d/70-desktop.conf).
{{ $f := includeTemplate "facts.tmpl" . | fromYaml -}}
{{ if eq $f.desktop "gnome" -}}
pinentry-program /usr/bin/pinentry-gnome3
{{ else -}}
pinentry-program /usr/bin/pinentry-qt
{{ end -}}
