# Desktop-aware pinentry, resolved at RENDER time via lookPath (file content
# cannot branch at runtime — same mechanism as the solaar rules template):
# GNOME-only means gnome-shell on PATH without plasmashell; with neither
# desktop (headless, container, CI) the Qt variant renders — deterministic
# artifacts, inert without a desktop. pinentry-gnome3 prompts through the
# shell via gcr (system-modal), matching GNOME; pinentry-qt matches Plasma
# and honours PINENTRY_KDE_USE_WALLET (environment.d/70-desktop.conf).
{{ if and (lookPath "gnome-shell") (not (lookPath "plasmashell")) -}}
pinentry-program /usr/bin/pinentry-gnome3
{{ else -}}
pinentry-program /usr/bin/pinentry-qt
{{ end -}}
