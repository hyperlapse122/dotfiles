# AirPods gesture media control (play/pause/skip) rides on AVRCP, and AirPods
# only send AVRCP commands to a peer that advertises an AVRCP *player*. Linux
# has no MPRIS<->AVRCP bridge running by default, so the taps go nowhere.
# WirePlumber's dummy AVRCP player registers exactly that endpoint, which is
# what makes the gestures reach the desktop (LibrePods then acts on them).
#
# Do NOT run BlueZ's `mpris-proxy` alongside WirePlumber to get this: it
# registers its own competing AVRCP player, conflicts with WirePlumber's
# bluez5 monitor, and BREAKS media controls rather than fixing them. It is the
# PulseAudio-era answer; this host is PipeWire + WirePlumber, so the fix is the
# in-tree dummy player below.
monitor.bluez.properties = {
  bluez5.dummy-avrcp-player = true
}
