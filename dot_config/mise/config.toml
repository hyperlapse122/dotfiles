[tools]
# Core runtimes and package managers
bun = "latest"
go = "latest"
node = "latest"
python = "latest"
ruby = [
  { version = "latest", os = [
    "linux",
    "macos",
  ] },
  { version = "3.4", os = [
    "linux",
    "macos",
  ] },
]
rust = { version = "latest", components = "rust-analyzer,rust-src" }
uv = "latest"
yarn = "latest"

# Standalone CLIs and language tooling
ast-grep = "latest"
"cargo:git-trim" = "latest"
glab = { version = "latest", exe = "glab" }
gh = "latest"
"github:rust-lang/rust-analyzer" = "latest"
marksman = "latest"
pipx = { version = "latest", os = ["linux", "macos"], depends = ["python"] }
shellcheck = "latest"
usage = "latest"
"aqua:wasm-bindgen/wasm-pack" = "latest"
"npm:vscode-langservers-extracted" = { version = "latest" }
"npm:@biomejs/biome" = { version = "latest" }
"npm:@bufbuild/buf" = { version = "latest" }
"npm:@electron/asar" = { version = "latest" }
"npm:@playwright/cli" = { version = "latest" }
"npm:bash-language-server" = { version = "latest" }
"npm:node-gyp" = { version = "latest" }
"npm:npm" = { version = "latest" }
"npm:portless" = { version = "latest" }
"npm:shadcn" = { version = "latest" }
"npm:sharp-cli" = { version = "latest" }
"npm:tokscale" = { version = "latest" }
"npm:typescript-language-server" = { version = "latest" }
"npm:wrangler" = { version = "latest" }
"npm:yaml-language-server" = "latest"

# Local Kubernetes development environment
helm = "latest"
minikube = "latest"
kubectl = "latest"

# Agentic AI
claude-code = "latest"
"npm:@google/gemini-cli" = { version = "latest" }
"npm:@openai/codex" = "latest"
"github:njbrake/agent-of-empires" = { version = "latest", rename_exe = "aoe", os = [
  "linux",
  "macos",
] }
antigravity-cli = "latest"

[tools."github:anomalyco/opencode"]
version = "latest"
rename_exe = "opencode"
os = ["linux", "macos"]

[tools."github:anomalyco/opencode".platforms]
linux-arm64 = { asset_pattern = "opencode-linux-arm64.tar.gz" }
linux-x64 = { asset_pattern = "opencode-linux-x64-baseline.tar.gz" }
macos-arm64 = { asset_pattern = "opencode-darwin-arm64.zip" }
macos-x64 = { asset_pattern = "opencode-darwin-x64-baseline.zip" }

[tools."github:wakatime/wakatime-cli"]
version = "latest"
rename_exe = "wakatime-cli"
os = ["linux", "macos"]

[tools."github:wakatime/wakatime-cli".platforms]
linux-arm64 = { asset_pattern = "wakatime-cli-linux-arm64.zip" }
linux-x64 = { asset_pattern = "wakatime-cli-linux-amd64.zip" }
macos-arm64 = { asset_pattern = "wakatime-cli-darwin-arm64.zip" }
macos-x64 = { asset_pattern = "wakatime-cli-darwin-amd64.zip" }

[settings]
all_compile = false
experimental = true
idiomatic_version_file_enable_tools = []
minimum_release_age = "24h"
minimum_release_age_excludes = [
  "gh",
  "glab",
  "claude-code",
  "pipx",
  "npm:@google/gemini-cli",
  "npm:@openai/codex",
  "github:njbrake/agent-of-empires",
  "github:anomalyco/opencode",
  "github:wakatime/wakatime-cli",
]

[settings.ruby]
compile = false

[settings.python]
compile = false

[env]
OPENCODE_DISABLE_CLAUDE_CODE = 1
OPENCODE_DISABLE_CLAUDE_CODE_PROMPT = 1
OPENCODE_DISABLE_CLAUDE_CODE_SKILLS = 1
OPENCODE_EXPERIMENTAL_WEBSOCKETS = 1
OPENCODE_EXPERIMENTAL_WORKSPACES = 1
OMO_SEND_ANONYMOUS_TELEMETRY = 0
OMO_CODEX_SEND_ANONYMOUS_TELEMETRY = 0
