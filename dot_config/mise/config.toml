# Division of labour: mise owns the language runtimes, the registry backends
# ("npm:" / "cargo:" / "pipx:"), and its own internals (aube = the
# [settings.npm] package_manager below; usage = mise's completions; pipx =
# python-dependent and backs the "pipx:mmdc" backend). Standalone
# GitHub-release CLI binaries are NOT mise's job — they come from
# .chezmoiexternals/ (grouped by domain: ai-agents / dev-tools / vcs / k8s /
# system / fonts). Add a new standalone CLI there, not here.
[tools]
# Core runtimes and package managers
aube = "latest"
bun = "latest"
go = "latest"
node = "latest"
python = "latest"
ruby = [
  { version = "latest", os = [
    "linux",
    "macos",
  ] },
  { version = "3.4", os = [
    "linux",
    "macos",
  ] },
]
# rustup ships a rust-analyzer inside the toolchain via `components`; the
# newer standalone release train lives in .chezmoiexternals/dev-tools.toml and
# is what PATH resolves. Both on purpose — do not "dedupe" them.
rust = { version = "latest", components = "rust-analyzer,rust-src" }
yarn = "latest"

# Registry-backend tools and mise internals
"cargo:git-trim" = "latest"
"cargo:kdotool" = { version = "latest", os = ["linux"] }
pipx = { version = "latest", os = ["linux", "macos"], depends = ["python"] }
usage = "latest"
viteplus = "latest"
"npm:vscode-langservers-extracted" = "latest"
"npm:@biomejs/biome" = "latest"
"npm:@electron/asar" = "latest"
"npm:@playwright/cli" = "latest"
"npm:bash-language-server" = "latest"
"npm:node-gyp" = "latest"
"npm:npm" = "latest"
"npm:portless" = "latest"
"npm:shadcn" = "latest"
"npm:sharp-cli" = "latest"
"npm:tokscale" = "latest"
"npm:typescript-language-server" = "latest"
"npm:typescript" = "latest"
"npm:wrangler" = "latest"
"npm:yaml-language-server" = "latest"
"npm:cypress" = { version = "latest", allow_builds = ["cypress"] }
"pipx:mmdc" = "latest"

# Agentic AI
# codex and kimi are NOT here: .chezmoiexternals/ai-agents.toml fetches their
# standalone releases; codex's linker and kimi's external expose ~/.local/bin.
"npm:@sentry/dotagents" = "latest"
"npm:@z_ai/mcp-server" = "latest"
"npm:@agentclientprotocol/claude-agent-acp" = "latest"
"npm:@agentclientprotocol/codex-acp" = "latest"
"npm:@google/gemini-cli" = "latest"
"npm:pi-acp" = "latest"

[settings]
all_compile = false
experimental = true
idiomatic_version_file_enable_tools = []
minimum_release_age = "24h"
minimum_release_age_excludes = [
  "pipx",
  "npm:@sentry/dotagents",
  "npm:npm",
  "npm:tokscale",
  "viteplus",
]
lockfile = true
locked = false

[settings.github]
use_git_credentials = true

[settings.ruby]
compile = false

[settings.python]
compile = false

[settings.npm]
package_manager = "aube"
