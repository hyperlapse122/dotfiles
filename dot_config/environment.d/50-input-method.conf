# fcitx5 wiring — deploys on ALL Linux desktop targets (both KDE and GNOME),
# since the unified input-method policy picks fcitx5 everywhere (see
# .chezmoidata/packages.yaml gnomePackages / kdePackages).
#
# All four variables are set EXPLICITLY, and each one is load-bearing:
#
#   XMODIFIERS=@im=fcitx    XWayland / X11 apps read this to discover their IM
#                           (no Wayland equivalent).
#   GTK_IM_MODULE=fcitx     GTK3 apps still route through this. GTK4 pure-Wayland
#                           apps use text-input-v3 directly (mutter 45+ / KWin
#                           both support it) and ignore this, but harmless there.
#   QT_IM_MODULE=fcitx      Qt5/6 read this on BOTH X and Wayland. Ubuntu's
#                           systemd user manager sets QT_IM_MODULE=ibus by
#                           default (via im-config's Wayland shim), so an
#                           unset value here does NOT fall through to
#                           text-input-v3 — it lands on ibus and every Qt app
#                           silently routes to a dead ibus daemon. This line
#                           overrides that in USER scope; ~/.config/environment.d/
#                           wins over /etc/environment.d/.
#   SDL_IM_MODULE=fcitx     SDL2/3 apps (games, some Electron shells) read this.
XMODIFIERS=@im=fcitx
GTK_IM_MODULE=fcitx
QT_IM_MODULE=fcitx
SDL_IM_MODULE=fcitx
