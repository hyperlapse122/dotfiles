# fcitx5 wiring for the KDE targets (Fedora KDE Spin, Ubuntu Studio). On
# GNOME-only hosts this file is NOT deployed (see dot_config/.chezmoiignore):
# GNOME uses its native ibus stack and manages the IM environment itself.
# GTK_IM_MODULE=fcitx
# QT_IM_MODULE=fcitx
# SDL_IM_MODULE=fcitx
XMODIFIERS=@im=fcitx
