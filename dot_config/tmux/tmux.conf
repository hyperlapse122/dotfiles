# tmux.conf — recommended companion config for claude-tmux.
#
# Canonical source / updates / README:
#   https://gist.github.com/hacker-cb/3cb65b849dc47f063affb98d21ea3e1b
# Vendored verbatim from that gist; re-fetch from the URL above to update.
#
# Three settings required for Claude Code to behave correctly under tmux:
#   - allow-passthrough     pass through OSC escape sequences (clipboard,
#                           images, hyperlinks) from inner app to host
#                           terminal instead of swallowing them
#   - extended-keys         enable extended keyboard reporting so Shift-Enter
#                           and other CSI-u sequences reach the inner app
#   - terminal-features     advertise `extkeys` to xterm-compatible host
#                           terminals so they negotiate extended keys with
#                           tmux on startup
#
# Upstream: https://code.claude.com/docs/en/terminal-config#configure-tmux

set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Quality-of-life:
#   - focus-events     forward terminal FocusIn/FocusOut escapes to the
#                      inner app, so editors and TUIs that re-check files or
#                      pause animations on focus loss (vim, neovim, some
#                      tail-like dashboards) behave correctly inside tmux.
#   - history-limit    per-pane scrollback line cap. Default 2000 is tiny
#                      for long-running Claude sessions; 50000 covers
#                      multi-hour conversations without measurable RAM cost
#                      (~a few MB per pane at worst).
set -g focus-events on
set -g history-limit 50000


# Forward the active pane's title (set by the inner app via OSC 0/2) to the
# host terminal so the VS Code terminal tab reflects what the app advertises
# — e.g. Claude Code sets the title to the current chat/session name, so the
# tab tracks the live conversation instead of showing the generic "tmux"
# process name. Same effect under iTerm2 / Alacritty / kitty / Windows
# Terminal — anywhere that honours xterm title escapes.
#
# `#T` = current pane title. Apps set it by emitting OSC 0/1/2:
#       printf '\033]2;my title\007'
# If nothing in the pane has ever set a title, tmux defaults `#T` to the
# short hostname (`#h`) — so we wrap it in a conditional: prefer the
# app-supplied title, otherwise fall back to the tmux session name (`#S`,
# from claude-tmux that's e.g. "tvip-nexus-claude").
#
# Refs:
#   - tmux(1) `set-titles`, `set-titles-string`, FORMATS section:
#       https://man.openbsd.org/tmux.1#set-titles
#   - xterm OSC 0/1/2 (icon / window title):
#       https://invisible-island.net/xterm/ctlseqs/ctlseqs.html#h2-Operating-System-Commands
#   - VS Code terminal tab title rendering (uses process title / OSC):
#       https://code.visualstudio.com/docs/terminal/appearance#_terminal-tabs
set -g set-titles on
set -g set-titles-string '[TMUX] #{?#{!=:#{pane_title},#{host_short}},#{pane_title},#S}'

# Note: wheel scroll inside Claude Code is handled by Claude itself in
# fullscreen rendering mode. Enable it with `CLAUDE_CODE_NO_FLICKER=1`
# (env var) or `/tui fullscreen` (per-session). Doing the scroll inside
# Claude rather than via tmux wheel→key translation avoids phantom Up/Down
# keystrokes from high-precision trackpads that would otherwise break the
# `/`-command menu navigation.
#   https://code.claude.com/docs/en/terminal-config#switch-to-fullscreen-rendering
