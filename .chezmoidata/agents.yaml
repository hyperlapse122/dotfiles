# .chezmoidata/agents.yaml — single source of truth for ALL agent configuration.
#
# Consumer map:
#   agents.mcp.servers
#     -> dotagents (Claude Code + Codex), pi mcp.json, opencode.json
#   agents.skills.remote
#     -> dotagents remote skill installation
#   agents.pi.packages / defaults / auth.providers
#     -> pi package installer and live settings/auth merge scripts
#   agents.opencode.model / smallModel / providers / ohMyOpenagent
#     -> opencode.json and oh-my-openagent.jsonc
#
# Add or change agent configuration HERE, not in the consuming templates. Those
# templates retain only target-specific FORMAT and live-file merge mechanics.
# haptic.pi remains in haptic.yaml because it is haptic event data, not agent
# configuration.
#
# Secrets: .chezmoidata files are static, so secret values are stored as op://
# reference strings. resolve-op-refs-json.tmpl recursively walks maps, slices,
# and scalars: a string starting exactly with op:// is onepasswordRead-resolved
# at render time; every other value and type passes through unchanged. This is
# field-independent and therefore works for provider options, nested headers,
# MCP headers, and pi auth without secret-key-specific template branches.
#
# agents.opencode.providerKeyOrder is formatting metadata for the recursive JSON
# emitter. YAML maps do not preserve source order through chezmoi's data merge,
# while this refactor has a byte-identical rendered-config contract. Validated
# exact rules cover one-off complete key sets; reusable regex rules cover
# repeated shapes. Omitted maps use deterministic lexical ordering. Paths are
# rooted at providers.
#
# Naming: keys owned by this repo use camelCase. Keys below
# agents.opencode.ohMyOpenagent.{agents,categories} and provider definitions are
# upstream schema identifiers and are emitted VERBATIM (for example
# multimodal-looker, fallback_models, tool_call). Never normalize them.
#
# install-dotagents-skills hashes only unresolved agents.mcp +
# agents.skills.remote data alongside the raw agents.toml template, so relevant
# edits re-trigger without coupling pi/OpenCode-only changes to dotagents.
# Rendered secrets are not fingerprinted; secret rotation alone follows each
# consumer's documented onchange behavior.

agents:
  # MCP servers consumed by dotagents, pi, and OpenCode. `transport` is the
  # discriminator: stdio uses command/args; http uses url/headers.
  mcp:
    servers:
    - name: codegraph
      transport: stdio
      command: codegraph
      args:
      - serve
      - "--mcp"
    - name: glab
      transport: stdio
      command: glab
      args:
      - mcp
      - serve
    - name: context7
      transport: http
      url: https://mcp.context7.com/mcp
      headers:
        CONTEXT7_API_KEY: op://Private/Context7/API Key
    - name: websearch
      transport: http
      url: https://mcp.exa.ai/mcp
      headers:
        x-api-key: op://Private/Exa/API Key
  # dotagents remote skills (Claude Code + Codex). Missing `ref` means newest
  # GitHub release; present `ref` is literal (improve tracks main).
  skills:
    remote:
    - name: playwright-cli
      source: microsoft/playwright-cli
    - name: improve
      source: shadcn/improve
      ref: main
    - name: dotagents
      source: getsentry/dotagents
  # pi package sources, live settings defaults, and static API-key auth. The
  # settings/auth targets are pi-live-written; scripts merge only these fields.
  pi:
    # Unpinned by design: npm sources track latest and git sources track their
    # default branch, matching the unsettled dotagents remote-skill trade-off.
    # pi-mcp-extension is the MCP client; compound-engineering supplies ce-* +
    # lfg skills; pi-subagents delegates work; pi-ask-user supplies ask_user.
    packages:
    - npm:pi-mcp-extension
    - git:github.com/EveryInc/compound-engineering-plugin
    - npm:pi-subagents
    - npm:pi-ask-user
    defaults:
      # The provider/model must already be credentialed in pi's live auth.json.
      # openai-codex uses pi-owned OAuth; the static providers below are merged
      # separately and must never replace OAuth entries pi refreshes itself.
      provider: openai-codex
      model: gpt-5.6-sol
      # Valid: off | minimal | low | medium | high | xhigh | max.
      thinkingLevel: xhigh
    auth:
      providers:
      - name: kimi-coding
        type: api_key
        key: op://Private/Kimi/API Key
      - name: zai
        type: api_key
        key: op://Private/Z.ai/API Key
  # OpenCode defaults, full provider definitions, and oh-my-openagent mappings.
  # Provider shapes are deliberately heterogeneous and emitted recursively.
  opencode:
    model: zai-coding-plan/glm-5.2
    smallModel: openrouter/openrouter/free
    providers:
      opencode:
        options:
          apiKey: op://Private/Opencode/API Key
        whitelist:
        - deepseek-v4-flash-free
        - mimo-v2.5-free
        - nemotron-3-ultra-free
        - north-mini-code-free
      openrouter:
        options:
          apiKey: op://Private/OpenRouter/API Key
          headers:
            HTTP-Referer: https://opencode.ai/
            X-OpenRouter-Title: OpenCode
            X-OpenRouter-Categories: cli-agent
        models:
          openrouter/free:
            name: Free Models Router
            cost:
              input: 0
              output: 0
              cache_read: 0
              cache_write: 0
          openrouter/auto: {}
          openrouter/fusion: {}
        whitelist:
        - openrouter/free
        - openrouter/auto
        - openrouter/fusion
      zai:
        options:
          baseURL: http://127.0.0.1:8317/v1
          apiKey: local-api-key
      moonshotai:
        npm: "@ai-sdk/openai-compatible"
        options:
          baseURL: http://127.0.0.1:8317/v1
          apiKey: local-api-key
      google-agy:
        npm: "@ai-sdk/openai-compatible"
        options:
          baseURL: http://127.0.0.1:8317/v1
          apiKey: local-api-key
        models:
          gemini-3.5-flash-low:
            name: Gemini 3.5 Flash (Medium)
            reasoning: true
            attachment: true
            temperature: true
            tool_call: true
            modalities:
              input:
              - text
              - image
              - pdf
              - audio
              - video
              output:
              - text
            cost:
              input: 0
              output: 0
              cache_read: 0
              cache_write: 0
            limit:
