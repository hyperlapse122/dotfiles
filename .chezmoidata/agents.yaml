    # Exact rules cover one-off objects and must list their complete key set.
    # Pattern rules reuse preferred order across repeated model shapes; absent
    # optional keys are ignored and remaining keys sort lexically. The resolver
    # validates duplicate/stale/overlapping rules and exact key-set drift.
    providerKeyOrder:
      exact:
      - path: []
        keys:
        - opencode
        - openrouter
        - zai
        - moonshotai
        - google-agy
      - path: [openrouter]
        keys:
        - options
        - models
        - whitelist
      - path: [openrouter, options, headers]
        keys:
        - HTTP-Referer
        - X-OpenRouter-Title
        - X-OpenRouter-Categories
      - path: [openrouter, models]
        keys:
        - openrouter/free
        - openrouter/auto
        - openrouter/fusion
      - path: [openrouter, models, openrouter/free]
        keys:
        - name
        - cost
      - path: [zai, options]
        keys:
        - baseURL
        - apiKey
      - path: [moonshotai, options]
        keys:
        - baseURL
        - apiKey
      - path: [google-agy]
        keys:
        - npm
        - options
        - models
      - path: [google-agy, options]
        keys:
        - baseURL
        - apiKey
      - path: [google-agy, models]
        keys:
        - gemini-3.5-flash-low
        - gemini-3-flash-agent
        - gemini-3-flash
        - gemini-3.5-flash-extra-low
        - gemini-3.1-pro-low
        - gemini-pro-agent
        - gemini-2.5-pro
        - claude-sonnet-4-6
        - claude-opus-4-6-thinking
        - gpt-oss-120b-medium
      patterns:
      - pattern: ^/google-agy/models/[^/]+$
        keys:
        - name
        - reasoning
        - attachment
        - temperature
        - tool_call
        - modalities
        - cost
        - limit
        - options
        - headers
      - pattern: ^/(openrouter|google-agy)/models/.+/cost$
        keys:
        - input
        - output
        - cache_read
        - cache_write
      - pattern: ^/google-agy/models/[^/]+/options/thinkingConfig$
        keys:
        - thinkingBudget
        - includeThoughts
    # Upstream oh-my-openagent identifiers below are verbatim schema keys.
