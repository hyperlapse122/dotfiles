# .chezmoidata/agents.yaml — single source of truth for ALL agent configuration.
#
# Consumer map:
#   agents.mcp.servers
#     -> dotagents (Claude Code + Codex), pi mcp.json, opencode.json
#   agents.skills.external
#     -> .chezmoiexternals/ai-agents.toml (agent skills fetched as externals)
#   agents.pi.packages / defaults / auth.providers
#     -> pi package installer and live settings/auth merge scripts
#   agents.opencode.plugins / model / smallModel / providers / ohMyOpenagent
#     -> opencode.json and oh-my-openagent.jsonc
#
# Add or change agent configuration HERE, not in the consuming templates. Those
# templates retain only target-specific FORMAT and live-file merge mechanics.
# haptic.pi remains in haptic.yaml because it is haptic event data, not agent
# configuration.
#
# Secrets: .chezmoidata files are static, so secret values are stored as op://
# reference strings. resolve-op-refs-json.tmpl recursively walks maps, slices,
# and scalars: a string starting exactly with op:// is onepasswordRead-resolved
# at render time; every other value and type passes through unchanged. This is
# field-independent and therefore works for provider options, nested headers,
# MCP headers, and pi auth without secret-key-specific template branches.
#
# Naming: keys owned by this repo use camelCase. Keys below
# agents.opencode.ohMyOpenagent.{agents,categories} and provider definitions are
# upstream schema identifiers and are emitted VERBATIM (for example
# multimodal-looker, fallback_models, tool_call). Never normalize them.
#
# install-dotagents-skills hashes only the unresolved agents.mcp data alongside
# the raw agents.toml template, so an MCP edit re-triggers dotagents without
# coupling pi/OpenCode-only changes to it. Rendered secrets are not
# fingerprinted; secret rotation alone follows each consumer's documented
# onchange behavior.

agents:
  # MCP servers consumed by dotagents, pi, and OpenCode. `transport` is the
  # discriminator: stdio uses command/args; http uses url/headers.
  mcp:
    servers:
    - name: codegraph
      transport: stdio
      command: codegraph
      args:
      - serve
      - "--mcp"
    - name: glab
      transport: stdio
      command: glab
      args:
      - mcp
      - serve
    - name: context7
      transport: http
      url: https://mcp.context7.com/mcp
      headers:
        CONTEXT7_API_KEY: op://Private/Context7/API Key
    - name: websearch
      transport: http
      url: https://mcp.exa.ai/mcp
      headers:
        x-api-key: op://Private/Exa/API Key
  # Agent skills fetched as chezmoi externals into ~/.agents/skills/<name> (the
  # former dotagents remote skills). .chezmoiexternals/ai-agents.toml ranges over
  # this list. `name` is BOTH the target dir under ~/.agents/skills/ and the
  # skills/<name>/ subdir inside the source repo. Ref rule: absent -> newest
  # GitHub release (gitHubLatestRelease); present -> a branch head resolved to a
  # commit via git ls-remote (repos with no releases/tags). There are no local
  # `path:` skills any more — every user-scoped skill is a chezmoi external, and
  # `agents.toml` declares MCP servers only.
  skills:
    external:
    - name: playwright-cli
      source: microsoft/playwright-cli
    - name: improve
      source: shadcn/improve
      ref: main
  # pi package sources, managed settings defaults, and static API-key auth.
  # settings.json is a MANAGED READONLY target (private_readonly_ 0400); only
  # auth.json stays live-written (for OAuth refresh). See AGENTS.md "pi —
  # settings.json managed readonly" for the full model.
  pi:
    # Everything under `settings` renders wholesale into the MANAGED, READONLY
    # ~/.pi/agent/settings.json (dot_pi/agent/private_readonly_settings.json.tmpl),
    # so the keys intentionally match pi's settings.json schema. pi can no longer
    # write that file (deployed 0400, owner-read-only — tighter than opencode.json's
    # 0444 since op:// refs may bake secrets here), so every value pi used to
    # live-manage lives HERE instead. The provider/model must already be usable
    # through pi's live auth.json (zai is a built-in provider reached via the zai
    # api_key auth below; no models.json override).
    settings:
      # `packages` is emitted VERBATIM into the managed settings.json (deepCopy
      # in dot_pi/agent/private_readonly_settings.json.tmpl) AND into the PACKAGES
      # array of run_onchange_after_update-pi-extensions.sh.tmpl, which reconciles
      # installed extensions via `pi update --extensions` (NOT `pi install` —
      # that would write to the readonly settings). No partial, no resolution:
      # what is listed here is exactly what pi loads. Unpinned by design (npm:
      # and git: both track latest) — the same unsettled trade-off the agent-skill
      # externals make.
      #   - pi-mcp-extension: the MCP client (pi ships no MCP support of its
      #     own; without it the servers in ~/.pi/agent/mcp.json are inert).
      #   - pi-subagents: delegates work to builtin/custom subagents.
      #   - pi-ask-user: supplies the ask_user tool.
      # compound-engineering is installed for pi as a NATIVE `git:` source, NOT
      # via the versioned local-archive path Claude/Codex/OpenCode use. That is
      # a deliberate divergence for now: pi tracks the repo's default branch
      # (unpinned) instead of the extracted release tarball, so it does NOT
      # consume compound-engineering-ref.tmpl or the localArchive machinery.
      packages:
      - npm:pi-mcp-extension
      - npm:pi-subagents
      - npm:pi-ask-user
      - npm:@counterposition/pi-web-search
      - git:github.com/EveryInc/compound-engineering-plugin
      # `theme` is declared here because pi can no longer persist a theme choice
      # to a readonly settings.json — it is fixed to the default.
      theme: dark
      defaultProvider: zai
      defaultModel: glm-5.2
      # Valid: off | minimal | low | medium | high | xhigh | max.
      defaultThinkingLevel: max
      subagents:
        defaultModel: gpt-5.6-terra
        agentOverrides:
          researcher:
            model: gpt-5.6-luna
          planner:
            model: gpt-5.6-sol
            thinking: xhigh
          worker:
            model: gpt-5.6-luna
          reviewer:
            model: gpt-5.6-sol
            thinking: xhigh
          context-builder:
            model: gpt-5.6-sol
          oracle:
            model: gpt-5.6-sol
            thinking: max
          delegate:
            model: gpt-5.6-luna
      webSearch:
        preferredBasicProvider: exa
        preferredThoroughProvider: exa
        apiKeys:
          exa: "op://Private/Exa/API Key"
      # lastChangelogVersion is NOT declared here — it is rendered dynamically
      # from the installed pi version (resolved inline from the
      # earendil-works/pi release, the same one .chezmoiexternals/ai-agents.toml
      # fetches) so the managed file always matches the pi on disk.
    auth:
      providers:
      - name: kimi-coding
        type: api_key
        key: op://Private/Kimi/API Key
      - name: zai
        type: api_key
        key: op://Private/Z.ai/API Key
  # OpenCode defaults, full provider definitions, and oh-my-openagent mappings.
  # Provider shapes are deliberately heterogeneous and emitted recursively.
  opencode:
    # Plugin versions resolve at render time. `latestTag` strips a leading `v`
    # from the newest GitHub tag before producing an exact npm spec.
    # `npmLatest` reads the latest version straight from the npm registry
    # (registry.npmjs.org/<pkg>/latest) for a package with no public GitHub repo
    # to tag against; `source` is therefore omitted for those entries.
    # compound-engineering uses its filtered release train because that repo
    # interleaves unrelated marketplace/CLI tags.
    #
    # Install forms:
    #   npm          -> `<pkg>@<version>` (opencode-only plugin)
    #   localArchive -> Chezmoi extracts the GitHub release tarball to
    #                   `~/<externalPath>/v<version>/` via
    #                   .chezmoiexternals/ai-agents.toml; every agent then
    #                   references that fully-rendered versioned path.
    #                   OpenCode gets it in its `plugin` array via
    #                   opencode-plugins-json.tmpl; Claude Code / Codex / pi
    #                   are registered by
    #                   .chezmoiscripts/70-agents/run_onchange_after_install-compound-engineering
    #                   which points each agent's plugin marketplace / `pi
    #                   install` at the same versioned path. `externalPath`
    #                   is required; the version segment (`v<version>`) is
    #                   appended by each consumer.
    plugins:
    - package: oh-my-openagent
      source: code-yeongyu/oh-my-openagent
      install: npm
      versionSource: latestTag
      targets:
        opencode: [""]
        tui: ["/tui", ""]
    - package: opencode-wakatime
      source: angristan/opencode-wakatime
      install: npm
      versionSource: latestTag
      targets:
        opencode: [""]
    - package: "@ex-machina/opencode-anthropic-auth"
      source: ex-machina-co/opencode-anthropic-auth
      install: npm
      versionSource: latestTag
      targets:
        opencode: [""]
    - package: "@oyng/opencode-agy-auth"
      install: npm
      versionSource: npmLatest
      targets:
        opencode: [""]
    - package: compound-engineering
      source: EveryInc/compound-engineering-plugin
      install: localArchive
      versionSource: compoundEngineeringRelease
      externalPath: .local/share/compound-engineering
      targets:
        opencode: [""]
    model: anthropic/claude-opus-4-7
    smallModel: anthropic/claude-haiku-4-5
    providers:
      opencode:
        options:
          apiKey: op://Private/Opencode/API Key
        whitelist:
        - deepseek-v4-flash-free
        - mimo-v2.5-free
        - nemotron-3-ultra-free
        - north-mini-code-free
        - big-pickle
      zai-coding-plan:
        options:
          apiKey: "op://Private/Z.ai/API Key"
      kimi-for-coding:
        options:
          apiKey: "op://Private/Kimi/API Key"
      openrouter:
        options:
          apiKey: op://Private/OpenRouter/API Key
          headers:
            HTTP-Referer: https://opencode.ai/
            X-OpenRouter-Title: OpenCode
            X-OpenRouter-Categories: cli-agent
        models:
          openrouter/free:
            name: Free Models Router
            cost:
              input: 0
              output: 0
              cache_read: 0
              cache_write: 0
          openrouter/auto: {}
          openrouter/fusion: {}
        whitelist:
        - openrouter/free
        - openrouter/auto
        - openrouter/fusion
    # Upstream oh-my-openagent identifiers below are verbatim schema keys.
    ohMyOpenagent:
      # Per-agent mappings (oh-my-openagent.jsonc "agents").
      # Model Mapping Reference:
      # https://github.com/code-yeongyu/oh-my-openagent/blob/dev/packages/model-core/src/agent-model-requirements.ts
      agents:
        sisyphus:
          model: anthropic/claude-opus-4-8
          variant: xhigh
          fallback_models:
            - kimi-for-coding/k2p6
            - kimi-for-coding/k2p5
            - model: openai/gpt-5.5
              variant: medium
            - zai-coding-plan/glm-5.1
            - opencode/big-pickle
        hephaestus:
          model: openai/gpt-5.6-sol
          variant: high
          fallback_models:
            - model: openai/gpt-5.5
              variant: medium
        oracle:
          model: openai/gpt-5.5
          variant: high
          fallback_models:
            - model: google-agy/gemini-pro-agent
              variant: high
            - model: anthropic/claude-opus-4-8
              variant: xhigh
            - zai-coding-plan/glm-5.2
        librarian:
          model: openai/gpt-5.4-mini-fast
          fallback_models:
            - anthropic/claude-haiku-4-5
        explore:
          model: openai/gpt-5.4-mini-fast
          fallback_models:
            - anthropic/claude-haiku-4-5
        multimodal-looker:
          model: openai/gpt-5.5
          variant: medium
          fallback_models:
            - kimi-for-coding/k2p6
        prometheus:
          model: anthropic/claude-opus-4-8
          variant: xhigh
          fallback_models:
            - model: openai/gpt-5.5
              variant: high
            - zai-coding-plan/glm-5.2
            - google-agy/gemini-pro-agent
        metis:
          model: anthropic/claude-sonnet-4-6
          fallback_models:
            - model: anthropic/claude-opus-4-8
              variant: xhigh
            - model: openai/gpt-5.5
              variant: high
            - zai-coding-plan/glm-5.2
            - kimi-for-coding/k2p5
        momus:
          model: openai/gpt-5.6-sol
          variant: xhigh
          fallback_models:
            - model: openai/gpt-5.5
              variant: xhigh
            - model: anthropic/claude-opus-4-8
              variant: xhigh
            - model: google-agy/gemini-pro-agent
              variant: high
            - zai-coding-plan/glm-5.2
        atlas:
          model: anthropic/claude-sonnet-4-6
          fallback_models:
            - kimi-for-coding/k2p6
            - model: openai/gpt-5.5
              variant: medium
        sisyphus-junior:
          model: anthropic/claude-sonnet-4-6
          fallback_models:
            - kimi-for-coding/k2p6
            - model: openai/gpt-5.5
              variant: medium
            - opencode/big-pickle
      # Per-category mappings (oh-my-openagent.jsonc "categories").
      # Model Mapping Reference:
      # https://github.com/code-yeongyu/oh-my-openagent/blob/dev/packages/model-core/src/category-model-requirements.ts
      categories:
        visual-engineering:
          model: google-agy/gemini-pro-agent
          variant: high
          fallback_models:
            - zai-coding-plan/glm-5.1
            - model: anthropic/claude-opus-4-8
              variant: xhigh
            - zai-coding-plan/glm-5.2
            - kimi-for-coding/k2p5
        ultrabrain:
          model: openai/gpt-5.6-sol
          variant: xhigh
          fallback_models:
            - model: openai/gpt-5.5
              variant: xhigh
            - model: google-agy/gemini-pro-agent
              variant: high
            - model: anthropic/claude-opus-4-8
              variant: xhigh
            - zai-coding-plan/glm-5.2
        deep:
          model: openai/gpt-5.6-terra
          variant: xhigh
          fallback_models:
            - model: openai/gpt-5.6-sol
              variant: high
            - model: openai/gpt-5.5
              variant: medium
            - model: anthropic/claude-opus-4-8
              variant: xhigh
            - model: google-agy/gemini-pro-agent
              variant: high
            - kimi-for-coding/k2p6
            - zai-coding-plan/glm-5.2
        artistry:
          model: google-agy/gemini-pro-agent
          variant: high
          fallback_models:
            - model: anthropic/claude-opus-4-8
              variant: xhigh
            - openai/gpt-5.5
            - kimi-for-coding/k2p6
            - zai-coding-plan/glm-5.2
        quick:
          model: openai/gpt-5.4-mini
          fallback_models:
            - anthropic/claude-haiku-4-5
            - google-agy/gemini-3-flash
        unspecified-low:
          model: openai/gpt-5.6-luna
          variant: xhigh
          fallback_models:
            - anthropic/claude-sonnet-4-6
            - model: openai/gpt-5.5
              variant: medium
            - kimi-for-coding/k2p6
            - google-agy/gemini-3-flash
        unspecified-high:
          model: anthropic/claude-opus-4-8
          variant: xhigh
          fallback_models:
            - model: openai/gpt-5.5
              variant: high
            - zai-coding-plan/glm-5.1
            - kimi-for-coding/k2p5
            - zai-coding-plan/glm-5.2
        writing:
          model: google-agy/gemini-3-flash
          fallback_models:
            - kimi-for-coding/k2p6
            - anthropic/claude-sonnet-4-6
