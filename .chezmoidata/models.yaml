# Single source of truth for AI model selection (like packages.yaml for
# packages): which models opencode and oh-my-openagent use. Rendered into
#   - dot_config/opencode/readonly_opencode.json.tmpl         (model/small_model)
#   - dot_config/opencode/readonly_oh-my-openagent.jsonc.tmpl (agents/categories)
# Edit models HERE, not in the rendered configs. Each mapping entry is either
# a plain "provider/model" string or an object with model/variant keys; the
# structure is emitted into the target JSON as-is (keys render alphabetically).
#
# Provider references here intentionally use only source-managed direct routes:
# Anthropic goes through the loopback Meridian endpoint, OpenAI uses its native
# OAuth provider, and OpenRouter uses its source-managed API key. Do not add a
# fallback whose provider exists only behind an unmanaged local proxy.
#
# NAMING — the keys this repo owns are camelCase, like the rest of .chezmoidata
# (`ohMyOpenagent`, `smallModel`). Everything BELOW `agents:` / `categories:` is
# the exception, and deliberately so: those keys are OH-MY-OPENAGENT's own
# identifiers, not ours. The agent/category names (`multimodal-looker`,
# `sisyphus-junior`, `visual-engineering`, `unspecified-low`, `unspecified-high`)
# and the entry field `fallback_models` are emitted VERBATIM into
# ~/.config/opencode/oh-my-openagent.jsonc, where oh-my-openagent reads them by
# that exact spelling. Renaming one to camelCase would not "fix" the schema — it
# would produce a config key the tool does not know, and the mapping would
# silently stop applying. Match upstream; never normalize these.
models:
  opencode:
    # Top-level opencode model + small_model (opencode.json). Anthropic is
    # routed through Meridian by the provider override in that template.
    model: anthropic/claude-opus-4-8
    smallModel: openrouter/openrouter/free
  ohMyOpenagent:
    # Per-agent mappings (oh-my-openagent.jsonc "agents").
    # Model Mapping Reference:
    # https://github.com/code-yeongyu/oh-my-openagent/blob/dev/packages/model-core/src/agent-model-requirements.ts
    agents:
      sisyphus:
        model: anthropic/claude-opus-4-8
        variant: max
        fallback_models:
          - openai/gpt-5.6-terra
      hephaestus:
        model: openai/gpt-5.5
      oracle:
        model: openai/gpt-5.6-sol
        fallback_models:
          - model: anthropic/claude-opus-4-8
            variant: max
      librarian:
        model: openai/gpt-5.6-terra
        fallback_models:
          - anthropic/claude-haiku-4-5
      explore:
        model: openai/gpt-5.6-terra
        fallback_models:
          - anthropic/claude-haiku-4-5
      multimodal-looker:
        model: openai/gpt-5.6-terra
        fallback_models:
          - model: anthropic/claude-opus-4-8
            variant: max
      prometheus:
        model: anthropic/claude-opus-4-8
        variant: max
        fallback_models:
          - model: openai/gpt-5.6-sol
            variant: high
      metis:
        model: anthropic/claude-sonnet-5
        fallback_models:
          - model: anthropic/claude-opus-4-8
            variant: max
          - openai/gpt-5.6-sol
      momus:
        model: openai/gpt-5.6-sol
        variant: xhigh
        fallback_models:
          - model: anthropic/claude-opus-4-8
            variant: max
      atlas:
        model: anthropic/claude-sonnet-5
        variant: max
        fallback_models:
          - openai/gpt-5.6-terra
      sisyphus-junior:
        model: anthropic/claude-sonnet-5
        variant: max
        fallback_models:
          - openai/gpt-5.6-terra
    # Per-category mappings (oh-my-openagent.jsonc "categories").
    # Model Mapping Reference:
    # https://github.com/code-yeongyu/oh-my-openagent/blob/dev/packages/model-core/src/category-model-requirements.ts
    categories:
      visual-engineering:
        model: anthropic/claude-opus-4-8
        variant: max
        fallback_models:
          - openai/gpt-5.6-terra
      ultrabrain:
        model: openai/gpt-5.6-sol
        variant: xhigh
        fallback_models:
          - model: anthropic/claude-opus-4-8
            variant: max
      deep:
        model: openai/gpt-5.6-terra
        fallback_models:
          - model: anthropic/claude-opus-4-8
            variant: max
      artistry:
        model: anthropic/claude-opus-4-8
        variant: max
        fallback_models:
          - openai/gpt-5.6-sol
      quick:
        model: openai/gpt-5.6-terra
        fallback_models:
          - anthropic/claude-haiku-4-5
      unspecified-low:
        model: anthropic/claude-sonnet-5
        variant: max
        fallback_models:
          - openai/gpt-5.6-terra
      unspecified-high:
        model: anthropic/claude-opus-4-8
        variant: max
        fallback_models:
          - model: openai/gpt-5.6-sol
            variant: high
      writing:
        model: anthropic/claude-sonnet-5
        fallback_models:
          - openai/gpt-5.6-terra
