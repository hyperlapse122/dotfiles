packages:
  linux:
    fedora:
      # COPR (community) repositories enabled via `dnf copr enable`.
      coprs:
        - alternateved/keyd  # COPR hosting the keyd keyboard remapper
        - jdxcode/mise  # COPR hosting mise (runtime/tool version manager)
      # GPG keys imported (rpm --import) to verify third-party repo packages.
      keys:
        - https://downloads.1password.com/linux/keys/1password.asc  # 1Password package signing key
        - https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg  # VSCodium repo signing key
        - https://dl.google.com/linux/linux_signing_key.pub  # Google Chrome repo signing key
        - https://repo.cider.sh/RPM-GPG-KEY  # Cider Collective repo signing key
      # Third-party .repo definitions written verbatim to /etc/yum.repos.d.
      repos:
        # 1Password desktop app + CLI stable RPM repo
        - id: 1password
          content: |
            [1password]
            name=1Password Stable Channel
            baseurl=https://downloads.1password.com/linux/rpm/stable/$basearch
            enabled=1
            gpgcheck=1
            repo_gpgcheck=1
            gpgkey="https://downloads.1password.com/linux/keys/1password.asc"
        # VSCodium (telemetry-free VS Code build) RPM repo
        - id: vscodium
          content: |
            [gitlab.com_paulcarroty_vscodium_repo]
            name=gitlab.com_paulcarroty_vscodium_repo
            baseurl=https://paulcarroty.gitlab.io/vscodium-deb-rpm-repo/rpms/
            enabled=1
            gpgcheck=1
            repo_gpgcheck=1
            gpgkey=https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg
            metadata_expire=1h
        # Google Chrome stable RPM repo (x86_64 only; Google ships no other arch)
        - id: google-chrome
          content: |
            [google-chrome]
            name=google-chrome
            baseurl=https://dl.google.com/linux/chrome/rpm/stable/x86_64
            enabled=1
            gpgcheck=1
            gpgkey=https://dl.google.com/linux/linux_signing_key.pub
        # Cider (Apple Music client) RPM repo (x86_64 only; Cider ships no other arch)
        - id: cider
          content: |
            [cidercollective]
            name=Cider Collective Repository
            baseurl=https://repo.cider.sh/rpm/RPMS
            enabled=1
            gpgcheck=1
            gpgkey=https://repo.cider.sh/RPM-GPG-KEY
      # Remote .repo files added via `dnf config-manager addrepo`.
      repofiles:
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo  # Tailscale mesh-VPN stable repo
      # dnf groups installed via `dnf group install` (own transaction, separate
      # from the individual packages below).
      groups:
        - development-tools  # core build toolchain (gcc, make, autotools, git, ...)
        - virtualization  # libvirt + qemu virtualization stack
        - c-development  # C headers/libraries for building against system libs
      # Foundational packages installed in their own transaction before the main
      # set, so kernel headers/devel are in place when the DKMS packages
      # (kmod-nvidia-latest-dkms, dkms) build their modules.
      corePackages:
        - clang21-libs  # Clang 21 runtime libraries
        - kernel  # Linux kernel
        - kernel-devel  # kernel build headers/Makefiles for out-of-tree modules
        - kernel-devel-matched  # kernel-devel pinned to the running/latest kernel
        - kernel-headers  # userspace-facing kernel API headers
      packages:
        # Build tooling
        - clang  # LLVM C/C++/Obj-C compiler
        - gcc-c++  # GNU C++ compiler
        - pkg-config  # query compile/link flags for installed libraries
        - systemd-devel  # libudev/libsystemd headers (libudev.pc for the hidapi backend)

        # CLI utilities
        - btop  # interactive resource/process monitor
        - chezmoi  # declarative dotfiles manager (manages this repo)
        - fd-find  # fast, user-friendly find alternative (fd)
        - gh  # GitHub CLI
        # kdotool: managed by mise (cargo:kdotool, same as Ubuntu — see dot_config/mise/config.toml)
        - nvtop  # GPU process/usage monitor
        - ripgrep  # fast recursive regex code search (rg)
        - xxd  # hex dump / reverse utility
        - yp-tools  # NIS/YP client utilities

        # Keyboard remapper
        - keyd  # key remapping daemon (from the keyd COPR)

        # Language toolchains + version manager
        - dotnet-sdk-10.0  # .NET SDK 10.0
        - dotnet-sdk-8.0  # .NET SDK 8.0
        - mise  # polyglot runtime/tool version manager

        # Ruby build dependencies (consumed by mise's ruby-build).
        # The runtime libs libffi/libyaml are pulled in transitively.
        - libffi-devel  # FFI headers (ruby-build dependency)
        - libyaml-devel  # YAML headers (ruby-build / psych dependency)

        # Hardware sensors / fan control
        - lm_sensors  # hardware temperature/voltage/fan sensor readouts

        # Logitech device manager
        - solaar  # Logitech HID++ device manager
        - solaar-udev  # udev rules granting Solaar device access

        # Password manager
        - 1password  # 1Password desktop app
        - 1password-cli  # 1Password CLI (op)

        # Editor
        - codium  # VSCodium (telemetry-free VS Code)

        # Web browser
        - google-chrome-stable  # Google Chrome (stable channel)

        # Music player (Apple Music client; requires a purchased license)
        - Cider  # Cider Apple Music client (from the Cider Collective repo)

        # Container runtime (rootless Podman + tooling)
        - podman  # daemonless OCI container engine
        - podman-docker  # docker CLI shim that forwards to podman
        - podman-compose  # Compose implementation for podman
        - buildah  # OCI/Docker image builder
        - containers-common  # shared container registries/policy config
        - passt  # user-mode networking (pasta) for rootless containers
        - fuse-overlayfs  # rootless overlay filesystem driver
        - slirp4netns  # user-mode networking for rootless network namespaces
        - kubernetes-client

        # Screen recording / streaming / video editing
        - kdenlive  # non-linear video editor
        - obs-studio  # screen recording / live streaming

        # Mesh networking
        - tailscale  # WireGuard-based mesh VPN client

        # Wayland clipboard management
        - wl-clipboard  # Wayland clipboard CLI (wl-copy / wl-paste)

        # Virtualization (KVM/QEMU/libvirt + VM disk-image tooling; fuse3 + ntfs-3g give
        # read-only ReFS/NTFS access to Windows Dev Drive vhdx mounts)
        - edk2-ovmf  # UEFI firmware for QEMU guests, including Secure Boot builds
        - fuse3  # FUSE 3 userspace filesystem support
        - fuse3-devel  # FUSE 3 headers (refs-fuse / refsprogs build dependency)
        - guestfs-tools  # CLI tools to inspect/modify VM disk images
        - libguestfs  # library for accessing/editing VM disk images
        - libvirt-daemon-kvm  # libvirt QEMU/KVM driver and daemon integration
        - ntfs-3g  # NTFS read/write driver (FUSE)
        - qemu-img  # QEMU disk-image create/convert tool (vhdx, qcow2, ...)
        - qemu-kvm  # QEMU/KVM x86 hypervisor package
        - swtpm  # TPM 2.0 emulator for Windows 11 guests
        - swtpm-tools  # TPM setup/local CA helpers used by libvirt managed vTPM
        - systemd-container  # systemd-nspawn / machinectl container tooling
        - virt-install  # CLI VM installer (osinfo-aware Windows 11 definitions)
        - virt-manager  # graphical VM manager
        - virt-viewer  # SPICE/VNC console viewer for libvirt guests

        # Dynamic Kernel Module Support
        - dkms  # builds/signs out-of-tree kernel modules (e.g. the NVIDIA dkms driver)

        # Tauri development
        - curl  # HTTP client / file downloader
        - file  # file-type detection utility
        - libappindicator-gtk3-devel  # AppIndicator (tray icon) headers for Tauri
        - librsvg2-devel  # SVG rendering headers (librsvg)
        - libxdo-devel  # libxdo headers (X automation) for Tauri
        - openssl-devel  # OpenSSL headers
        - webkit2gtk4.1-devel  # WebKitGTK headers (Tauri webview)
        - wget  # HTTP/HTTPS file downloader

        - expect  # automate interactive CLI prompts (TCL expect)
      # Installed only when KDE Plasma is the desktop (runtime `command -v
      # plasmashell` gate in run_onchange_before_fedora.sh.tmpl) — Fedora KDE
      # Spin. fcitx5 is the input method on the KDE targets; GNOME hosts use
      # the native ibus stack instead (see gnomePackages).
      kdePackages:
        - fcitx5  # input method framework (KDE targets)
        - fcitx5-hangul  # Korean (Hangul) input engine for fcitx5
        - pinentry-qt  # Qt pinentry, referenced by ~/.gnupg/gpg-agent.conf on KDE hosts
      # Installed only when GNOME is the desktop (runtime `command -v
      # gnome-shell` gate) — Fedora Workstation. GNOME stays on its default
      # ibus input framework; only the Korean engine is added.
      gnomePackages:
        - ibus-hangul  # Korean (Hangul) input engine for ibus (GNOME default IM framework)
        - pinentry-gnome3  # gcr/GTK pinentry, referenced by ~/.gnupg/gpg-agent.conf on GNOME hosts
      # Installed only on bare metal (systemd-detect-virt reports no VM).
      bareMetalPackages:
        - steam  # Steam game client (needs a real GPU; skipped in VMs)
      # Installed only on hosts with an NVIDIA GPU (PCI vendor id 0x10de),
      # pulled from the CUDA + nvidia-container repos added during repo setup.
      nvidiaPackages:
        - cuda-drivers  # NVIDIA CUDA driver metapackage
        - cuda-toolkit-13-3  # CUDA 13.3 toolkit (nvcc, libraries)
        - kmod-nvidia-latest-dkms  # NVIDIA kernel module built via DKMS
        - nvidia-driver  # NVIDIA driver metapackage
        - nvidia-container-toolkit  # NVIDIA container runtime integration
        - nvidia-container-toolkit-base  # base components for the container toolkit
        - libnvidia-container-tools  # CLI tools for the NVIDIA container library
        - libnvidia-container1  # NVIDIA container runtime library
      # Flatpak apps installed system-wide from Flathub via `flatpak install`.
      flatpaks:
        - com.discordapp.Discord  # Discord voice/text chat client
      # Global .NET tools installed via `dotnet tool install -g`.
      dotnetTools:
        - git-credential-manager  # cross-platform Git credential helper (GCM)
        - powershell  # PowerShell (pwsh) cross-platform shell
      # RPMs installed directly from a vendor URL (no repo): import the GPG
      # key(s), then install the link matching the host arch (skipped when `id`
      # is already an installed package).
      directRpms:
        - id: teamviewer  # remote desktop / remote support client
          keys:
            - https://download.teamviewer.com/download/linux/signature/TeamViewer2017.asc  # TeamViewer 2017 package signing key
            - https://linux.teamviewer.com/pubkey/currentkey.asc  # TeamViewer current signing key
          rpms:
            x86_64: https://download.teamviewer.com/download/linux/teamviewer.x86_64.rpm  # 64-bit Intel/AMD
            aarch64: https://download.teamviewer.com/download/linux/teamviewer.aarch64.rpm  # 64-bit ARM
    ubuntu:
      # APT third-party repos. Each entry: `id` (becomes /etc/apt/sources.list.d/<id>.list),
      # `keyring-url` (GPG armored key, dearmored to /usr/share/keyrings/<id>.gpg),
      # and `sources-list-lines` (a list of `deb [signed-by=...] ...` entries written
      # verbatim, one per line — NOT a deb822 .sources file).
      aptRepos:
        # The 1password repo is deliberately NOT managed here: the 1password deb's
        # postinst owns the repo definition — it writes the deb822
        # /etc/apt/sources.list.d/1password.sources (Signed-By
        # /usr/share/keyrings/1password-archive-keyring.gpg) and comments out any
        # 1password.list it finds. A managed .list here gets resurrected by
        # setup_apt_repos with a different signed-by=, and apt then rejects the
        # ENTIRE source list ("Conflicting values set for option Signed-By"),
        # breaking every apt operation. .install-prerequisites.sh bootstraps the
        # repo before the first install; the Ubuntu installer only cleans up the
        # legacy .list left behind by earlier revisions of this entry.
        - id: vscodium
          # arch pinned: the repo publishes no i386 index, and the installer
          # enables i386 as a foreign arch (Steam), so an unpinned line makes
          # every `apt update` warn "doesn't support architecture 'i386'".
          keyring-url: https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg
          sources-list-lines:
            - "deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/vscodium.gpg] https://paulcarroty.gitlab.io/vscodium-deb-rpm-repo/debs vscodium main"
        - id: google-chrome
          keyring-url: https://dl.google.com/linux/linux_signing_key.pub
          sources-list-lines:
            - "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb stable main"
        - id: cider
          # Cider (Apple Music client). Per https://repo.cider.sh the docs dearmor the key to
          # /usr/share/keyrings/cider-archive-keyring.gpg, but the generic aptRepos loop dearmors
          # every key to /usr/share/keyrings/<id>.gpg, which apt accepts identically. arch=amd64
          # pinned: the repo ships only linux-x64 debs (binary-arm64/armhf/i386 indexes are empty),
          # so an unpinned line would fail to resolve on non-amd64 hosts.
          keyring-url: https://repo.cider.sh/APT-GPG-KEY
          sources-list-lines:
            - "deb [arch=amd64 signed-by=/usr/share/keyrings/cider.gpg] https://repo.cider.sh/apt stable main"
        - id: claude-desktop
          # Claude desktop app (Linux beta — Debian-based only; Anthropic ships no RPM,
          # so there is no Fedora counterpart). Per
          # https://code.claude.com/docs/en/desktop-linux — the docs keep the armored key at
          # /usr/share/keyrings/claude-desktop-archive-keyring.asc, but the generic aptRepos
          # loop dearmors every key to /usr/share/keyrings/<id>.gpg, which apt accepts
          # identically. Key fingerprint: 31DD DE24 DDFA B679 F42D 7BD2 BAA9 29FF 1A7E CACE.
          keyring-url: https://downloads.claude.ai/claude-desktop/key.asc
          sources-list-lines:
            - "deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/claude-desktop.gpg] https://downloads.claude.ai/claude-desktop/apt/stable stable main"
        - id: mise
          # PPA per https://mise.jdx.dev/installing-mise.html#apt — the docs' recommended
          # source for Ubuntu 26.04+, but effectively amd64-only (its arm64/i386/... indexes
          # are published empty). .install-prerequisites.sh bootstraps mise from the
          # distro-agnostic multi-arch mise.jdx.dev/deb repo instead; on Ubuntu,
          # setup_apt_repos then converges mise.list (and its keyring) to this PPA.
          keyring-url: https://keyserver.ubuntu.com/pks/lookup?op=get&options=mr&search=0x38A097C0CCE691795E4B15BE23997D3EEE1EDC52
          sources-list-lines:
            - "deb [signed-by=/usr/share/keyrings/mise.gpg] https://ppa.launchpadcontent.net/jdxcode/mise/ubuntu resolute main"
        - id: tailscale
          keyring-url: https://pkgs.tailscale.com/stable/ubuntu/resolute.noarmor.gpg
          sources-list-lines:
            - "deb [signed-by=/usr/share/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/ubuntu resolute main"
        - id: dotnet-backports
          # ppa:dotnet/backports — Canonical (not Microsoft) now owns .NET packaging on
          # Ubuntu 22.04+. Ubuntu's own archive only carries the current SDK (10.0), so
          # older non-default SDKs (8.0, 9.0) come from this PPA instead of Microsoft's
          # repo. https://launchpad.net/~dotnet/+archive/ubuntu/backports
          keyring-url: https://keyserver.ubuntu.com/pks/lookup?op=get&options=mr&search=0x45A3F127159BE9E5017811C62125B164E8E5D3FA
          sources-list-lines:
            - "deb [signed-by=/usr/share/keyrings/dotnet-backports.gpg] https://ppa.launchpadcontent.net/dotnet/backports/ubuntu resolute main"
        - id: microsoft-prod
          # Microsoft PMC prod repo for Ubuntu 26.04 — carries intune-portal (+ deps).
          # Layout per Microsoft's Intune installer (shell-intune-samples): suite is the
          # release CODENAME (resolute), component is main. Ubuntu 26.04+ PMC repos are
          # signed with the NEWER microsoft-2025 key, not the legacy microsoft.asc one.
          # arch pinned: the repo publishes no i386 index and the installer enables i386
          # as a foreign arch (Steam), so an unpinned line would warn on every apt update.
          keyring-url: https://packages.microsoft.com/keys/microsoft-2025.asc
          sources-list-lines:
            - "deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/26.04/prod resolute main"
        - id: microsoft-edge
          # Microsoft Edge repo — intune-portal needs Edge for Entra ID sign-in /
          # conditional access. Unlike the 26.04 PMC repo above, the Edge repo is still
          # signed with the LEGACY microsoft.asc key on every release (per the upstream
          # installer's 2026-05-06 fix — do not point this at microsoft-2025). Only the
          # amd64 index has packages (arm64/armhf are published empty; Edge ships no
          # Linux arm64 build), so pin amd64 like google-chrome above.
          keyring-url: https://packages.microsoft.com/keys/microsoft.asc
          sources-list-lines:
            - "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-edge.gpg] https://packages.microsoft.com/repos/edge stable main"
      # Foundational packages installed before the main set (build headers needed
      # for DKMS module builds).
      corePackages:
        - linux-headers-generic  # kernel build headers for out-of-tree (DKMS) modules
      packages:
        # Build tooling
        - clang  # LLVM C/C++/Obj-C compiler
        - g++  # GNU C++ compiler
        - pkg-config  # query compile/link flags for installed libraries
        - libsystemd-dev  # libsystemd headers (systemd-devel equivalent)
        - libudev-dev  # libudev headers
        - build-essential  # gcc, make, autotools, git (covers development-tools + c-development groups)
        - libc6-dev  # C library headers

        # CLI utilities
        - btop  # interactive resource/process monitor
        # chezmoi: managed by mise
        - fd-find  # fast find alternative (binary: fdfind)
        - gh  # GitHub CLI
        # kdotool: managed by mise (cargo:kdotool — no native Ubuntu package)
        - nvtop  # GPU process/usage monitor
        - ripgrep  # fast recursive regex code search (rg)
        - unzip  # zip extractor (required by the Nerd Fonts installer; Fedora pulls it in transitively)
        - xxd  # hex dump / reverse utility
        - yp-tools  # NIS/YP client utilities
        - locales  # locale-gen/update-locale tooling — compiles ko_KR.UTF-8 and writes /etc/default/locale on Ubuntu (Fedora glibc ships it prebuilt)

        # Keyboard remapper
        - keyd  # key remapping daemon (native apt package since Ubuntu 25.04 "plucky"; noble/24.04 needs the keyd-team PPA instead)

        # Language toolchains + version manager
        - dotnet-sdk-10.0  # .NET SDK 10.0 (Ubuntu's own default archive; Canonical owns .NET packaging on 22.04+)
        - dotnet-sdk-8.0  # .NET SDK 8.0 (from the dotnet-backports PPA; EOL 2026-11-10)
        - dotnet-sdk-9.0  # .NET SDK 9.0 (from the dotnet-backports PPA; EOL 2026-11-10)
        - mise  # polyglot runtime/tool version manager (from mise apt repo)

        # Ruby build dependencies
        - libffi-dev  # FFI headers (libffi-devel equivalent)
        - libyaml-dev  # YAML headers (libyaml-devel equivalent)

        # Hardware sensors / fan control
        - lm-sensors  # hardware temperature/voltage/fan sensor readouts

        # Logitech device manager
        - solaar  # Logitech HID++ device manager

        # Password manager
        - 1password  # 1Password desktop app (from 1password apt repo)
        - 1password-cli  # 1Password CLI (op) — package name is 1password-cli, binary is op

        # Editor
        - codium  # VSCodium (telemetry-free VS Code, from vscodium apt repo)

        # AI desktop app (Linux beta: Chat/Cowork/Code tabs; no self-update — updates
        # arrive via apt. Binary: claude-desktop. Ubuntu-only; Anthropic ships no RPM.)
        - claude-desktop  # Claude desktop app (from claude-desktop apt repo)

        # Web browser
        - google-chrome-stable  # Google Chrome (from google-chrome apt repo)

        # Device management (Microsoft Intune, Ubuntu-only — the upstream installer
        # supports only Ubuntu and RHEL/AlmaLinux, so there is no Fedora counterpart).
        # Edge is a hard prerequisite: intune-portal uses it for Entra ID sign-in and
        # conditional-access compliance checks.
        - microsoft-edge-stable  # Microsoft Edge (from microsoft-edge apt repo)
        - intune-portal  # Microsoft Intune company portal (from microsoft-prod apt repo)

        # Music player (Apple Music client; requires a purchased license)
        - cider  # Cider Apple Music client (from the Cider apt repo)

        # Container runtime (rootless Podman + tooling)
        - podman  # daemonless OCI container engine
        - podman-docker  # docker CLI shim that forwards to podman
        - podman-compose  # Compose implementation for podman
        - buildah  # OCI/Docker image builder
        - golang-github-containers-common  # shared container registries/policy config
        - passt  # user-mode networking (pasta) for rootless containers
        - fuse-overlayfs  # rootless overlay filesystem driver
        - slirp4netns  # user-mode networking for rootless network namespaces

        # Screen recording / streaming / video editing
        - kdenlive  # non-linear video editor
        - obs-studio  # screen recording / live streaming

        # Mesh networking
        - tailscale  # WireGuard-based mesh VPN client (from tailscale apt repo)

        # Wayland clipboard management
        - wl-clipboard  # Wayland clipboard CLI (wl-copy / wl-paste)

        # Desktop notifications
        - libnotify-bin  # notify-send CLI (used by dot_local/bin/kde-color-picker; Fedora bundles it in libnotify)

        # Virtualization
        - fuse3  # FUSE 3 userspace filesystem support
        - libfuse3-dev  # FUSE 3 headers (fuse3-devel equivalent)
        - guestfs-tools  # CLI tools to inspect/modify VM disk images
        - libguestfs-tools  # library tools for accessing/editing VM disk images
        - ntfs-3g  # NTFS read/write driver (FUSE)
        - qemu-utils  # QEMU disk-image tools (qemu-img equivalent)
        - systemd-container  # systemd-nspawn / machinectl container tooling
        - dkms  # builds/signs out-of-tree kernel modules

        # Tauri development
        - curl  # HTTP client / file downloader
        - file  # file-type detection utility
        - libayatana-appindicator3-dev  # AppIndicator headers (libappindicator-gtk3-devel equivalent)
        - librsvg2-dev  # SVG rendering headers (librsvg2-devel equivalent)
        - libxdo-dev  # libxdo headers (libxdo-devel equivalent)
        - libssl-dev  # OpenSSL headers (openssl-devel equivalent)
        - libwebkit2gtk-4.1-dev  # WebKitGTK headers (webkit2gtk4.1-devel equivalent)
        - wget  # HTTP/HTTPS file downloader

        - expect  # automate interactive CLI prompts

        # Virtualization support
        - qemu-system-x86  # QEMU/KVM x86 system emulator (the qemu-kvm metapackage was dropped on Ubuntu 26.04)
        - libvirt-daemon-system  # libvirt daemon + systemd integration
        - ovmf  # UEFI firmware for QEMU guests, including Secure Boot builds
        - swtpm  # TPM 2.0 emulator for Windows 11 guests
        - swtpm-tools  # TPM setup/local CA helpers used by libvirt managed vTPM
        - virtinst  # virt-install and osinfo-aware VM provisioning helpers
        - virt-manager  # graphical VM manager
        - virt-viewer  # SPICE/VNC console viewer for libvirt guests

        # LUKS TPM2 auto-unlock (dot_local/bin/setup-luks-tpm2-unlock.sh, shared dracut
        # backend). Ubuntu 26.04 switched its initramfs generator to dracut, which builds
        # a systemd-based initramfs whose systemd-cryptsetup honours crypttab
        # `tpm2-device=auto` — so Ubuntu uses the same systemd-cryptenroll + dracut path as
        # Fedora (no clevis). Fedora needs no equivalent packages (dracut + systemd ship in
        # base); on Ubuntu install dracut + the tpm2 userspace the dracut tpm2-tss module needs.
        - dracut  # initramfs generator (Ubuntu 26.04 default); its systemd-cryptsetup wires tpm2-device=auto at early boot
        - tpm2-tools  # TPM2 userspace + libtss2 the dracut tpm2-tss module bundles (systemd-cryptenroll TPM2 unlock)

      # Installed only when KDE Plasma is the desktop (runtime `command -v
      # plasmashell` gate in run_onchange_before_ubuntu.sh.tmpl) — Ubuntu
      # Studio. fcitx5 is the input method on the KDE targets; GNOME hosts use
      # the native ibus stack instead (see gnomePackages).
      kdePackages:
        - fcitx5  # input method framework (KDE targets)
        - fcitx5-hangul  # Korean (Hangul) input engine for fcitx5
        - pinentry-qt  # Qt pinentry, referenced by ~/.gnupg/gpg-agent.conf on KDE hosts
      # Installed only when GNOME is the desktop (runtime `command -v
      # gnome-shell` gate) — Ubuntu Desktop 26.04. GNOME stays on its default
      # ibus input framework; only the Korean engine is added.
      gnomePackages:
        - ibus-hangul  # Korean (Hangul) input engine for ibus (GNOME default IM framework)
        - pinentry-gnome3  # gcr/GTK pinentry, referenced by ~/.gnupg/gpg-agent.conf on GNOME hosts

      # Ubuntu Studio pro-audio essentials, installed only when the host IS
      # Ubuntu Studio — runtime `dpkg -s ubuntustudio-default-settings` marker
      # (preinstalled by the Studio ISO; FORCE_UBUNTU_STUDIO=1 overrides for
      # smoke tests) in run_onchange_before_ubuntu.sh.tmpl, so a plain Ubuntu
      # Desktop install never grows the Studio audio stack. All in
      # resolute/universe; universe is enabled by enable_first_apply_apt_features.
      # Realtime privileges come from the @audio group (Studio-gated in
      # configure_user_groups) + the repo-owned limits.d drop-in
      # (system/linux/etc/security/limits.d/95-ubuntustudio-audio.conf, same
      # Studio gate in .chezmoidata/system.yaml). NOTE: ubuntustudio-installer
      # (the interactive first-run GUI) and studio-controls are intentionally NOT pinned - the former
      # contradicts the deterministic-limits approach, the latter does not exist on resolute (jammy/noble only).
      studioPackages:
        - ubuntustudio-audio-core          # PipeWire/JACK pro-audio core stack (Depends: ubuntustudio-pipewire-config)
        - ubuntustudio-pipewire-config     # Ubuntu Studio PipeWire pro-audio configuration (pinned explicitly for clarity; also a dep of audio-core)
        - ubuntustudio-performance-tweaks  # realtime/perf sysctl + tuning
        - ubuntustudio-lowlatency-settings # grub.d drop-in preferring a lowlatency kernel as boot default if installed (ships only /etc/default/grub.d/*, installs no kernel; postinst runs update-grub)

      # Installed only on bare metal (systemd-detect-virt reports no VM).
      bareMetalPackages:
        - steam  # Steam game client (needs i386 + multiverse; skip in VMs)

      # Installed only on hosts with an NVIDIA GPU (PCI vendor id 0x10de). The
      # driver is cuda-drivers (the proprietary-module metapackage from the
      # NVIDIA driver installation guide's Ubuntu network-repo procedure —
      # matching the Fedora installer's choice), built via DKMS and pulled from
      # NVIDIA's CUDA apt repo (repo path ubuntu2604). install_nvidia_support()
      # in run_onchange_before_ubuntu.sh.tmpl installs the running kernel's
      # headers first (the guide's prerequisite) and adds the CUDA repo (via
      # the cuda-keyring package) and the libnvidia-container repo on-demand
      # under the same HAS_NVIDIA gate as the Fedora installer. Under Secure
      # Boot the DKMS modules need a MOK enrolled: with the shim-signed MOK
      # already enrolled the install just proceeds (dkms signs every build with
      # it); otherwise the installer preseeds shim-signed's debconf questions
      # with the mokPassword prompted at `chezmoi init` and queues the
      # enrollment for the next boot's MokManager. Secure Boot on with neither
      # an enrolled MOK nor a password skips the NVIDIA stack entirely rather
      # than half-installing an unloadable driver.
      nvidiaPackages:
        - cuda-drivers  # NVIDIA proprietary driver metapackage (DKMS, from CUDA apt repo)
        - cuda-toolkit-13-3  # CUDA 13.3 toolkit (nvcc, libraries; from NVIDIA's CUDA apt repo)
        - nvidia-container-toolkit  # NVIDIA container runtime integration (from libnvidia-container apt repo)
        - nvidia-container-toolkit-base  # base components for the container toolkit
        - libnvidia-container-tools  # CLI tools for the NVIDIA container library
        - libnvidia-container1  # NVIDIA container runtime library

      # Installed only on hosts with an Intel GPU (PCI vendor 0x8086 + display
      # controller class 0x03). Canonical's intel-graphics-preview stack for early
      # enablement of newer Intel GPUs (Arc / Xe / Battlemage / Lunar Lake). The
      # kobuk-team/intel-graphics PPA (resolute) is added on-demand by
      # setup_intel_repos() in run_onchange_before_ubuntu.sh.tmpl under the same
      # HAS_INTEL_GPU gate; this list mirrors Canonical's setup-intel-graphics.sh.
      intelPackages:
        - intel-gsc                       # Intel Graphics System Controller firmware interface
        - libigdgmm12                     # Intel Graphics Memory Management library
        - libigc2                         # Intel Graphics Compiler runtime
        - libze-intel-gpu-raytracing      # Level Zero Intel GPU raytracing support
        - intel-media-va-driver-non-free  # VA-API media driver (full, non-free features)
        - libze1                          # oneAPI Level Zero loader
        - vainfo                          # VA-API capability probe (verifies HW video accel)
        - libvpl2                         # oneVPL dispatcher runtime (video processing library)
        - libvpl-tools                    # oneVPL command-line tools
        - intel-metrics-discovery         # GPU metrics discovery library
        - intel-metrics-library           # GPU performance metrics library
        - libmfx-gen1                     # Media SDK / oneVPL GPU runtime
        - xpu-smi                         # Intel XPU system management interface (GPU telemetry)
        - intel-opencl-icd                # Intel OpenCL runtime (compute)
        - libze-intel-gpu1                # Level Zero Intel GPU driver
      # Hardware-enablement (HWE) kernel installed alongside the Intel graphics
      # stack (--install-recommends) and made the default boot entry via a
      # GRUB_FLAVOUR_ORDER=generic drop-in (see install_intel_support). resolute
      # (26.04) is LTS, so linux-generic-hwe-26.04 tracks the rolling HWE generic
      # kernel; the flavour-order drop-in wins over ubuntustudio-lowlatency-settings.
      intelHweKernel: linux-generic-hwe-26.04

      # Flatpak apps installed system-wide from Flathub via `flatpak install`.
      flatpaks:
        - com.discordapp.Discord  # Discord voice/text chat client

      # Global .NET tools installed via `dotnet tool install -g`.
      dotnetTools:
        - git-credential-manager  # cross-platform Git credential helper (GCM)
        - powershell  # PowerShell (pwsh) cross-platform shell

      # .deb packages installed directly from a vendor URL (no repo): download
      # the matching arch .deb and install with dpkg -i (skipped when already installed).
      directDebs:
        - id: teamviewer  # remote desktop / remote support client
          debs:
            x86_64: https://download.teamviewer.com/download/linux/teamviewer_amd64.deb
            aarch64: https://download.teamviewer.com/download/linux/teamviewer_arm64.deb
