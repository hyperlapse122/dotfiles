# Package manifest for the two distro installers
# (.chezmoiscripts/20-linux-fedora/run_onchange_before_fedora.sh.tmpl and
# .chezmoiscripts/40-linux-ubuntu/run_onchange_before_ubuntu.sh.tmpl).
#
# Single source of truth (like system.yaml): add a package, repo, flatpak, or
# dotnet tool HERE, not in the installer. Every list is rendered into the
# installer, so an edit re-triggers the run_onchange_ script automatically.
#
# NAMING — every key this repo owns is camelCase, across all of .chezmoidata.
# The ONE exception here is the arch keys of a directRpms/directDebs entry's
# `rpms:`/`debs:` map (`x86_64`, `aarch64`): those are kernel arch identifiers,
# matched verbatim against `uname -m` output by the installer. They are upstream
# spellings, not schema keys — camelCasing them would simply break the lookup.
#
# ---------------------------------------------------------------------------
# `gates:` — which named host fact decides each CONDITIONAL package group.
#
# Most keys below install unconditionally. The ones that do not are listed in
# the per-distro `gates:` map, which binds the KEY to a fact from the host-fact
# registry (.chezmoidata/facts.yaml). Until now the gate lived in the key NAME
# and nowhere else: `nvidiaPackages` installs — when? The answer was a sysfs
# grep buried in each installer, and the two installers had already drifted
# apart on the very same question (both spelled `IS_VIRT` as a bare
# systemd-detect-virt while the /etc manifest's `vm` gate used --vm). Now the
# data names the fact, one probe answers it for the whole repo, and a typo
# aborts the apply instead of silently evaluating false.
#
# Gate-expression grammar — the same one system.yaml's `gate:` uses, checked by
# the same partial (.chezmoitemplates/facts-validate.tmpl):
#
#   <fact>          boolean fact is true       nvidia, intelGpu, ubuntuStudio
#   !<fact>         boolean fact is false      "!virt"  — MUST be YAML-quoted:
#                                              a bare `!` opens a YAML tag
#   <fact>.<value>  string fact equals value   desktop.kde, desktop.gnome
#
# THE MAP IS NOW LOAD-BEARING — it drives the flag, not just names it.
# Each installer renders the whole fact set into bash (FACT_* via
# .chezmoitemplates/facts-sh.tmpl), then seeds its HAS_* / IS_* flags by
# running EACH KEY'S OWN VALUE from this map through the shared fact_gate()
# dispatcher (.chezmoitemplates/facts-gate.sh.tmpl):
#
#   HAS_NVIDIA=0; fact_gate {{ index $gates "nvidiaPackages" | quote }} && HAS_NVIDIA=1
#
# and keeps its own `if` around each package array, unchanged. The arrays stay
# rendered UNCONDITIONALLY on purpose: the CI shellcheck job lints only the
# RENDERED script, so a template-gated array would quietly drop out of that
# coverage on every host that does not match the gate. Editing a value HERE —
# `kdePackages: desktop.kde` to `desktop.gnome`, say — now changes what the
# installer's HAS_KDE flag resolves to on the very next apply, because the
# installer reads THIS key's value to seed it; it no longer merely gets
# validated and then ignored. (Before fact_gate() existed, each installer read
# a `gates:` value far enough to know a fact NAME and then hand-wired that
# specific FACT_* into its own flag, bypassing whatever this map actually said
# — a `gates:` edit changed nothing at runtime. That gap is what fact_gate()
# closes; see its header in .chezmoitemplates/facts-gate.sh.tmpl for the full
# history.) facts-validate.tmpl still runs first and still `fail`s on an
# unknown fact, a boolean compared to a value, or a `desktop.<typo>` — a gate
# name can never quietly mean nothing, and now it can never quietly mean
# nothing to the INSTALLER either.
#
# The map is PER DISTRO rather than global because the conditional key sets
# genuinely differ: intelPackages / intelHweKernel / studioPackages exist only
# under `ubuntu`. One global map would have to name keys that half of it does
# not have, and each installer would then need to filter the map before handing
# it to the validator instead of passing its own distro's values straight
# through.
#
# FORCE_NVIDIA / FORCE_INTEL / FORCE_UBUNTU_STUDIO are NOT facts and are NOT
# gates: they are env-var escape hatches layered on top of the seeded flag
# inside the installer (so a GPU-less test container can still exercise the
# driver repos and package sets). See the closing note in
# .chezmoidata/facts.yaml for why they must never move into the shared partial.
packages:
  linux:
    fedora:
      # Conditional package groups → the fact that gates each. Grammar and the
      # declaration-not-a-switch rule are in the file header above; every other
      # key under `fedora:` installs unconditionally. Shorter than ubuntu's map
      # by design — Fedora has no Intel-graphics stack and no Studio flavor.
      gates:
        nvidiaPackages: nvidia  # an NVIDIA GPU is present (PCI vendor 0x10de)
        kdePackages: desktop.kde  # Fedora KDE Spin (plasmashell shipped by the ISO)
        gnomePackages: desktop.gnome  # Fedora Workstation (gnome-shell shipped by the ISO)
        bareMetalPackages: "!virt"  # neither a VM nor a container
      # COPR (community) repositories enabled via `dnf copr enable`. Fedora-only
      # mechanism: `copr enable <owner/project>` resolves the whole repo from one
      # token. Ubuntu's nearest equivalent, a PPA, is an ordinary `deb ` source
      # line, so PPAs live as plain `aptRepos` entries (mise, dotnet-backports) and
      # need no key of their own.
      coprs:
        - alternateved/keyd  # COPR hosting the keyd keyboard remapper
        - jdxcode/mise  # COPR hosting mise (runtime/tool version manager)
      # GPG keys imported (rpm --import) to verify third-party repo packages.
      # Fedora-only mechanism: rpm has ONE global keyring, so a key is declared once
      # and stands apart from the repos that use it. apt has no global keyring — every
      # source line names its own `signed-by=` — so on ubuntu the key is a FIELD of an
      # aptRepos entry (`keyringUrl`) and never a standalone list.
      keys:
        - https://downloads.1password.com/linux/keys/1password.asc  # 1Password package signing key
        - https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg  # VSCodium repo signing key
        - https://dl.google.com/linux/linux_signing_key.pub  # Google Chrome repo signing key
        - https://repo.cider.sh/RPM-GPG-KEY  # Cider Collective repo signing key
        - https://www.virtualbox.org/download/oracle_vbox_2016.asc  # Oracle VirtualBox package signing key (2016-, current)
      # Third-party .repo definitions written verbatim to /etc/yum.repos.d.
      # Counterpart of ubuntu's `aptRepos` — named for the artifact, like
      # directRpms/directDebs, because the entry SHAPE is the mechanism: dnf reads a
      # whole .repo ini (so the entry is one `content` blob, gpgkey and all), while
      # apt reads a one-line `deb ` source plus a separate keyring.
      dnfRepos:
        # 1Password desktop app + CLI stable RPM repo
        - id: 1password
          content: |
            [1password]
            name=1Password Stable Channel
            baseurl=https://downloads.1password.com/linux/rpm/stable/$basearch
            enabled=1
            gpgcheck=1
            repo_gpgcheck=1
            gpgkey="https://downloads.1password.com/linux/keys/1password.asc"
        # VSCodium (telemetry-free VS Code build) RPM repo
        - id: vscodium
          content: |
            [gitlab.com_paulcarroty_vscodium_repo]
            name=gitlab.com_paulcarroty_vscodium_repo
            baseurl=https://paulcarroty.gitlab.io/vscodium-deb-rpm-repo/rpms/
            enabled=1
            gpgcheck=1
            repo_gpgcheck=1
            gpgkey=https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg
            metadata_expire=1h
        # Google Chrome stable RPM repo (x86_64 only; Google ships no other arch)
        - id: google-chrome
          content: |
            [google-chrome]
            name=google-chrome
            baseurl=https://dl.google.com/linux/chrome/rpm/stable/x86_64
            enabled=1
            gpgcheck=1
            gpgkey=https://dl.google.com/linux/linux_signing_key.pub
        # Cider (Apple Music client) RPM repo (x86_64 only; Cider ships no other arch)
        - id: cider
          content: |
            [cidercollective]
            name=Cider Collective Repository
            baseurl=https://repo.cider.sh/rpm/RPMS
            enabled=1
            gpgcheck=1
            gpgkey=https://repo.cider.sh/RPM-GPG-KEY
      # Remote .repo files added via `dnf config-manager addrepo`. Fedora-only
      # mechanism: dnf can fetch a vendor-authored .repo file whole and adopt it.
      # apt has no "download the vendor's source list" verb — you transcribe the
      # `deb ` line yourself — so on ubuntu tailscale is a hand-written aptRepos entry.
      repoFiles:
        - https://pkgs.tailscale.com/stable/fedora/tailscale.repo  # Tailscale mesh-VPN stable repo
        - https://download.virtualbox.org/virtualbox/rpm/fedora/virtualbox.repo  # Oracle VirtualBox stable RPM repo (fetched over HTTPS; the .repo file's own baseurl stays as Oracle publishes it — http:// with gpgcheck=1 + repo_gpgcheck=1, signed by oracle_vbox_2016.asc)
      # dnf groups installed via `dnf group install` (own transaction, separate
      # from the individual packages below). Fedora-only mechanism: dnf comps groups
      # are first-class install targets. apt has no group verb (its task metapackages
      # are just packages), so the ubuntu equivalents sit in `packages` unwrapped.
      groups:
        - development-tools  # core build toolchain (gcc, make, autotools, git, ...)
        - c-development  # C headers/libraries for building against system libs
      # Foundational packages installed in their own transaction before the main
      # set, so kernel headers/devel are in place when the DKMS packages
      # (kmod-nvidia-latest-dkms, dkms) build their modules.
      corePackages:
        - clang21-libs  # Clang 21 runtime libraries
        - kernel  # Linux kernel
        - kernel-devel  # kernel build headers/Makefiles for out-of-tree modules
        - kernel-devel-matched  # kernel-devel pinned to the running/latest kernel
        - kernel-headers  # userspace-facing kernel API headers
      packages:
        # Build tooling
        - clang  # LLVM C/C++/Obj-C compiler
        - gcc-c++  # GNU C++ compiler
        - pkg-config  # query compile/link flags for installed libraries
        - systemd-devel  # libudev/libsystemd headers (libudev.pc for the hidapi backend)

        # CLI utilities
        - btop  # interactive resource/process monitor
        - chezmoi  # declarative dotfiles manager (manages this repo)
        - fd-find  # fast, user-friendly find alternative (fd)
        - gh  # GitHub CLI
        - jq  # JSON processor (config-pi/config-pi-auth merge pi's live settings/auth JSON)
        # kdotool: managed by mise (cargo:kdotool, same as Ubuntu — see dot_config/mise/config.toml)
        - nvtop  # GPU process/usage monitor
        - ripgrep  # fast recursive regex code search (rg)
        - tmux  # terminal multiplexer
        - xxd  # hex dump / reverse utility
        - yp-tools  # NIS/YP client utilities

        # Keyboard remapper
        - keyd  # key remapping daemon (from the keyd COPR)

        # Language toolchains + version manager
        - dotnet-sdk-10.0  # .NET SDK 10.0
        - dotnet-sdk-8.0  # .NET SDK 8.0
        - mise  # polyglot runtime/tool version manager

        # Ruby build dependencies (consumed by mise's ruby-build).
        # The runtime libs libffi/libyaml are pulled in transitively.
        - libffi-devel  # FFI headers (ruby-build dependency)
        - libyaml-devel  # YAML headers (ruby-build / psych dependency)

        # Hardware sensors / fan control
        - lm_sensors  # hardware temperature/voltage/fan sensor readouts

        # Logitech device manager
        - solaar  # Logitech HID++ device manager
        - solaar-udev  # udev rules granting Solaar device access

        # LibrePods (AirPods control) build deps — the linux-rust crate is compiled
        # from upstream source by .chezmoiscripts/60-build/run_onchange_after_build-librepods.sh.tmpl,
        # so the headers must be present before that script runs. pkg-config is
        # already in the "Build tooling" group above (Fedora satisfies it from
        # pkgconf-pkg-config), so only the two libraries are listed here.
        - dbus-devel  # libdbus-1 headers (the app drives BlueZ over D-Bus)
        - pulseaudio-libs-devel  # libpulse headers (audio routing / ear detection)

        # Password manager
        - 1password  # 1Password desktop app
        - 1password-cli  # 1Password CLI (op)

        # Editor
        - codium  # VSCodium (telemetry-free VS Code)

        # Web browser
        - google-chrome-stable  # Google Chrome (stable channel)

        # Music player (Apple Music client; requires a purchased license)
        - Cider  # Cider Apple Music client (from the Cider Collective repo)

        # Container runtime (rootless Podman + tooling)
        - podman  # daemonless OCI container engine
        - podman-docker  # docker CLI shim that forwards to podman
        - podman-compose  # Compose implementation for podman
        - buildah  # OCI/Docker image builder
        - containers-common  # shared container registries/policy config
        - passt  # user-mode networking (pasta) for rootless containers
        - fuse-overlayfs  # rootless overlay filesystem driver
        - slirp4netns  # user-mode networking for rootless network namespaces
        - kubernetes-client

        # Screen recording / streaming / video editing
        - kdenlive  # non-linear video editor
        - obs-studio  # screen recording / live streaming

        # Mesh networking
        - tailscale  # WireGuard-based mesh VPN client

        # Wayland clipboard management
        - wl-clipboard  # Wayland clipboard CLI (wl-copy / wl-paste)

        # Virtualization — Oracle VirtualBox (KVM/QEMU/libvirt/virt-manager dropped in
        # favor of VirtualBox for its stronger cross-platform Windows guest tooling).
        # Kernel modules build via /sbin/vboxconfig (Oracle's Fedora RPM does NOT
        # use DKMS or akmods — the postinst runs vboxconfig once for the running
        # kernel). configure_user_groups adds the user to `vboxusers` so USB
        # passthrough works. On Secure Boot: sign_virtualbox_modules() in this
        # installer signs the built modules with the DKMS MOK (seeded by
        # ensure_dkms_mok_generated if missing — same key NVIDIA's kmod-nvidia-latest-dkms
        # uses, so one mokutil enrollment covers both stacks). Kernel updates are
        # covered by the /etc/kernel/install.d/50-vbox-sign.install hook shipped
        # via system/linux/etc/ (Fedora-gated in .chezmoidata/system.yaml). The
        # Extension Pack (USB 2.0/3.0, VRDE, PXE via Intel NIC) is PUEL-licensed
        # and NOT installed here — download separately if the license fits the
        # use case. fuse3 + ntfs-3g keep working for read-only ReFS/NTFS access to
        # Windows Dev Drive vhdx mounts on the guest side.
        - VirtualBox-7.2  # Oracle VirtualBox 7.2 (from the Oracle repo added in repoFiles above)
        - fuse3  # FUSE 3 userspace filesystem support
        - fuse3-devel  # FUSE 3 headers (refs-fuse / refsprogs build dependency)
        - ntfs-3g  # NTFS read/write driver (FUSE)
        - systemd-container  # systemd-nspawn / machinectl container tooling

        # Dynamic Kernel Module Support
        - dkms  # builds/signs out-of-tree kernel modules (e.g. the NVIDIA dkms driver)

        # Tauri development
        - curl  # HTTP client / file downloader
        - file  # file-type detection utility
        - libappindicator-gtk3-devel  # AppIndicator (tray icon) headers for Tauri
        - librsvg2-devel  # SVG rendering headers (librsvg)
        - libxdo-devel  # libxdo headers (X automation) for Tauri
        - openssl-devel  # OpenSSL headers
        - webkit2gtk4.1-devel  # WebKitGTK headers (Tauri webview)
        - wget  # HTTP/HTTPS file downloader

        - expect  # automate interactive CLI prompts (TCL expect)
      # Gate `desktop.kde` — Fedora KDE Spin. fcitx5 is the unified input-method
      # framework across both KDE and GNOME (see gnomePackages for the same set
      # under its own gate; the two are mutually exclusive so the packages
      # cannot double-install). The KDE gate additionally pulls the Qt pinentry
      # KDE hosts reference from ~/.gnupg/gpg-agent.conf.
      kdePackages:
        - fcitx5  # input method framework
        - fcitx5-hangul  # Korean (Hangul) input engine for fcitx5
        - pinentry-qt  # Qt pinentry, referenced by ~/.gnupg/gpg-agent.conf on KDE hosts
      # Gate `desktop.gnome` — Fedora Workstation. GNOME uses the SAME fcitx5
      # framework as the KDE targets (unified input-method policy: ibus is
      # rejected as too buggy). GNOME has no built-in KWin virtualkeyboard, so
      # fcitx5 autostarts from a per-user XDG autostart entry
      # (dot_config/autostart/org.fcitx.Fcitx5.desktop, NotShowIn=KDE), the
      # ibus source is REMOVED from org.gnome.desktop.input-sources on existing
      # hosts, and Kimpanel is installed so the candidate popup renders inside
      # GNOME Shell (mutter has no wlr-layer-shell) — see gnome.yaml
      # shellExtensions.kimpanel and .chezmoiscripts/50-linux-gnome/.
      gnomePackages:
        - fcitx5  # input method framework
        - fcitx5-hangul  # Korean (Hangul) input engine for fcitx5
        - pinentry-gnome3  # gcr/GTK pinentry, referenced by ~/.gnupg/gpg-agent.conf on GNOME hosts
      # Gate `!virt` — installed only when the host is neither a VM nor a
      # container (bare `systemd-detect-virt`, which is what this installer has
      # always probed; NOT the /etc manifest's `vm` fact, which is --vm).
      bareMetalPackages:
        - steam  # Steam game client (needs a real GPU; skipped in VMs)
      # Gate `nvidia` — an NVIDIA GPU is present (PCI vendor id 0x10de). Pulled
      # from the CUDA + nvidia-container repos added during repo setup, under
      # the same gate.
      nvidiaPackages:
        - cuda-drivers  # NVIDIA CUDA driver metapackage
        - cuda-toolkit-13-3  # CUDA 13.3 toolkit (nvcc, libraries)
        - kmod-nvidia-latest-dkms  # NVIDIA kernel module built via DKMS
        - nvidia-driver  # NVIDIA driver metapackage
        - nvidia-container-toolkit  # NVIDIA container runtime integration
        - nvidia-container-toolkit-base  # base components for the container toolkit
        - libnvidia-container-tools  # CLI tools for the NVIDIA container library
        - libnvidia-container1  # NVIDIA container runtime library
      # Flatpak apps installed system-wide from Flathub via `flatpak install`.
      flatpaks:
        - com.discordapp.Discord  # Discord voice/text chat client
      # Global .NET tools installed via `dotnet tool install -g`.
      dotnetTools:
        - git-credential-manager  # cross-platform Git credential helper (GCM)
        - powershell  # PowerShell (pwsh) cross-platform shell
      # RPMs installed directly from a vendor URL (no repo): import the GPG
      # key(s), then install the link matching the host arch (skipped when `id`
      # is already an installed package). An entry with a pinned `version` is
      # instead converged to that exact rpm VERSION (bumping the pin re-runs
      # `dnf install` as an in-place upgrade). Counterpart of ubuntu's `directDebs`;
      # the pair is named for the artifact because the artifact IS the difference.
      # The `rpms:` map is keyed by `uname -m` output (x86_64, aarch64) — those are
      # kernel arch identifiers matched verbatim by the installer, not schema keys,
      # so they keep their upstream spelling (see the exceptions note in the header).
      directRpms:
        - id: teamviewer  # remote desktop / remote support client
          keys:
            - https://download.teamviewer.com/download/linux/signature/TeamViewer2017.asc  # TeamViewer 2017 package signing key
            - https://linux.teamviewer.com/pubkey/currentkey.asc  # TeamViewer current signing key
          rpms:
            x86_64: https://download.teamviewer.com/download/linux/teamviewer.x86_64.rpm  # 64-bit Intel/AMD
            aarch64: https://download.teamviewer.com/download/linux/teamviewer.aarch64.rpm  # 64-bit ARM
        # Biopass — same package as the Ubuntu directDebs entry (see its comment
        # for the full rationale: Howdy replacement, self-contained Tauri
        # bundle, install stays package-only / PAM enablement stays manual; the
        # broken-since-Fedora-43 principis/howdy COPR is why Howdy was dropped
        # here too). GitHub releases only; the release rpms are unsigned, so no
        # `keys` (dnf's default localpkg_gpgcheck=0 accepts a URL/local rpm).
        # Face-only method policy: .chezmoidata/biopass.yaml. To upgrade, bump
        # `version` AND both URLs together, matching the deb entry.
        - id: biopass  # face + fingerprint biometric login (Howdy alternative)
          version: "1.4.1"
          rpms:
            x86_64: https://github.com/TickLabVN/biopass/releases/download/1.4.1/biopass-1.4.1-1.x86_64.rpm
            aarch64: https://github.com/TickLabVN/biopass/releases/download/1.4.1/biopass-1.4.1-1.aarch64.rpm
    ubuntu:
      # Conditional package groups → the fact that gates each. Grammar and the
      # declaration-not-a-switch rule are in the file header above; every other
      # key under `ubuntu:` installs unconditionally.
      gates:
        nvidiaPackages: nvidia  # an NVIDIA GPU is present (PCI vendor 0x10de); FORCE_NVIDIA=1 overrides in the installer
        intelPackages: intelGpu  # an Intel GPU is present (vendor 0x8086 + display-controller class 0x03); FORCE_INTEL=1 overrides
        # intelHweKernel is a SCALAR, not a list — but it is still a key whose
        # delivery depends on a fact: install_intel_support() installs it behind
        # the very same gate as intelPackages. Declared so the map stays a
        # COMPLETE index of the conditional keys; a conditional key with no gate
        # entry is precisely the "the gate lives in the key name and nowhere
        # else" problem this map exists to end.
        intelHweKernel: intelGpu
        kdePackages: desktop.kde  # Ubuntu Studio (plasmashell shipped by the ISO)
        gnomePackages: desktop.gnome  # Ubuntu Desktop (gnome-shell shipped by the ISO)
        studioPackages: ubuntuStudio  # the ubuntustudio-default-settings seed package is installed; FORCE_UBUNTU_STUDIO=1 overrides
        bareMetalPackages: "!virt"  # neither a VM nor a container
      # Counterpart of fedora's `dnfRepos` — same job (declare a third-party repo
      # inline), different shape, because apt reads a one-line `deb ` source plus a
      # per-source keyring where dnf reads one .repo ini. Each entry: `id` (becomes
      # /etc/apt/sources.list.d/<id>.list), `keyringUrl` (GPG armored key, dearmored
      # to /usr/share/keyrings/<id>.gpg), and `sourcesListLines` (a list of
      # `deb [signed-by=...] ...` entries written verbatim, one per line — NOT a
      # deb822 .sources file). The key is a FIELD here, not fedora's standalone
      # `keys:` list, because apt has no global keyring to import into.
      aptRepos:
        # The 1password repo is deliberately NOT managed here: the 1password deb's
        # postinst owns the repo definition — it writes the deb822
        # /etc/apt/sources.list.d/1password.sources (Signed-By
        # /usr/share/keyrings/1password-archive-keyring.gpg) and comments out any
        # 1password.list it finds. A managed .list here gets resurrected by
        # setup_apt_repos with a different signed-by=, and apt then rejects the
        # ENTIRE source list ("Conflicting values set for option Signed-By"),
        # breaking every apt operation. .install-prerequisites.sh bootstraps the
        # repo before the first install; the Ubuntu installer only cleans up the
        # legacy .list left behind by earlier revisions of this entry.
        - id: vscodium
          # arch pinned: the repo publishes no i386 index, and the installer
          # enables i386 as a foreign arch (Steam), so an unpinned line makes
          # every `apt update` warn "doesn't support architecture 'i386'".
          keyringUrl: https://gitlab.com/paulcarroty/vscodium-deb-rpm-repo/raw/master/pub.gpg
          sourcesListLines:
            - "deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/vscodium.gpg] https://paulcarroty.gitlab.io/vscodium-deb-rpm-repo/debs vscodium main"
        - id: google-chrome
          keyringUrl: https://dl.google.com/linux/linux_signing_key.pub
          sourcesListLines:
            - "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] https://dl.google.com/linux/chrome/deb stable main"
        - id: cider
          # Cider (Apple Music client). Per https://repo.cider.sh the docs dearmor the key to
          # /usr/share/keyrings/cider-archive-keyring.gpg, but the generic aptRepos loop dearmors
          # every key to /usr/share/keyrings/<id>.gpg, which apt accepts identically. arch=amd64
          # pinned: the repo ships only linux-x64 debs (binary-arm64/armhf/i386 indexes are empty),
          # so an unpinned line would fail to resolve on non-amd64 hosts.
          keyringUrl: https://repo.cider.sh/APT-GPG-KEY
          sourcesListLines:
            - "deb [arch=amd64 signed-by=/usr/share/keyrings/cider.gpg] https://repo.cider.sh/apt stable main"
        - id: claude-desktop
          # Claude desktop app (Linux beta — Debian-based only; Anthropic ships no RPM,
          # so there is no Fedora counterpart). Per
          # https://code.claude.com/docs/en/desktop-linux — the docs keep the armored key at
          # /usr/share/keyrings/claude-desktop-archive-keyring.asc, but the generic aptRepos
          # loop dearmors every key to /usr/share/keyrings/<id>.gpg, which apt accepts
          # identically. Key fingerprint: 31DD DE24 DDFA B679 F42D 7BD2 BAA9 29FF 1A7E CACE.
          keyringUrl: https://downloads.claude.ai/claude-desktop/key.asc
          sourcesListLines:
            - "deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/claude-desktop.gpg] https://downloads.claude.ai/claude-desktop/apt/stable stable main"
        - id: mise
          # PPA per https://mise.jdx.dev/installing-mise.html#apt — the docs' recommended
          # source for Ubuntu 26.04+, but effectively amd64-only (its arm64/i386/... indexes
          # are published empty). .install-prerequisites.sh bootstraps mise from the
          # distro-agnostic multi-arch mise.jdx.dev/deb repo instead; on Ubuntu,
          # setup_apt_repos then converges mise.list (and its keyring) to this PPA.
          keyringUrl: https://keyserver.ubuntu.com/pks/lookup?op=get&options=mr&search=0x38A097C0CCE691795E4B15BE23997D3EEE1EDC52
          sourcesListLines:
            - "deb [signed-by=/usr/share/keyrings/mise.gpg] https://ppa.launchpadcontent.net/jdxcode/mise/ubuntu resolute main"
        - id: tailscale
          keyringUrl: https://pkgs.tailscale.com/stable/ubuntu/resolute.noarmor.gpg
          sourcesListLines:
            - "deb [signed-by=/usr/share/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/ubuntu resolute main"
        - id: dotnet-backports
          # ppa:dotnet/backports — Canonical (not Microsoft) now owns .NET packaging on
          # Ubuntu 22.04+. Ubuntu's own archive only carries the current SDK (10.0), so
          # older non-default SDKs (8.0, 9.0) come from this PPA instead of Microsoft's
          # repo. https://launchpad.net/~dotnet/+archive/ubuntu/backports
          keyringUrl: https://keyserver.ubuntu.com/pks/lookup?op=get&options=mr&search=0x45A3F127159BE9E5017811C62125B164E8E5D3FA
          sourcesListLines:
            - "deb [signed-by=/usr/share/keyrings/dotnet-backports.gpg] https://ppa.launchpadcontent.net/dotnet/backports/ubuntu resolute main"
        - id: microsoft-prod
          # Microsoft PMC prod repo for Ubuntu 26.04 — carries intune-portal (+ deps).
          # Layout per Microsoft's Intune installer (shell-intune-samples): suite is the
          # release CODENAME (resolute), component is main. Ubuntu 26.04+ PMC repos are
          # signed with the NEWER microsoft-2025 key, not the legacy microsoft.asc one.
          # arch pinned: the repo publishes no i386 index and the installer enables i386
          # as a foreign arch (Steam), so an unpinned line would warn on every apt update.
          keyringUrl: https://packages.microsoft.com/keys/microsoft-2025.asc
          sourcesListLines:
            - "deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/26.04/prod resolute main"
        - id: microsoft-edge
          # Microsoft Edge repo — intune-portal needs Edge for Entra ID sign-in /
          # conditional access. Unlike the 26.04 PMC repo above, the Edge repo is still
          # signed with the LEGACY microsoft.asc key on every release (per the upstream
          # installer's 2026-05-06 fix — do not point this at microsoft-2025). Only the
          # amd64 index has packages (arm64/armhf are published empty; Edge ships no
          # Linux arm64 build), so pin amd64 like google-chrome above.
          keyringUrl: https://packages.microsoft.com/keys/microsoft.asc
          sourcesListLines:
            - "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-edge.gpg] https://packages.microsoft.com/repos/edge stable main"
        - id: virtualbox
          # Oracle VirtualBox stable Debian repo — the .repo suite matches the Ubuntu
          # codename (resolute for 26.04), component is `contrib`, arch amd64 only
          # (Oracle publishes no arm64 index). oracle_vbox_2016.asc is Oracle's current
          # signing key. Suite bumps track the LTS codename — update alongside a
          # release upgrade.
          keyringUrl: https://www.virtualbox.org/download/oracle_vbox_2016.asc
          sourcesListLines:
            - "deb [arch=amd64 signed-by=/usr/share/keyrings/virtualbox.gpg] http://download.virtualbox.org/virtualbox/debian resolute contrib"
      # Foundational packages installed before the main set (build headers needed
      # for DKMS module builds).
      corePackages:
        - linux-headers-generic  # kernel build headers for out-of-tree (DKMS) modules
      packages:
        # Build tooling
        - clang  # LLVM C/C++/Obj-C compiler
        - g++  # GNU C++ compiler
        - pkg-config  # query compile/link flags for installed libraries
        - libsystemd-dev  # libsystemd headers (systemd-devel equivalent)
        - libudev-dev  # libudev headers
        - build-essential  # gcc, make, autotools, git (covers development-tools + c-development groups)
        - libc6-dev  # C library headers

        # CLI utilities
        - btop  # interactive resource/process monitor
        # chezmoi: managed by mise
        - fd-find  # fast find alternative (binary: fdfind)
        - gh  # GitHub CLI
        - jq  # JSON processor (config-pi/config-pi-auth merge pi's live settings/auth JSON)
        # kdotool: managed by mise (cargo:kdotool — no native Ubuntu package)
        - nvtop  # GPU process/usage monitor
        - ripgrep  # fast recursive regex code search (rg)
        - tmux  # terminal multiplexer
        - unzip  # zip extractor (required by the Nerd Fonts installer; Fedora pulls it in transitively)
        - xxd  # hex dump / reverse utility
        - yp-tools  # NIS/YP client utilities
        - locales  # locale-gen/update-locale tooling — compiles ko_KR.UTF-8 and writes /etc/default/locale on Ubuntu (Fedora glibc ships it prebuilt)

        # Keyboard remapper
        - keyd  # key remapping daemon (native apt package since Ubuntu 25.04 "plucky"; noble/24.04 needs the keyd-team PPA instead)

        # Language toolchains + version manager
        - dotnet-sdk-10.0  # .NET SDK 10.0 (Ubuntu's own default archive; Canonical owns .NET packaging on 22.04+)
        - dotnet-sdk-8.0  # .NET SDK 8.0 (from the dotnet-backports PPA; EOL 2026-11-10)
        - dotnet-sdk-9.0  # .NET SDK 9.0 (from the dotnet-backports PPA; EOL 2026-11-10)
        - mise  # polyglot runtime/tool version manager (from mise apt repo)

        # Ruby build dependencies
        - libffi-dev  # FFI headers (libffi-devel equivalent)
        - libyaml-dev  # YAML headers (libyaml-devel equivalent)

        # Hardware sensors / fan control
        - lm-sensors  # hardware temperature/voltage/fan sensor readouts

        # Logitech device manager
        - solaar  # Logitech HID++ device manager

        # LibrePods (AirPods control) build deps — the linux-rust crate is compiled
        # from upstream source by .chezmoiscripts/60-build/run_onchange_after_build-librepods.sh.tmpl,
        # so the headers must be present before that script runs. pkg-config is
        # already in the "Build tooling" group above, so only the two libraries
        # are listed here.
        - libdbus-1-dev  # libdbus-1 headers (the app drives BlueZ over D-Bus; dbus-devel equivalent)
        - libpulse-dev  # libpulse headers (audio routing / ear detection; pulseaudio-libs-devel equivalent)

        # Password manager
        - 1password  # 1Password desktop app (from 1password apt repo)
        - 1password-cli  # 1Password CLI (op) — package name is 1password-cli, binary is op

        # Editor
        - codium  # VSCodium (telemetry-free VS Code, from vscodium apt repo)

        # AI desktop app (Linux beta: Chat/Cowork/Code tabs; no self-update — updates
        # arrive via apt. Binary: claude-desktop. Ubuntu-only; Anthropic ships no RPM.)
        - claude-desktop  # Claude desktop app (from claude-desktop apt repo)

        # Web browser
        - google-chrome-stable  # Google Chrome (from google-chrome apt repo)

        # Device management (Microsoft Intune, Ubuntu-only — the upstream installer
        # supports only Ubuntu and RHEL/AlmaLinux, so there is no Fedora counterpart).
        # Edge is a hard prerequisite: intune-portal uses it for Entra ID sign-in and
        # conditional-access compliance checks.
        - microsoft-edge-stable  # Microsoft Edge (from microsoft-edge apt repo)
        - intune-portal  # Microsoft Intune company portal (from microsoft-prod apt repo)

        # Music player (Apple Music client; requires a purchased license)
        - cider  # Cider Apple Music client (from the Cider apt repo)

        # Container runtime (rootless Podman + tooling)
        - podman  # daemonless OCI container engine
        - podman-docker  # docker CLI shim that forwards to podman
        - podman-compose  # Compose implementation for podman
        - buildah  # OCI/Docker image builder
        - golang-github-containers-common  # shared container registries/policy config
        - passt  # user-mode networking (pasta) for rootless containers
        - fuse-overlayfs  # rootless overlay filesystem driver
        - slirp4netns  # user-mode networking for rootless network namespaces

        # Screen recording / streaming / video editing
        - kdenlive  # non-linear video editor
        - obs-studio  # screen recording / live streaming

        # Mesh networking
        - tailscale  # WireGuard-based mesh VPN client (from tailscale apt repo)

        # Wayland clipboard management
        - wl-clipboard  # Wayland clipboard CLI (wl-copy / wl-paste)

        # Desktop notifications
        - libnotify-bin  # notify-send CLI (used by dot_local/bin/kde-color-picker; Fedora bundles it in libnotify)

        # Virtualization — Oracle VirtualBox (KVM/QEMU/libvirt/virt-manager dropped in
        # favor of VirtualBox for its stronger cross-platform Windows guest tooling).
        # The `virtualbox-7.2` postinst builds the vboxdrv/vboxnetflt/vboxnetadp
        # kernel modules via DKMS (via the virtualbox-dkms dependency);
        # configure_user_groups adds the user to `vboxusers` (USB passthrough needs
        # it). On Secure Boot, DKMS module signing reuses shim-signed's MOK — the
        # ensure_shim_mok_enrolled() function in this installer sets it up ONCE at
        # the top of the run (before the base-packages install, so virtualbox-dkms
        # can sign against it during its postinst) and NVIDIA's later DKMS build
        # signs against the SAME MOK. The Extension Pack (USB 2.0/3.0, VRDE, PXE
        # via Intel NIC) is PUEL-licensed and NOT installed here — download
        # separately if the license fits the use case. fuse3 + ntfs-3g keep
        # working for read-only ReFS/NTFS access to Windows Dev Drive vhdx mounts
        # on the guest side.
        - virtualbox-7.2  # Oracle VirtualBox 7.2 (from the Oracle apt repo added in aptRepos above)
        - fuse3  # FUSE 3 userspace filesystem support
        - libfuse3-dev  # FUSE 3 headers (fuse3-devel equivalent)
        - ntfs-3g  # NTFS read/write driver (FUSE)
        - systemd-container  # systemd-nspawn / machinectl container tooling
        - dkms  # builds/signs out-of-tree kernel modules (VirtualBox, NVIDIA)

        # Tauri development
        - curl  # HTTP client / file downloader
        - file  # file-type detection utility
        - libayatana-appindicator3-dev  # AppIndicator headers (libappindicator-gtk3-devel equivalent)
        - librsvg2-dev  # SVG rendering headers (librsvg2-devel equivalent)
        - libxdo-dev  # libxdo headers (libxdo-devel equivalent)
        - libssl-dev  # OpenSSL headers (openssl-devel equivalent)
        - libwebkit2gtk-4.1-dev  # WebKitGTK headers (webkit2gtk4.1-devel equivalent)
        - wget  # HTTP/HTTPS file downloader

        - expect  # automate interactive CLI prompts

        # LUKS TPM2 auto-unlock (dot_local/bin/setup-luks-tpm2-unlock.sh, shared dracut
        # backend). Ubuntu 26.04 switched its initramfs generator to dracut, which builds
        # a systemd-based initramfs whose systemd-cryptsetup honours crypttab
        # `tpm2-device=auto` — so Ubuntu uses the same systemd-cryptenroll + dracut path as
        # Fedora (no clevis). Fedora needs no equivalent packages (dracut + systemd ship in
        # base); on Ubuntu install dracut + the tpm2 userspace the dracut tpm2-tss module needs.
        - dracut  # initramfs generator (Ubuntu 26.04 default); its systemd-cryptsetup wires tpm2-device=auto at early boot
        - tpm2-tools  # TPM2 userspace + libtss2 the dracut tpm2-tss module bundles (systemd-cryptenroll TPM2 unlock)

      # Gate `desktop.kde` — Ubuntu Studio. fcitx5 is the unified input-method
      # framework across both KDE and GNOME (see gnomePackages for the same
      # set under its own gate; the two are mutually exclusive so the packages
      # cannot double-install). The KDE gate additionally pulls the Qt
      # pinentry KDE hosts reference from ~/.gnupg/gpg-agent.conf.
      kdePackages:
        - fcitx5  # input method framework
        - fcitx5-hangul  # Korean (Hangul) input engine for fcitx5
        - pinentry-qt  # Qt pinentry, referenced by ~/.gnupg/gpg-agent.conf on KDE hosts
      # Gate `desktop.gnome` — Ubuntu Desktop 26.04. GNOME uses the SAME fcitx5
      # framework as the KDE targets (unified input-method policy: ibus is
      # rejected as too buggy). GNOME has no built-in KWin virtualkeyboard, so
      # fcitx5 autostarts from a per-user XDG autostart entry
      # (dot_config/autostart/org.fcitx.Fcitx5.desktop, NotShowIn=KDE), the
      # ibus source is REMOVED from org.gnome.desktop.input-sources on existing
      # hosts, and Kimpanel is installed so the candidate popup renders inside
      # GNOME Shell (mutter has no wlr-layer-shell) — see gnome.yaml
      # shellExtensions.kimpanel and .chezmoiscripts/50-linux-gnome/.
      gnomePackages:
        - fcitx5  # input method framework
        - fcitx5-hangul  # Korean (Hangul) input engine for fcitx5
        - pinentry-gnome3  # gcr/GTK pinentry, referenced by ~/.gnupg/gpg-agent.conf on GNOME hosts

      # Ubuntu Studio pro-audio essentials. No fedora counterpart, and not an
      # oversight: Ubuntu Studio is an Ubuntu FLAVOR sharing ID=ubuntu, so it needs a
      # fact of its own to be distinguishable at all — whereas Fedora's KDE Spin vs
      # Workstation split is already carried by the `desktop` fact, and Fedora ships
      # no pro-audio flavor to gate on.
      # Gate `ubuntuStudio` — the
      # ubuntustudio-default-settings seed package the Studio ISO preinstalls
      # (every Ubuntu flavor reports ID=ubuntu, so the package IS the flavor;
      # FORCE_UBUNTU_STUDIO=1 overrides in the installer for smoke tests), so a
      # plain Ubuntu Desktop install never grows the Studio audio stack. All in
      # resolute/universe; universe is enabled by enable_first_apply_apt_features.
      # Realtime privileges come from the @audio group (Studio-gated in
      # configure_user_groups) + the repo-owned limits.d drop-in
      # (system/linux/etc/security/limits.d/95-ubuntustudio-audio.conf, same
      # Studio gate in .chezmoidata/system.yaml). NOTE: ubuntustudio-installer
      # (the interactive first-run GUI) and studio-controls are intentionally NOT pinned - the former
      # contradicts the deterministic-limits approach, the latter does not exist on resolute (jammy/noble only).
      studioPackages:
        - ubuntustudio-audio-core          # PipeWire/JACK pro-audio core stack (Depends: ubuntustudio-pipewire-config)
        - ubuntustudio-pipewire-config     # Ubuntu Studio PipeWire pro-audio configuration (pinned explicitly for clarity; also a dep of audio-core)
        - ubuntustudio-performance-tweaks  # realtime/perf sysctl + tuning
        - ubuntustudio-lowlatency-settings # grub.d drop-in preferring a lowlatency kernel as boot default if installed (ships only /etc/default/grub.d/*, installs no kernel; postinst runs update-grub)

      # Gate `!virt` — installed only when the host is neither a VM nor a
      # container (bare `systemd-detect-virt`, which is what this installer has
      # always probed; NOT the /etc manifest's `vm` fact, which is --vm).
      bareMetalPackages:
        - steam  # Steam game client (needs i386 + multiverse; skip in VMs)

      # Gate `nvidia` — an NVIDIA GPU is present (PCI vendor id 0x10de). The
      # driver is cuda-drivers (the proprietary-module metapackage from the
      # NVIDIA driver installation guide's Ubuntu network-repo procedure —
      # matching the Fedora installer's choice), built via DKMS and pulled from
      # NVIDIA's CUDA apt repo (repo path ubuntu2604). install_nvidia_support()
      # in run_onchange_before_ubuntu.sh.tmpl installs the running kernel's
      # headers first (the guide's prerequisite) and adds the CUDA repo (via
      # the cuda-keyring package) and the libnvidia-container repo on-demand
      # under the same HAS_NVIDIA gate as the Fedora installer. Under Secure
      # Boot the DKMS modules need a MOK enrolled: with the shim-signed MOK
      # already enrolled the install just proceeds (dkms signs every build with
      # it); otherwise the installer preseeds shim-signed's debconf questions
      # with the MOK password prompted at `chezmoi init` (stored
      # keyring-encrypted as mokPasswordCipher, decrypted at render time;
      # 8-16 chars per update-secureboot-policy; cleared again via an EXIT
      # trap) and queues
      # the enrollment for the next boot's MokManager. Secure Boot on with
      # neither an enrolled MOK nor a password skips the NVIDIA stack entirely
      # rather than half-installing an unloadable driver.
      nvidiaPackages:
        - cuda-drivers  # NVIDIA proprietary driver metapackage (DKMS, from CUDA apt repo)
        - cuda-toolkit-13-3  # CUDA 13.3 toolkit (nvcc, libraries; from NVIDIA's CUDA apt repo)
        - nvidia-container-toolkit  # NVIDIA container runtime integration (from libnvidia-container apt repo)
        - nvidia-container-toolkit-base  # base components for the container toolkit
        - libnvidia-container-tools  # CLI tools for the NVIDIA container library
        - libnvidia-container1  # NVIDIA container runtime library

      # Gate `intelGpu` — an Intel GPU is present (PCI vendor 0x8086 + display
      # controller class 0x03). No fedora counterpart, and not an oversight: this is
      # Canonical's out-of-archive early-enablement PPA, a distro mechanism Fedora
      # has no analogue for — Fedora ships the Intel stack (mesa, intel-media-driver)
      # in-distro on a fast release cadence, so those packages need no gate and no
      # key of their own.
      # Canonical's intel-graphics-preview stack for early
      # enablement of newer Intel GPUs (Arc / Xe / Battlemage / Lunar Lake). The
      # kobuk-team/intel-graphics PPA (resolute) is added on-demand by
      # setup_intel_repos() in run_onchange_before_ubuntu.sh.tmpl under the same
      # HAS_INTEL_GPU gate; this list mirrors Canonical's setup-intel-graphics.sh.
      intelPackages:
        - intel-gsc                       # Intel Graphics System Controller firmware interface
        - libigdgmm12                     # Intel Graphics Memory Management library
        - libigc2                         # Intel Graphics Compiler runtime
        - libze-intel-gpu-raytracing      # Level Zero Intel GPU raytracing support
        - intel-media-va-driver-non-free  # VA-API media driver (full, non-free features)
        - libze1                          # oneAPI Level Zero loader
        - vainfo                          # VA-API capability probe (verifies HW video accel)
        - libvpl2                         # oneVPL dispatcher runtime (video processing library)
        - libvpl-tools                    # oneVPL command-line tools
        - intel-metrics-discovery         # GPU metrics discovery library
        - intel-metrics-library           # GPU performance metrics library
        - libmfx-gen1                     # Media SDK / oneVPL GPU runtime
        - xpu-smi                         # Intel XPU system management interface (GPU telemetry)
        - intel-opencl-icd                # Intel OpenCL runtime (compute)
        - libze-intel-gpu1                # Level Zero Intel GPU driver
      # Gate `intelGpu` (same as intelPackages — a scalar, not a list, but still
      # a conditional key; see the gates map above). No fedora counterpart: the HWE
      # kernel train is an LTS-only Ubuntu mechanism (a stable release carrying a
      # newer kernel), and Fedora's whole release model makes it meaningless.
      # Hardware-enablement (HWE) kernel installed alongside the Intel graphics
      # stack (--install-recommends) and made the default boot entry via a
      # GRUB_FLAVOUR_ORDER=generic drop-in (see install_intel_support). resolute
      # (26.04) is LTS, so linux-generic-hwe-26.04 tracks the rolling HWE generic
      # kernel; the flavour-order drop-in wins over ubuntustudio-lowlatency-settings.
      intelHweKernel: linux-generic-hwe-26.04

      # Flatpak apps installed system-wide from Flathub via `flatpak install`.
      flatpaks:
        - com.discordapp.Discord  # Discord voice/text chat client

      # Global .NET tools installed via `dotnet tool install -g`.
      dotnetTools:
        - git-credential-manager  # cross-platform Git credential helper (GCM)
        - powershell  # PowerShell (pwsh) cross-platform shell

      # .deb packages installed directly from a vendor URL (no repo): download
      # the matching arch .deb and install with dpkg -i. An entry with a pinned
      # `version` is converged to that exact version (bumping the pin re-runs
      # dpkg -i as an upgrade); an entry without one installs only when absent —
      # right for self-updating packages whose postinst registers its own repo.
      # Counterpart of fedora's `directRpms`; the `debs:` map is likewise keyed by
      # `uname -m` output (x86_64, aarch64), not by schema keys.
      directDebs:
        - id: teamviewer  # remote desktop / remote support client
          debs:
            x86_64: https://download.teamviewer.com/download/linux/teamviewer_amd64.deb
            aarch64: https://download.teamviewer.com/download/linux/teamviewer_arm64.deb
        # Biopass (TickLabVN/Biopass) — Windows Hello-style face + fingerprint
        # PAM auth with a management GUI. Replaces the originally considered
        # Howdy: Howdy's beta PPA publishes no resolute (26.04) dist and its
        # focal deb's postinst builds a 2018 dlib that no longer compiles on a
        # modern Python (verified broken in a container), while Biopass ships a
        # self-contained Tauri deb (bundled onnxruntime/libcamera; deps curl,
        # fprintd, libwebkit2gtk-4.1-0, libturbojpeg0 all resolve from the
        # Ubuntu archives) whose postinst only runs ldconfig plus a non-fatal
        # per-user ONNX model download. GitHub releases only (no apt repo),
        # asset names carry the tag — to upgrade, bump `version` AND both URLs
        # together. Install is package-only by design: the shipped PAM profile
        # (/usr/share/pam-configs/biopass) is `Default: no`, and enabling it
        # via `sudo pam-auth-update` stays a deliberate manual step (see
        # upstream docs/PAM.md) — auto-enabling would stack face auth into
        # gdm-password and re-lock the login keyring at the greeter, the exact
        # failure the GDM password-only-greeter setup exists to prevent.
        # Enabled-method policy (face-only for now): .chezmoidata/biopass.yaml.
        # Fedora installs the same release via directRpms below.
        - id: biopass  # face + fingerprint biometric login (Howdy alternative)
          version: "1.4.1"
          debs:
            x86_64: https://github.com/TickLabVN/biopass/releases/download/1.4.1/biopass_1.4.1_amd64.deb
            aarch64: https://github.com/TickLabVN/biopass/releases/download/1.4.1/biopass_1.4.1_arm64.deb
