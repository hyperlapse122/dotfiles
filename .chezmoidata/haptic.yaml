# mxm4-haptic runtime tunables, rendered as Environment= lines into the Linux
# systemd user unit templates:
#   dot_config/systemd/user/mxm4-hapticd.service.tmpl        (haptic.daemon.*)
#   dot_config/systemd/user/mxm4-haptic-notify.service.tmpl  (haptic.notify.*)
#
# Single source of truth (like packages.yaml): tune a knob HERE, not in the
# unit files. The build script
# (.chezmoiscripts/60-build/run_onchange_after_build-mxm4-haptic.sh.tmpl)
# fingerprints this file alongside the unit templates, so a knob edit re-runs
# it — `systemctl --user daemon-reload` + a restart of the active units — and
# the new values take effect on the same apply.
#
# Every knob mirrors an env var read by the Rust binaries
# (crates/mxm4-haptic/src/bin/). The values below ARE the Rust source
# defaults, kept in lockstep; the units render every knob explicitly (even at
# its default) so the effective value is always visible in the unit, and the
# source defaults are only the fallback for a binary running OUTSIDE the units
# (invoked by hand, or the macOS launchd plist, which renders no env).
#
# haptic.daemon — mxm4-hapticd (src/bin/mxm4-hapticd.rs):
#   pacingMs   : MXM4D_PACING_MS. Minimum gap held AFTER a pulse so the motor
#                finishes the waveform before the next fires (the firmware
#                exposes no "playback done" event; this is a duration
#                estimate).
#   debounceMs : MXM4D_DEBOUNCE_MS. Pulses arriving within this of the last
#                one are dropped.
#   pollMs     : MXM4D_POLL_MS. hidraw read poll quantum; also bounds how late
#                a queued play command is noticed — keep small (8 ms is
#                imperceptible vs the pacing) so button-hold haptics feel
#                immediate.
#
# haptic.notify — mxm4-haptic-notify (src/bin/mxm4-haptic-notify.rs):
#   minGapMs     : MXM4_NOTIFY_MIN_GAP_MS. Min ms between forwarded pulses
#                  (the daemon debounces too; this just avoids hammering it on
#                  notification storms).
#   skipReplaces : MXM4_NOTIFY_SKIP_REPLACES. true skips notification
#                  *updates* (replaces_id != 0 — progress bars, now-playing);
#                  false also pulses on them. Rendered as 1/0: the binary
#                  treats "0" as false, any other value as true.
#   denyApps     : MXM4_NOTIFY_DENY. List of notification app_name values to
#                  ignore (e.g. [Spotify, discord]); rendered comma-joined,
#                  [] renders an empty value = deny nothing.
#   battery      : MXM4_NOTIFY_BATTERY. false disables the UPower battery
#                  WarningLevel watcher (mouse-battery-low pulses). Rendered
#                  as 1/0: the binary treats "0" or "false" as off, any other
#                  value as on.
#
# haptic.claude — Claude Code hook event -> waveform, for the mxm4-haptic
# Claude Code PLUGIN. Unlike the knobs above (which are env vars), these render
# into the plugin's hook manifest:
#   dot_local/share/claude-plugins/mxm4-haptic/hooks/hooks.json.tmpl
# and the plugin is installed by the generic
#   .chezmoiscripts/70-agents/run_onchange_after_install-agent-plugins.sh.tmpl
# Tune a waveform HERE, not in the manifest (same rule as solaar.rules
# .gestureConfirmWaveform). Each value MUST be one of the 16 waveform names in
# crates/mxm4-haptic/src/lib.rs (WAVEFORMS) — the plugin's hook command passes
# it through verbatim, and an unknown name makes mxm4-haptic exit 2 (a silent
# no-op, since the hook wrapper always exits 0).
#
# The map mirrors the OpenCode plugin's (packages/opencode-mxm4-haptic/
# src/index.ts), so both agents buzz identically:
#
#   stop        <- session.idle       : the agent finished its turn.
#   stopFailure <- session.error      : the turn ended on an API error.
#   notification<- permission.updated : the agent is waiting on YOU to decide.
#   question    <- the Question tool  : the agent asked you to pick an option
#                                       (Claude Code's AskUserQuestion tool).
#
# NOTE the sub-agent gating comes free here. The OpenCode plugin must inspect
# each session's parentID to avoid buzzing once per sub-agent during a fan-out;
# Claude Code fires Stop/StopFailure for the ROOT agent ONLY (a sub-agent fires
# SubagentStop, which this plugin deliberately leaves unhooked), so there is no
# gating logic to write. Hooking SubagentStop would buzz once per sub-agent —
# don't.
#
# haptic.pi — pi extension event -> waveform, for the mxm4-haptic pi EXTENSION
# (dot_pi/agent/extensions/mxm4-haptic.ts.tmpl, auto-discovered by pi from
# ~/.pi/agent/extensions/ — no build, loaded via jiti). Same rule as
# haptic.claude: each value MUST be one of the 16 waveform names in
# crates/mxm4-haptic/src/lib.rs (WAVEFORMS); the template's fail guard aborts
# the apply on a typo'd name. pi has no shell hooks and no hook manifest, so
# unlike Claude Code the waveforms render directly into the extension's .ts as
# baked-in consts (not a JSON manifest).
#
# The map mirrors haptic.claude / the OpenCode plugin so all THREE agents buzz
# identically:
#
#   settled  <- agent_settled         : the agent finished its turn and is idle
#                                       waiting for you (pi's equivalent of
#                                       Claude Stop / OpenCode session.idle).
#   failed   <- agent_settled after   : the run died on an API error (the last
#               an error response       provider response >= 400) — pi's best
#                                       equivalent of Claude StopFailure /
#                                       OpenCode session.error. There is no
#                                       dedicated "turn failed" event in pi,
#                                       so the extension tracks the last
#                                       after_provider_response status and
#                                       switches the waveform on settle.
#   question <- the ask_user tool     : the agent wants you to pick an option /
#                                       answer (pi-ask-user). pi has no
#                                       separate permission/elicitation event,
#                                       so this one hook collapses Claude's
#                                       Notification(elicitation) +
#                                       PreToolUse(AskUserQuestion).
#
# Sub-agent gating is free here too, and for a different reason than the other
# two: pi-subagents spawns each child as a SEPARATE pi process in --mode json -p
# (headless, ctx.hasUI === false), so gating every handler on ctx.hasUI excludes
# children — no parentID inspection, no child-status polling. The same gate also
# silences `pi -p` / script runs (no human watching in real time).
haptic:
  daemon:
    pacingMs: 180
    debounceMs: 120
    pollMs: 8
  notify:
    minGapMs: 800
    skipReplaces: true
    denyApps: []
    battery: true
  claude:
    stop: COMPLETED
    stopFailure: MAD
    notification: RINGING
    question: RINGING
  pi:
    settled: COMPLETED
    failed: MAD
    question: RINGING
