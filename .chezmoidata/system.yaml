# Manifest for the root-owned /etc installer
# (.chezmoiscripts/30-linux/run_onchange_after_install-system-10-files.sh.tmpl).
# See system/README.md for the full model.
#
# Single source of truth (like packages.yaml): add/gate a system/linux/etc
# file or list a removed /etc path HERE, not in the installer script. The
# manifest is rendered into the installer, so any edit here re-triggers the
# run_onchange_ installer automatically — no separate fingerprint needed.
system:
  linux:
    # Per-path overrides for files under system/linux/etc/. Defaults when a
    # file matches no entry: mode 0644, installed unconditionally. `path` is a
    # bash glob matched against the path relative to system/linux/ (first
    # match wins, so keep specific entries before broad globs).
    #
    #   mode:  install(1) mode (string, e.g. "440")
    #   gate:  named host FACT from the registry (.chezmoidata/facts.yaml,
    #          factRegistry) — the file is skipped when the fact is false. The
    #          installer no longer probes the host itself: it reads the FACT_*
    #          variables the registry renders into it, so one probe answers here,
    #          in the package installers, and in every template alike. Gates used
    #          below, with the fail-safe direction each one protects:
    #            thinkpad     DMI product_version/product_family says ThinkPad.
    #            vm           systemd-detect-virt --vm — VMs ONLY. Deliberately
    #                         not the registry's `virt` fact (which is true for a
    #                         container too): this gate grants password-less sudo.
    #            sddmBreeze   the breeze SDDM theme is installed.
    #            gdm          the GDM greeter's compiled defaults db exists.
    #            fprintdPam   pam_fprintd.so installed AND a Debian-style
    #                         /etc/pam.d/common-auth to @include.
    #          Every name here is validated against the registry at RENDER time
    #          (.chezmoitemplates/facts-validate.tmpl), so an unknown gate aborts
    #          the whole chezmoi command naming the valid facts — typos fail loud,
    #          and a gate never silently evaluates false.
    #   check: named validator run on the SOURCE file on every host, even
    #          when the gate skips the install (so contributors catch broken
    #          files on machines that never deploy them). Known: visudo. Unlike
    #          `gate:` this is NOT a fact — it validates the file, not the host.
    overrides:
      # thinkpad_acpi module config/load only makes sense on a ThinkPad.
      - path: etc/modprobe.d/thinkpad_acpi.conf
        gate: thinkpad
      - path: etc/modules-load.d/thinkpad_acpi.conf
        gate: thinkpad
      # sudoers(5): drop-ins must be mode 0440 (sudo ignores
      # group/world-writable files) and the filename must not contain '.'
      # or end in '~'. VM-only so password-less sudo never lands on bare
      # metal; visudo-checked everywhere because a broken drop-in can break
      # sudo globally on the host.
      - path: "etc/sudoers.d/*"
        mode: "440"
        gate: vm
        check: visudo
      # De-brands the login greeter to upstream Breeze on both distros.
      # Forcing Current=breeze without the theme installed yields a broken
      # login screen, so skip when the breeze SDDM theme is absent.
      - path: etc/sddm.conf.d/90-breeze.conf
        gate: sddmBreeze
      # GNOME targets: force password-only auth at the GDM greeter so
      # pam_gnome_keyring always unlocks the login keyring (a fingerprint
      # login proves identity but hands PAM no secret, leaving the keyring
      # locked — gnome-keyring#1). The in-session lock screen reads the same
      # key from the USER's dconf, so fingerprint unlock there is unaffected.
      # The profile override in /etc/dconf/profile/ outranks the vendor
      # profile in /usr/share/dconf/profile/ and adds system-db:gdm (upstream
      # ships only user-db + file-db); the greeter always launches with
      # DCONF_PROFILE=gdm (fixed upstream constant, both distros). Skipped on
      # KDE hosts (no GDM).
      - path: etc/dconf/profile/gdm
        gate: gdm
      - path: "etc/dconf/db/gdm.d/*"
        gate: gdm
      # Fingerprint at polkit prompts. Neither distro puts pam_fprintd in the
      # generic auth stack (Ubuntu's pam-auth-update `fprintd` profile is
      # Default: no; only GDM's standalone gdm-fingerprint service hardcodes the
      # module), so polkit stays password-only until this file overrides the
      # vendor /usr/lib/pam.d/polkit-1. Enabling fprintd in common-auth instead
      # would hand the GDM greeter fingerprint auth back and re-lock the login
      # keyring — see the dconf entries above. The file is Debian-shaped
      # (@include common-auth), which is what the gate checks: Fedora's
      # rpm-owned polkit-1 includes system-auth and must not be overwritten.
      - path: etc/pam.d/polkit-1
        gate: fprintdPam
      # kernel-install(8) drop-in that re-signs Oracle VirtualBox modules on
      # every new kernel install. Fedora-only: Oracle's Fedora RPM does NOT use
      # DKMS or akmods (its /sbin/vboxconfig builds unsigned modules), so
      # nothing else picks up a kernel upgrade under Secure Boot without this
      # hook. Ubuntu's virtualbox-dkms uses shim-signed's DKMS integration and
      # needs no equivalent. Mode 0755 — kernel-install invokes it directly.
      - path: etc/kernel/install.d/50-vbox-sign.install
        mode: "755"
        gate: distro.fedora

    # Absolute /etc paths that the installer previously shipped but that no
    # longer exist in system/linux/etc/. Listed explicitly so every machine —
    # including ones that pull a committed deletion — removes the orphan on
    # the next run. `rm -f` is idempotent, so leaving entries here for a
    # release cycle or two after the deletion is safe (no-op once gone).
    #
    # When deleting a tracked file from system/linux/etc/, add its absolute
    # /etc path HERE in the same commit. Optional `distro` restricts removal
    # to one distro (matched against /etc/os-release ID at runtime) — for
    # paths only ever deployed there, so a native/user file elsewhere is
    # never deleted.
    removed:
      - path: /etc/udev/rules.d/logitech-receiver.rules
      # Ubuntu Studio pro-audio realtime limits — removed with Ubuntu Studio
      # support. Ubuntu-scoped: this drop-in was only ever deployed there.
      - path: /etc/security/limits.d/95-ubuntustudio-audio.conf
        distro: ubuntu
