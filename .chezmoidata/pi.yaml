# .chezmoidata/pi.yaml — single source of truth for pi (earendil-works).
#
# Two consumers, both in .chezmoiscripts/70-agents/:
#   - run_onchange_after_install-pi-packages.sh.tmpl reads `pi.packages` and
#     loops `pi install` over it.
#   - run_onchange_after_config-pi.sh.tmpl merges `pi.defaultProvider` /
#     `pi.defaultModel` / `pi.defaultThinkingLevel` into the live
#     ~/.pi/agent/settings.json.
#
# Both scripts render these values into their own bodies, so editing this file
# changes each script's rendered content and re-triggers it — no fingerprint
# block (the install-vscodium-extensions shape).
#
# Why settings.json is NOT a managed target: pi LIVE-WRITES it (theme, packages,
# lastChangelogVersion, …), so a managed file — let alone a readonly_ 0444 one —
# would fight pi every session, exactly the way a managed ~/.claude/settings.json
# would fight Claude Code and aoe. config-pi read-merge-WRITES only the three
# default keys, preserving every key pi owns — the same shape config-solaar and
# config-biopass use for other apps' live-written config.

pi:
  # Packages pi loads resources from (MCP client, skills, tools). `pi install
  # <source>` is idempotent and owns the `packages` array in settings.json;
  # entries are UNPINNED by design (npm: tracks latest, git: tracks default
  # branch) — the same unsettled trade-off the dotagents remote skills make.
  packages:
    - npm:pi-mcp-extension # MCP client — inert without ~/.pi/agent/mcp.json (dot_pi/agent/private_readonly_mcp.json.tmpl)
    - git:github.com/EveryInc/compound-engineering-plugin # ce-* + lfg skills, native pi plugin (parallel to the Claude/Codex/opencode installs)
    - npm:pi-subagents # subagent delegation (Task tool + pi-subagents skill)
    - npm:pi-ask-user # ask_user decision-handshake tool + skill

  # Default provider — must be credentialed in ~/.pi/agent/auth.json. Its static
  # api_key providers (incl. `zai`, Z.ai Coding Plan) are data-driven from
  # .chezmoidata/agents.yaml (.agents.pi.auth.providers) and merged into that
  # live file by run_onchange_after_config-pi-auth.sh.tmpl. pi's built-in
  # default `google` is NOT credentialed here, so without this every invocation
  # needs explicit --provider/--model.
  defaultProvider: openai-codex

  # Default model id for the provider above. Must be a model the provider
  # accepts (verified: `pi --provider zai --model glm-5.2 --print "say OK"` → OK).
  defaultModel: gpt-5.6-sol

  # Default thinking level — one of: off | minimal | low | medium | high | xhigh | max
  defaultThinkingLevel: xhigh
