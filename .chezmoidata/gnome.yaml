# GNOME desktop tunables, rendered into the .chezmoiscripts/50-linux-gnome/
# config scripts (GNOME otherwise stays on stock defaults — every key here is
# one of the deliberate, user-approved policy exceptions documented in
# AGENTS.md).
#
# Single source of truth (like packages.yaml): tune a value HERE, not in the
# script — each value renders into the consuming script's body, so a data edit
# re-triggers that run_onchange_ script automatically (no separate fingerprint
# needed).
#
# gnome.mouse:
#   accelProfile : org.gnome.desktop.peripherals.mouse accel-profile, applied
#                  by run_onchange_after_config-gnome-mouse.sh.tmpl. One of
#                  libinput's profiles: `flat` (constant 1:1 mapping, no
#                  speed-dependent curve — the standard choice for high-DPI
#                  mice; pointer speed then comes from hardware DPI, see
#                  solaar.yaml `dpi`), `adaptive` (the GNOME default curve),
#                  or `custom`. The script stamps the exact value it applied
#                  (value-signature, like config-gnome-fonts): editing this
#                  re-asserts the new value exactly once, while a user's later
#                  manual Settings change is never fought.
#
# gnome.terminal:
#   palette      : the per-profile `palette` name of Ptyxis (the GNOME terminal
#                  on both GNOME targets — Ubuntu 26.04 and Fedora 44 ship it as
#                  the default terminal), applied by
#                  run_onchange_after_config-gnome-terminal-palette.sh.tmpl to
#                  the DEFAULT Ptyxis profile
#                  (org.gnome.Ptyxis.Profile:/org/gnome/Ptyxis/Profiles/<uuid>/
#                  key `palette`). Valid values are the palette names Ptyxis
#                  lists in Preferences → Appearance: `gnome`, `gnome-legacy`,
#                  `gogh`, `solarized`, … (whatever palettes the installed
#                  Ptyxis ships).
#                  WHY `gnome` (the shipped value): Ptyxis's own schema default
#                  IS `gnome`, but Ubuntu overrides it distro-wide in
#                  /usr/share/glib-2.0/schemas/10_ptyxis.gschema.override with
#                  `[org.gnome.Ptyxis.Profile] palette='Ubuntu'`, so Ubuntu
#                  hosts come up purple while Fedora hosts come up stock.
#                  Writing `gnome` at user scope restores the stock GNOME
#                  palette, so all four targets look the same (on Fedora it is a
#                  harmless no-op — it just re-asserts the upstream default).
#                  The script stamps the exact value it applied
#                  (value-signature, like config-gnome-mouse): editing this
#                  re-asserts the new value exactly once, while a user's later
#                  manual palette pick in Ptyxis is never fought.
gnome:
  mouse:
    accelProfile: flat
  terminal:
    palette: gnome
