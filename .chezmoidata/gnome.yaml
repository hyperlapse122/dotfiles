# GNOME desktop tunables, rendered into the .chezmoiscripts/50-linux-gnome/
# config scripts (GNOME otherwise stays on stock defaults — every key here is
# one of the deliberate, user-approved policy exceptions documented in
# AGENTS.md).
#
# Single source of truth (like packages.yaml): tune a value HERE, not in the
# script — each value renders into the consuming script's body, so a data edit
# re-triggers that run_onchange_ script automatically (no separate fingerprint
# needed).
#
# gnome.mouse:
#   accelProfile : org.gnome.desktop.peripherals.mouse accel-profile, applied
#                  by run_onchange_after_config-gnome-mouse.sh.tmpl. One of
#                  libinput's profiles: `flat` (constant 1:1 mapping, no
#                  speed-dependent curve — the standard choice for high-DPI
#                  mice; pointer speed then comes from hardware DPI, see
#                  solaar.yaml `dpi`), `adaptive` (the GNOME default curve),
#                  or `custom`. The script stamps the exact value it applied
#                  (value-signature, like config-gnome-fonts): editing this
#                  re-asserts the new value exactly once, while a user's later
#                  manual Settings change is never fought.
#
# gnome.terminal:
#   palette      : the per-profile `palette` name of Ptyxis (the GNOME terminal
#                  on both GNOME targets — Ubuntu 26.04 and Fedora 44 ship it as
#                  the default terminal), applied by
#                  run_onchange_after_config-gnome-terminal-palette.sh.tmpl to
#                  the DEFAULT Ptyxis profile
#                  (org.gnome.Ptyxis.Profile:/org/gnome/Ptyxis/Profiles/<uuid>/
#                  key `palette`). Valid values are the palette names Ptyxis
#                  lists in Preferences → Appearance: `gnome`, `gnome-legacy`,
#                  `gogh`, `solarized`, … (whatever palettes the installed
#                  Ptyxis ships).
#                  WHY `gnome` (the shipped value): Ptyxis's own schema default
#                  IS `gnome`, but Ubuntu overrides it distro-wide in
#                  /usr/share/glib-2.0/schemas/10_ptyxis.gschema.override with
#                  `[org.gnome.Ptyxis.Profile] palette='Ubuntu'`, so Ubuntu
#                  hosts come up purple while Fedora hosts come up stock.
#                  Writing `gnome` at user scope restores the stock GNOME
#                  palette, so all four targets look the same (on Fedora it is a
#                  harmless no-op — it just re-asserts the upstream default).
#                  The script stamps the exact value it applied
#                  (value-signature, like config-gnome-mouse): editing this
#                  re-asserts the new value exactly once, while a user's later
#                  manual palette pick in Ptyxis is never fought.
#
# gnome.appGrid:
#   sortAlphabetically : the app-grid ORDER INTENT, applied by
#                   run_onchange_after_config-gnome-app-grid-order.sh.tmpl.
#                   `true` = clear org.gnome.shell `app-picker-layout` (an EMPTY
#                   layout is what makes GNOME Shell sort the grid itself, by
#                   locale collation — 가나다순 under a Korean locale); `false` =
#                   leave the launcher on whatever order the host came with. The
#                   value is a RESET intent, not a value to write: there is no
#                   "sort" key in GNOME to set, which is why this stays a script.
#                   Applied exactly once (stamp), so a grid the user later
#                   re-arranges by hand is never wiped back.
#
# gnome.shortcuts:
#   onePassword   : the 1Password Quick Access global shortcut, registered as a
#                   GNOME custom keybinding by
#                   run_onchange_after_config-gnome-1password-shortcut.sh.tmpl
#                   (GNOME ignores the X-KDE-Shortcuts desktop-action key the KDE
#                   targets get this from, so it has to be a custom keybinding).
#                   The triple is exactly what the
#                   org.gnome.settings-daemon.plugins.media-keys.custom-keybinding
#                   schema takes: `name` (shown in Settings → Keyboard), `command`
#                   (g_spawn'd directly — no %U desktop-entry field code) and
#                   `binding` (GTK accelerator syntax: `<Control><Shift>space`).
#                   The dconf PATH the keybinding lives at is script structure,
#                   not data — it is an identity, not a setting. Editing `command`
#                   or `binding` changes the script's value-signature, so the new
#                   chord is re-asserted exactly once; a chord the user later
#                   re-binds in Settings is never fought.
#
# gnome.shellExtensions:
#   solaar        : the GNOME Shell extension installed by
#                   run_onchange_after_install-gnome-solaar-extension.sh.tmpl —
#                   `uuid` is upstream's fixed extension id (sanity-checked
#                   against the extensions.gnome.org response) and `egoId` is its
#                   numeric extensions.gnome.org primary key, the `pk=` of the
#                   extension-info API query that resolves a build for the RUNNING
#                   shell version. Both identify WHICH extension; the script keeps
#                   every bit of the download/compat/enable logic (see its header).
#   kimpanel      : Input-method panel extension installed by
#                   run_onchange_after_install-gnome-kimpanel-extension.sh.tmpl.
#                   Load-bearing on GNOME Wayland: mutter has no wlr-layer-shell,
#                   so fcitx5-classicui cannot draw its candidate popup
#                   as a layer surface — without Kimpanel the popup either
#                   misses the caret or renders through XWayland at the top-left
#                   of the screen. Kimpanel receives fcitx5's candidate state
#                   over the KDE Kimpanel D-Bus interface (fcitx5-module-kimpanel
#                   in the fcitx5 package on both distros) and renders it inside
#                   GNOME Shell instead. The `uuid` / `egoId` pair works exactly
#                   like the solaar entry above; the script mirrors the same
#                   resolve/download/enable logic.
gnome:
  mouse:
    accelProfile: flat
  terminal:
    palette: gnome
  appGrid:
    sortAlphabetically: true
  shortcuts:
    onePassword:
      name: 1Password Quick Access
      command: /usr/bin/1password --quick-access
      binding: <Control><Shift>space
  shellExtensions:
    solaar:
      uuid: solaar-extension@sidevesh
      egoId: 6162
    kimpanel:
      uuid: kimpanel@kde.org
      egoId: 261
