# Manifest of Wi-Fi networks provisioned into NetworkManager by
#   ~/.local/bin/import-wifi-1password (rendered from
#   dot_local/bin/private_executable_import-wifi-1password.tmpl), driven on apply
#   by .chezmoiscripts/30-linux/run_onchange_after_import-wifi-1password.sh.tmpl.
#
# Single source of truth (like packages.yaml / solaar.yaml): declare every Wi-Fi
# network HERE, not by editing 1Password items or the script. This REPLACES the
# former "list every 1Password Wireless Router item" discovery model — only the
# networks enumerated below are provisioned, add/overwriting NetworkManager
# connections to match this file (a missing network is added; an existing one is
# overwritten in place; --force recreates it from scratch).
#
# SECRETS — op:// references, resolved at chezmoi RENDER time. Any string VALUE
# that begins exactly with `op://` is passed to onepasswordRead when the tool is
# rendered; every other string is used verbatim. So `ssid` and `psk` may each be
# EITHER a literal ("MyHome_5G") OR a 1Password reference
# ("op://Private/Home Wi-Fi/password"). This is the resolve-op-refs-json.tmpl
# rule (the same one agents.yaml / opencode.json use), applied to this whole
# structure — so a per-network `dns` entry could even be an op:// ref too.
#
# Because secrets are resolved at RENDER time, the rendered tool CONTAINS the real
# PSKs — which is exactly why its source carries the `private_` attribute
# (deployed 0700, owner-only), NOT the world-readable 0755 of an ordinary
# ~/.local/bin tool, and why it is Linux-gated in dot_local/bin/.chezmoiignore so
# secrets are never baked into a macOS/Windows copy. The run_onchange fingerprint
# hashes THIS file's RAW text (the op:// refs, never the resolved passwords), so
# no secret enters chezmoi state / `chezmoi diff`. Trade-off (same as agents.toml):
# rotating a PSK's VALUE in 1Password alone does NOT re-trigger the import — the
# raw ref is unchanged — so after a rotation re-run `import-wifi-1password` by hand
# or `chezmoi apply --force`.
#
# NAMING — camelCase keys, like the rest of .chezmoidata (ignoreAutoDns). The
# `dns` VALUES are literal IPv4 addresses written verbatim into the connection's
# ipv4.dns.
#
# Shape:
#   wifi.defaults — applied to every network unless the network overrides it:
#     dns           : list of IPv4 DNS servers -> the connection's ipv4.dns.
#                     [] = set no manual DNS (keep the DHCP/ISP-provided DNS).
#     ignoreAutoDns : true -> ipv4.ignore-auto-dns yes, so ONLY the `dns` above is
#                     used and DHCP-provided DNS is ignored. No effect when dns is [].
#   wifi.networks — list, one entry per network:
#     ssid          : REQUIRED. The network name. Literal or op:// ref.
#     psk           : the WPA/WPA2/WPA3-personal passphrase. Literal or op:// ref.
#                     Omit (or leave empty) for an OPEN network (key-mgmt none).
#     priority      : optional int in -999..999 -> connection.autoconnect-priority.
#                     NM autoconnects to the highest-priority known network
#                     (default 0) — e.g. give a dual-band router's 5GHz SSID 10 and
#                     leave its 2.4GHz sibling unset. Absent = left at NM's default,
#                     and never clobbered on an existing connection.
#     dns           : optional per-network override of wifi.defaults.dns.
#     ignoreAutoDns : optional per-network override of wifi.defaults.ignoreAutoDns.
#
# Enterprise (802.1x) and WPA3-only SAE networks are out of scope — a plain PSK
# cannot express them (same limitation as the previous 1Password importer). IPv4
# DNS only: ipv6.dns is left untouched.
wifi:
  defaults:
    # Cloudflare public resolvers. Change here to re-DNS every network at once.
    dns: ["1.1.1.1", "1.0.0.1"]
    ignoreAutoDns: true
  # Add one entry per network. ssid/psk may be an op:// ref OR a literal.
  # Examples (commented — replace with your own 1Password item paths / SSIDs):
  #   - ssid: "op://Private/Home Wi-Fi/network name"
  #     psk: "op://Private/Home Wi-Fi/password"
  #     priority: 10                 # prefer this 5GHz SSID over its 2.4GHz sibling
  #   - ssid: "MyHome_2G"            # a literal SSID sharing the same op:// psk
  #     psk: "op://Private/Home Wi-Fi/password"
  #   - ssid: "GuestOpen"            # open network: omit psk
  #     dns: []                      # per-network override: keep this network's DHCP DNS
  networks: []
