# Linux-only dotbot tasks - loaded by install.sh when uname -s = Linux.
#
# This file ALSO drives root-owned config under system/linux/ via `shell:` +
# `sudo install -D -m <mode>`. dotbot itself can't write to /etc/, so we shell
# out. See AGENTS.md "Root-owned config".

- defaults:
    link:
      create: true
      relink: true
      # Repo-managed dotfiles are authoritative; replace real target files.
      force: true

- link:
    ~/:
      glob: true
      path: home/.z*

    # GnuPG (Linux/macOS use ~/.gnupg; Windows uses %APPDATA%/gnupg by default).
    # Only *.conf is linked - we don't want random gpg state files mirrored.
    ~/.gnupg/:
      glob: true
      path: home/.gnupg/*.conf

    # Per-OS git overrides (referenced via [include] in home/.config/git/config)
    ~/.gitconfig.d/linux.gitconfig: home/.gitconfig.d/linux.gitconfig

    # Linux-only IME and hardware tooling
    ~/.config/:
      glob: true
      path: home/.config/**/*

    # VS Code on Linux (path differs on macOS / Windows; see those yaml files).
    # Only the two tracked *.json files - VS Code writes lots of state into
    # User/ that we don't want mirrored, so this is intentionally not a dir link.
    ~/.config/Code/User/:
      glob: true
      path: home/.config/Code/User/*.json

    # VSCodium on Linux (path differs on macOS / Windows; see those yaml files).
    # Only the two tracked *.json files - VSCodium writes lots of state into
    # User/ that we don't want mirrored, so this is intentionally not a dir link.
    ~/.config/VSCodium/User/:
      glob: true
      path: home/.config/VSCodium/User/*.json

    # Docker credential helpers (Linux/macOS only - Windows uses PATHEXT and
    # expects .exe/.bat/.cmd, see header comments in each script). Source
    # files are tracked at mode 100755; the symlink preserves the exec bit.
    ~/.local/bin/docker-credential-gh: home/.local/bin/docker-credential-gh
    ~/.local/bin/docker-credential-glab: home/.local/bin/docker-credential-glab
    ~/.local/bin/docker-credential-dockerhub: home/.local/bin/docker-credential-dockerhub

    # opencode mise wrapper (POSIX side; Windows ships opencode.ps1, see
    # install.windows.yaml). Resolves the latest release version from GitHub
    # at invocation time and hands it to `mise exec`.
    ~/.local/bin/opencode: home/.local/bin/opencode

    # code -> codium shim (POSIX side; Windows ships code.ps1, see
    # install.windows.yaml). Runs VS Codium when `code` is invoked.
    ~/.local/bin/code: home/.local/bin/code

    # Codex lifecycle hooks (https://developers.openai.com/codex/hooks): pulse the
    # MX Master 4 on Stop -> COMPLETED and PermissionRequest -> RINGING via the
    # mxm4-haptic client, mirroring the @h82/opencode-mxm4-haptic OpenCode plugin.
    # Codex never writes back to hooks.json (unlike config.toml), so it is a plain
    # symlink. Linked on Linux + macOS only — the mxm4-haptic client is built
    # there (not on Windows). Non-managed command hooks must be trusted once via
    # `/hooks` in the Codex CLI before they run.
    ~/.codex/hooks.json: codex/hooks.json

    # XDG desktop entries (Linux DE only - macOS uses .app bundles, Windows
    # uses Start Menu/AppX). One entry per tracked .desktop file. .desktop
    # files reference Icon= names that must resolve via the icon theme tree
    # below.
    ~/.local/share/applications/:
      glob: true
      path: home/.local/share/applications/*

# Configure glab with script
- shell:
    - command: sh scripts/auth/setup-glab.sh
      description: Set up glab cli
      stdin: true
      stdout: true
      stderr: true

# Auto-load the @h82/opencode-mxm4-haptic plugin built by the yarn step above.
# OpenCode scans top-level *.ts / *.js files in BOTH ~/.config/opencode/plugin/
# and ~/.config/opencode/plugins/ (singular and plural) and loads them at
# startup — no opencode.json `plugin` array entry needed. The link target name
# is deliberately `mxm4-haptic.js` (NOT .mjs) so it matches that *.js auto-scan
# glob; .mjs is NOT auto-scanned, so we point a `.js` symlink at the ESM
# dist/index.mjs build output. The companion `.js.map` link is the sourcemap
# (ends in .map, so it is NOT picked up as a plugin) for readable stack traces.
# Linux-only: macOS/Windows bootstrap don't build the packages/ workspace, so
# they don't link this. Requires the preceding yarn build to have produced
# dist/; if that step soft-skipped (mise absent), the symlink dangles until the
# workspace is built manually. The plugin pulses the MX Master 4 on OpenCode
# events (session.idle -> COMPLETED) via the running mxm4-hapticd daemon.
- link:
    ~/.config/opencode/plugins/mxm4-haptic.js: packages/opencode-mxm4-haptic/dist/index.mjs
    ~/.config/opencode/plugins/mxm4-haptic.js.map: packages/opencode-mxm4-haptic/dist/index.mjs.map

# Root-owned system config. Delegated to scripts/linux/install-linux-system-config.sh
# so a single `sudo` prompt covers all files (sudo's credential cache makes
# subsequent installs in that script password-less). The script also no-ops the
# `sudo` prefix when already root, so it works inside chroot/container too.
- shell:
    - command: bash scripts/linux/install-linux-system-config.sh
      description: Install root-owned config to /etc/ (NetworkManager, ThinkPad acpi, locale, keyd, libinput, plymouth, udev)
      stdin: true
      stdout: true
      stderr: true

# Render tracked *.1password templates into ~/.secrets. The helper no-ops when
# no templates exist; when templates are present it requires an authenticated
# `op` CLI session.
- shell:
    - command: bash scripts/bootstrap/inject-1password-secrets.sh
      description: Inject 1Password templates into ~/.secrets
      stdin: true
      stdout: true
      stderr: true

# Install desktop fonts to ~/.local/share/fonts/ (no sudo). Placed AFTER the
# sudo step above so the sudo prompt fires while the user is still attentive;
# the slow first-run font downloads (~150 MB for Nerd Fonts) can then run
# unattended. Idempotent: skips fonts already present via marker check.
- shell:
    - command: bash scripts/bootstrap/install-fonts.sh
      description: Install desktop fonts user-wide (Pretendard, JetBrains Mono, D2Coding, Nerd Font variants)
      stdin: true
      stdout: true
      stderr: true

# Build + install the mxm4-haptic crate's three binaries into ~/.local/bin:
# mxm4-hapticd (haptic daemon — sole owner of the Bolt receiver HID++
# session, discovers the MX Master 4 natively over HID++ with no cache),
# mxm4-haptic-notify (desktop-notification -> haptic bridge), and
# mxm4-haptic (thin client invoked by the Haptic rule in
# home/.config/solaar/rules.yaml). One cargo install builds all three; the
# two services are linked by dotbot under home/.config/systemd/user/ and
# enabled manually (no session bus during bootstrap — see that dir's
# README). Linux-only: uses /sys/class/hidraw + /dev/hidraw*, AF_UNIX, and
# (for the notify bridge) dbus-monitor. `mise exec rust@latest` because
# dotbot's shell steps run under non-interactive bash where mise
# activation from ~/.bashrc is not loaded. `--root ~/.local` puts the
# binary alongside dotbot's hand-linked ~/.local/bin entries (already on
# PATH). `--locked` honors the tracked Cargo.lock; `--force` makes
# re-runs idempotent (rebuilds only on source change). See crates/README.md.
- shell:
    - command: 'command -v cargo >/dev/null 2>&1 && mise exec rust@latest -- cargo install --path crates/mxm4-haptic --root "$HOME/.local" --locked --force --quiet || echo "config-solaar: cargo unavailable; skipping mxm4-haptic build" >&2'
      description: Build + install mxm4-haptic binaries (daemon, notification bridge, client) to ~/.local/bin (skipped when cargo absent)
      stdin: true
      stdout: true
      stderr: true

# Enable both mxm4-haptic units now that their binaries are built and their
# units are linked (by the ~/.config/**/* glob above). No `--now`: plain
# `enable` only wires the WantedBy symlinks, so systemd starts each unit when
# its target is reached — mxm4-hapticd.service with default.target, and
# mxm4-haptic-notify.service when graphical-session.target comes up. Guarded
# soft-skip: requires the built binaries AND a working `systemctl --user`
# connection, which is absent in agent/CI/chroot runs with no user session
# bus. In that case it prints a hint and exits 0 (the user enables them
# manually once a session exists). Idempotent: re-`enable` is a no-op.
- shell:
    - command: '[ -x "$HOME/.local/bin/mxm4-hapticd" ] && systemctl --user daemon-reload >/dev/null 2>&1 && systemctl --user enable mxm4-hapticd.service mxm4-haptic-notify.service >/dev/null 2>&1 && echo "mxm4-haptic: services enabled" || echo "mxm4-haptic: skipping enable (binaries missing or no user session bus); enable manually, see home/.config/systemd/user/README.md" >&2'
      description: Enable mxm4-hapticd + mxm4-haptic-notify services (skipped when binaries missing or no user session bus)
      stdin: true
      stdout: true
      stderr: true

# Generate the zsh completion for the mxm4-haptic client into
# ~/.config/zsh/completions/_mxm4-haptic (on fpath via .zprofile). The
# client emits its CLI spec with `--usage` (waveform choices generated from
# its WAVEFORMS table); `usage` turns that into a static completion script
# baked at bootstrap, so the shell never spawns the binary per completion.
# A generated artifact, NOT tracked in the repo. `mise exec usage@latest`
# because dotbot's non-interactive bash has no mise activation; the client
# is referenced by absolute path for the same reason. Soft-skips when the
# binary wasn't built (cargo absent) or mise is unavailable.
- shell:
    - command: 'command -v mise >/dev/null 2>&1 && [ -x "$HOME/.local/bin/mxm4-haptic" ] && { mkdir -p "$HOME/.config/zsh/completions" && "$HOME/.local/bin/mxm4-haptic" --usage | mise exec usage@latest -- usage generate completion zsh mxm4-haptic -f - > "$HOME/.config/zsh/completions/_mxm4-haptic"; } || echo "mxm4-haptic: skipping zsh completion (binary or mise unavailable)" >&2'
      description: Generate _mxm4-haptic zsh completion via usage (skipped when binary/mise absent)
      stdin: true
      stdout: true
      stderr: true

# Apply per-device Solaar settings to ~/.config/solaar/config.yaml that
# can't be expressed via the symlinked rules.yaml (currently divert-keys
# for the MX Master 4 Haptic and MX Master 3S gesture buttons). The
# mxm4-hapticd daemon discovers device/HAPTIC indices natively at runtime,
# so there is no cache file to populate here. Why a script and not a
# tracked config.yaml: the file embeds per-physical-device
# _serial / _unitId / _battery / _absent fields that would couple the repo
# to one mouse unit and produce noisy diffs every Solaar save. Soft-skips
# when Solaar is not installed, the config file hasn't been generated yet,
# or the target device isn't paired. Idempotent: re-running on a correct
# config writes nothing and does not bounce Solaar. See
# scripts/linux/config-solaar.sh header for the full target schema.
- shell:
    - command: bash scripts/linux/config-solaar.sh
      description: Apply per-device Solaar divert-keys config (MX Master 4 + 3S; skipped when Solaar/device absent)
      stdin: true
      stdout: true
      stderr: true

# Configure KDE Plasma 6 user-side settings in eight independent steps:
#   - fonts:           Pretendard (sans) + JetBrainsMono Nerd Font (mono)
#                      into kdeglobals via kwriteconfig6.
#   - touchpad:        libinput natural scroll, tap-to-click, and clickfinger
#                      right-click on devices in TOUCHPAD_TARGET_NAMES, via
#                      KWin's InputDeviceManager DBus.
#   - panel:           icontasks/taskmanager `groupingStrategy = 0`
#                      ("Do not group") in plasma-org.kde.plasma.desktop-appletsrc.
#   - kickoff:         favoritesDisplay=1 + applicationsDisplay=1 ("In a
#                      list") on every panel-level kickoff applet in the
#                      same appletsrc.
#   - virtualkeyboard: [Wayland] InputMethod in kwinrc -> Fcitx 5 Wayland
#                      Launcher (.desktop path). Soft-skips when fcitx5 is
#                      not installed yet.
#   - digitalclock:    long date format on every panel-level Digital Clock.
#   - calendar:        holidays + PIM events in Digital Clock calendar popup,
#                      South Korea holidays, and all local Akonadi calendars.
#   - edges:           disables KWin screen edge/corner actions and the
#                      multi-monitor pointer edge barrier in kwinrc.
# Hard-guarded: each step no-ops (returns 0) when its prereqs are missing
# (kwriteconfig6/busctl/plasmashell, no active Plasma session on the session
# bus, fcitx5 not installed), and the whole script exits 0 on non-KDE
# systems - safe to run on non-KDE Linux (GNOME, sway, headless servers,
# chroot/container, etc.).
# MUST run AFTER scripts/bootstrap/install-fonts.sh: that step finishes with `fc-cache -f`, so
# fc-match here sees the just-installed fonts. The fonts step errors out
# (exit 1) if a requested font isn't installed. Re-runnable; every write is
# idempotent.
- shell:
    - command: bash scripts/linux/config-kde.sh
      description: Configure KDE Plasma 6 (fonts, touchpad, panel grouping, kickoff list view, virtual keyboard; skipped on non-KDE systems)
      stdin: true
      stdout: true
      stderr: true
