# Linux-only dotbot tasks - loaded by install.sh when uname -s = Linux.
#
# This file ALSO drives root-owned config under system/linux/ via `shell:` +
# `sudo install -D -m <mode>`. dotbot itself can't write to /etc/, so we shell
# out. See AGENTS.md "Root-owned config".

- defaults:
    link:
      create: true
      relink: true
      # Repo-managed dotfiles are authoritative; replace real target files.
      force: true

- link:
    ~/:
      glob: true
      path: home/.z*

    # GnuPG (Linux/macOS use ~/.gnupg; Windows uses %APPDATA%/gnupg by default).
    # Only *.conf is linked - we don't want random gpg state files mirrored.
    ~/.gnupg/:
      glob: true
      path: home/.gnupg/*.conf

    # Per-OS git overrides (referenced via [include] in home/.config/git/config)
    ~/.gitconfig.d/linux.gitconfig: home/.gitconfig.d/linux.gitconfig

    # Linux-only IME and hardware tooling
    ~/.config/:
      glob: true
      path: home/.config/**/*

    # VS Code on Linux (path differs on macOS / Windows; see those yaml files).
    # Only the two tracked *.json files - VS Code writes lots of state into
    # User/ that we don't want mirrored, so this is intentionally not a dir link.
    ~/.config/Code/User/:
      glob: true
      path: home/.config/Code/User/*.json

    # Docker credential helpers (Linux/macOS only - Windows uses PATHEXT and
    # expects .exe/.bat/.cmd, see header comments in each script). Source
    # files are tracked at mode 100755; the symlink preserves the exec bit.
    ~/.local/bin/docker-credential-gh: home/.local/bin/docker-credential-gh
    ~/.local/bin/docker-credential-glab: home/.local/bin/docker-credential-glab
    ~/.local/bin/docker-credential-dockerhub: home/.local/bin/docker-credential-dockerhub

    # opencode mise wrapper (POSIX side; Windows ships opencode.ps1, see
    # install.windows.yaml). Resolves the latest release version from GitHub
    # at invocation time and hands it to `mise exec`.
    ~/.local/bin/opencode: home/.local/bin/opencode

    # XDG desktop entries (Linux DE only - macOS uses .app bundles, Windows
    # uses Start Menu/AppX). One entry per tracked .desktop file. .desktop
    # files reference Icon= names that must resolve via the icon theme tree
    # below.
    ~/.local/share/applications/:
      glob: true
      path: home/.local/share/applications/*

# Configure glab with script
- shell:
    - command: sh scripts/auth/setup-glab.sh
      description: Set up glab cli
      stdin: true
      stdout: true
      stderr: true

# Root-owned system config. Delegated to scripts/linux/install-linux-system-config.sh
# so a single `sudo` prompt covers all files (sudo's credential cache makes
# subsequent installs in that script password-less). The script also no-ops the
# `sudo` prefix when already root, so it works inside chroot/container too.
- shell:
    - command: bash scripts/linux/install-linux-system-config.sh
      description: Install root-owned config to /etc/ (NetworkManager drop-ins, locale, keyd, libinput, plymouth, udev)
      stdin: true
      stdout: true
      stderr: true

# Render tracked *.1password templates into ~/.secrets. The helper no-ops when
# no templates exist; when templates are present it requires an authenticated
# `op` CLI session.
- shell:
    - command: bash scripts/bootstrap/inject-1password-secrets.sh
      description: Inject 1Password templates into ~/.secrets
      stdin: true
      stdout: true
      stderr: true

# Install desktop fonts to ~/.local/share/fonts/ (no sudo). Placed AFTER the
# sudo step above so the sudo prompt fires while the user is still attentive;
# the slow first-run font downloads (~150 MB for Nerd Fonts) can then run
# unattended. Idempotent: skips fonts already present via marker check.
- shell:
    - command: bash scripts/bootstrap/install-fonts.sh
      description: Install desktop fonts user-wide (Pretendard, JetBrains Mono, D2Coding, Nerd Font variants)
      stdin: true
      stdout: true
      stderr: true

# Build + install the mxm4-haptic Rust binary into ~/.local/bin. It fires
# MX Master 4 haptic waveforms via direct HID++ to the Bolt receiver,
# invoked by the Haptic rule in home/.config/solaar/rules.yaml. Native
# Rust (~1-2 ms cold) replaces an earlier Python helper (~14 ms — the
# interpreter startup was the whole cost). Linux-only: uses
# /sys/class/hidraw + /dev/hidraw*. `mise exec rust@latest` because
# dotbot's shell steps run under non-interactive bash where mise
# activation from ~/.bashrc is not loaded. `--root ~/.local` puts the
# binary alongside dotbot's hand-linked ~/.local/bin entries (already on
# PATH). `--locked` honors the tracked Cargo.lock; `--force` makes
# re-runs idempotent (rebuilds only on source change). See crates/README.md.
- shell:
    - command: 'command -v cargo >/dev/null 2>&1 && mise exec rust@latest -- cargo install --path crates/mxm4-haptic --root "$HOME/.local" --locked --force --quiet || echo "config-solaar: cargo unavailable; skipping mxm4-haptic build" >&2'
      description: Build + install mxm4-haptic Rust binary to ~/.local/bin (MX Master 4 haptic helper; skipped when cargo absent)
      stdin: true
      stdout: true
      stderr: true

# Apply per-device Solaar settings to ~/.config/solaar/config.yaml that
# can't be expressed via the symlinked rules.yaml (currently divert-keys
# for MX Master 4 / Haptic), and populate ~/.cache/mxm4-haptic.json with
# the device + HAPTIC feature indices the mxm4-haptic binary needs. Why a
# script and not a tracked config.yaml: the file embeds per-physical-device
# _serial / _unitId / _battery / _absent fields that would couple the repo
# to one mouse unit and produce noisy diffs every Solaar save. Soft-skips
# when Solaar is not installed, the config file hasn't been generated yet,
# or the target device isn't paired. Idempotent: re-running on a correct
# config writes nothing and does not bounce Solaar. See
# scripts/linux/config-solaar.sh header for the full target schema.
- shell:
    - command: bash scripts/linux/config-solaar.sh
      description: Apply per-device Solaar config + haptic cache (MX Master 4; skipped when Solaar/device absent)
      stdin: true
      stdout: true
      stderr: true

# Configure KDE Plasma 6 user-side settings in eight independent steps:
#   - fonts:           Pretendard (sans) + JetBrainsMono Nerd Font (mono)
#                      into kdeglobals via kwriteconfig6.
#   - touchpad:        libinput natural scroll, tap-to-click, and clickfinger
#                      right-click on devices in TOUCHPAD_TARGET_NAMES, via
#                      KWin's InputDeviceManager DBus.
#   - panel:           icontasks/taskmanager `groupingStrategy = 0`
#                      ("Do not group") in plasma-org.kde.plasma.desktop-appletsrc.
#   - kickoff:         favoritesDisplay=1 + applicationsDisplay=1 ("In a
#                      list") on every panel-level kickoff applet in the
#                      same appletsrc.
#   - virtualkeyboard: [Wayland] InputMethod in kwinrc -> Fcitx 5 Wayland
#                      Launcher (.desktop path). Soft-skips when fcitx5 is
#                      not installed yet.
#   - digitalclock:    long date format on every panel-level Digital Clock.
#   - calendar:        holidays + PIM events in Digital Clock calendar popup,
#                      South Korea holidays, and all local Akonadi calendars.
#   - edges:           disables KWin screen edge/corner actions and the
#                      multi-monitor pointer edge barrier in kwinrc.
# Hard-guarded: each step no-ops (returns 0) when its prereqs are missing
# (kwriteconfig6/busctl/plasmashell, no active Plasma session on the session
# bus, fcitx5 not installed), and the whole script exits 0 on non-KDE
# systems - safe to run on non-KDE Linux (GNOME, sway, headless servers,
# chroot/container, etc.).
# MUST run AFTER scripts/bootstrap/install-fonts.sh: that step finishes with `fc-cache -f`, so
# fc-match here sees the just-installed fonts. The fonts step errors out
# (exit 1) if a requested font isn't installed. Re-runnable; every write is
# idempotent.
- shell:
    - command: bash scripts/linux/config-kde.sh
      description: Configure KDE Plasma 6 (fonts, touchpad, panel grouping, kickoff list view, virtual keyboard; skipped on non-KDE systems)
      stdin: true
      stdout: true
      stderr: true
