# Linux-only dotbot tasks - loaded by install.sh when uname -s = Linux.
#
# This file ALSO drives root-owned config under system/linux/ via `shell:` +
# `sudo install -D -m <mode>`. dotbot itself can't write to /etc/, so we shell
# out. See AGENTS.md "Root-owned config".

- defaults:
    link:
      create: true
      relink: true

- link:
    # zsh (zprezto-based; same path on macOS - duplicated in install.macos.yaml)
    ~/.zshrc: home/.zshrc
    ~/.zshenv: home/.zshenv
    ~/.zprofile: home/.zprofile
    ~/.zlogin: home/.zlogin
    ~/.zlogout: home/.zlogout
    ~/.zpreztorc: home/.zpreztorc

    # GnuPG (Linux/macOS use ~/.gnupg; Windows uses %APPDATA%/gnupg by default)
    ~/.gnupg/gpg.conf: home/.gnupg/gpg.conf
    ~/.gnupg/gpg-agent.conf: home/.gnupg/gpg-agent.conf

    # Linux-only IME and hardware tooling
    ~/.config/fcitx5: home/.config/fcitx5
    ~/.config/solaar/rules.yaml: home/.config/solaar/rules.yaml

    # VS Code on Linux (path differs on macOS / Windows; see those yaml files)
    ~/.config/Code/User/settings.json: home/.config/Code/User/settings.json
    ~/.config/Code/User/keybindings.json: home/.config/Code/User/keybindings.json

# Root-owned system config. Each entry is `sudo install -D -m <mode> <src> <dst>`.
# Add entries when migrating /etc/* in the system-config follow-up commit.
- shell: []
